— seeing clearly, long-term thinking\n4. **Justice** — treating others rightly; the social expression of character\n\nTruman kept a well-worn copy of *Meditations* and underlined: *\"If it's not right, do not do it; if it is not true,\ndo not say it.\"* He interpreted justice as the baseline for every position of responsibility.\n\n## Key Themes\n\n### Truth-Telling\nWhistleblowers (Cynthia Cooper, Daniel Ellsberg, Tyler Shultz, Li Wenliang) are the book's recurring heroes — ordinary\npeople who told the truth at personal cost. Holiday frames truth-telling not as heroism but as baseline obligation:\n\"The simple act of an ordinary brave man is not to participate in lies\" (Solzhenitsyn).\n\n### Self-Accountability\nFrank Robinson fined himself $200 after jogging to first base instead of hustling — no rules required it; no one asked.\nThe Stoic principle: there are the rules society enforces, and then there are the higher standards you hold for yourself.\n\n### Fairness and Non-Exploitation\nChrysippus: *\"It is not wrong to seek after the things useful in life, but to do so while depriving someone else is\nnot just.\"* Justice is zero-sum awareness — you can pursue your interests without gaming the system at others' expense.\n\n### Community Over Self\nHoliday traces his own evolution from early Stoicism (used as a discipline tool for personal ambition) to a more\nmature, other-directed reading. The Stoics who endured — Marcus Aurelius, Cato, Seneca — were defined by their service\nto something larger than themselves.\n\n## The Truman Case Study\n\nTruman is the book's spine: a seemingly ordinary man — failed businessman, thick glasses, Missouri farmer — who spent\ndecades building a code of conduct grounded in Marcus Aurelius before being thrust into the presidency at the most\nprecarious moment in modern history. His competence came from character, not credentials.\n\n## Open Questions\n\n- **How does Stoic justice interact with systemic injustice? The Stoics mostly focused on individual conduct — does the framework scale to structural critique?**  \n  This is Stoicism's most significant blind spot, and the framework scales inadequately without supplementation. Stoic ethics excels at *personal conduct within* unjust systems — it gives Cato, Epictetus (a slave), and Marcus (an emperor) identical tools: focus on what is in your control, act rightly regardless of what others do. But systemic injustice is by definition a collective, structural problem that individual virtue cannot address at scale. A Stoic nurse in a hospital that systematically under-diagnoses Black patients can practice personal justice in every individual interaction while leaving the system untouched. Three structural problems with extending Stoicism to systemic critique: (1) *The sphere-of-control problem* — Stoic ethics centers on *ta eph' hēmin* (things up to us); structural forces — policy, law, history — are emphatically not up to us individually, which risks quietism in the face of collective injustice; (2) *No theory of collective action* — Stoicism has rich individual ethics but almost no account of how individuals should coordinate to change institutions; (3) *Risk of self-congratulation* — the Stoic who acts with personal justice while tolerating structural injustice can mistake the former for the latter. Where Stoicism does help: it provides the psychological endurance for sustained reformers (think long-game activists, imprisoned dissidents), the commitment to truth-telling even at institutional cost (the whistleblower examples Holiday cites), and the anti-corruption ethic that preserves reformers' integrity under pressure. The missing piece is a theory of *distribution* and *power*, not just personal conduct — which is where political philosophy (Rawls, Nussbaum's capabilities approach) supplements Stoicism's individual-level framework rather than replaces it.\n- What's the relationship between truth-telling and tact? Marcus advised: \"Speak the truth as you see it, but with\n  kindness. With humility. Without hypocrisy.\"\n\n## Source\n`raw/books/Right_Thing,_Right_Now_-_Ryan_Holiday.epub`\n"}, {"id": "slow-productivity", "title": "Slow Productivity", "date": "2026-05-19", "tags": ["productivity", "knowledge-work", "cal-newport", "deep-work"], "related": ["cognitive-atrophy-and-ai", "slow-productivity-and-ai-craft", "experimental-mindset", "cal-newport", "pseudo-productivity"], "category": "topics", "excerpt": "Slow Productivity\n\nOverview / Core Thesis\n\nCal Newport argues that \"pseudo-productivity\" — the use of visible busyness as a proxy for useful work — is a trap that\nknowledge workers fell into when the industrial age's output-per-hour metric was inappr", "content": "---\ntitle: \"Slow Productivity\"\ndate: 2026-05-19\ntags: [productivity, knowledge-work, cal-newport, deep-work]\nrelated: [[cal-newport]], [[pseudo-productivity]], [[experimental-mindset]], [[cognitive-atrophy-and-ai]], [[slow-productivity-and-ai-craft]]\n---\n\n# Slow Productivity\n\n## Overview / Core Thesis\n\nCal Newport argues that \"pseudo-productivity\" — the use of visible busyness as a proxy for useful work — is a trap that\nknowledge workers fell into when the industrial age's output-per-hour metric was inappropriately applied to creative\nand cognitive labor. The antidote is *slow productivity*: a philosophy modeled on how history's most prolific creators\nactually worked — unhurriedly, at variable pace, obsessing over quality.\n\nThe opening image is John McPhee lying on a picnic table for two weeks, staring up at an ash tree, paralyzed before\nwriting a 30,000-word New Yorker masterpiece. That paralysis was necessary; the sustained, focused work that followed\nwas indistinguishable from modern \"slacking.\"\n\n## Three Principles\n\n### 1. Do Fewer Things\nOverloaded task lists and too many simultaneous projects create multitasking overhead that destroys depth. Jane Austen\nproduced her greatest novels only during periods when her domestic obligations were dramatically reduced — not by writing\nin stolen moments but by having *enough white space* to think. The goal: fewer active obligations, each given full\nattention until completion.\n\n### 2. Work at a Natural Pace\nViewed at the scale of weeks, great scientists look unproductive. Viewed over careers, they are extraordinary. Copernicus\nspent 14 years between his initial insight and the published draft. Marie Curie took a full summer countryside vacation\nmid-experiment — and won two Nobel Prizes. The modern bias toward fast-scale evaluation (daily/weekly productivity) is\nan industrial inheritance that ill-fits creative work. Seasons of intensity and seasons of slack are both part of the\nnatural rhythm.\n\n### 3. Obsess Over Quality\nQuantity metrics reward output volume; quality obsession rewards output value. Newport traces Jewel's path from living in\nher car in San Diego to stadium tours — built entirely on relentless craft development at small-venue performances.\nQuality work creates a flywheel: it earns the autonomy and reputation that in turn create the conditions for more\nquality work.\n\n## Why Pseudo-Productivity Emerged\n\nKnowledge work lacks a clear output metric. When it exploded as an economic sector in the 20th century, the easiest\nproxy was visible effort — email responsiveness, meeting attendance, packed calendars. This was particularly\nexacerbated by remote work and always-on digital communication. The pandemic made this unsustainable, triggering\nthe Great Resignation and the \"quiet quitting\" trend.\n\n## Key Contrasts\n\n| Pseudo-Productivity | Slow Productivity |\n|---|---|\n| Many active projects | Few projects, done deeply |\n| Constant responsiveness | Protected deep-work blocks |\n| Fast pace, short deadlines | Variable pace over career horizon |\n| Output quantity metrics | Obsession with quality |\n\n## Open Questions\n\n- How do knowledge workers negotiate \"slow\" timelines with managers/clients still using industrial-era metrics?\n- Does the model apply mainly to autonomous/creative roles, or can it transfer to constrained jobs?\n- How does this interact with [[cognitive-atrophy-and-ai]] — does AI assistance undermine the craft-building that slow\n  productivity depends on?\n\n## Source\n`raw/books/Slow Productivity.epub`\n"}, {"id": "charlie-munger", "title": "Charlie Munger", "date": "2026-05-18", "tags": ["investing", "thinking", "berkshire-hathaway", "mental-models"], "related": ["inversion", "warren-buffett", "mental-models", "mental-models-and-multidisciplinary-thinking"], "category": "people", "excerpt": "Charlie Munger\n\nCharles Thomas Munger (1924–2023) — vice chairman of Berkshire Hathaway, Warren Buffett's longtime partner, lawyer, and one of the most original thinkers in American business.\n\nBackground\n\nBorn in Omaha, Nebraska, on January 1, 1924,", "content": "---\ntitle: \"Charlie Munger\"\ndate: 2026-05-18\ntags: [investing, thinking, berkshire-hathaway, mental-models]\nrelated: [[mental-models-and-multidisciplinary-thinking]], [[mental-models]]\n---\n\n# Charlie Munger\n\nCharles Thomas Munger (1924–2023) — vice chairman of Berkshire Hathaway, [[warren-buffett|Warren Buffett]]'s longtime partner, lawyer, and one of the most original thinkers in American business.\n\n## Background\n\nBorn in Omaha, Nebraska, on January 1, 1924, Munger grew up during the Depression — an experience that shaped his views on thrift, self-reliance, and the value of sound judgment. He worked as a boy at Buffett's grandfather's grocery store. After serving in WWII as a meteorologist, he studied at Harvard Law School (without an undergraduate degree) and practiced law before transitioning to investing. He co-founded a law firm (Munger, Tolles & Olson) and ran his own investment partnership before merging his interests with Buffett's at Berkshire Hathaway. He died in November 2023 at age 99, just weeks before his 100th birthday.\n\n## Key Contributions\n\n- **Architect of Berkshire's investment philosophy** — shifted Buffett from pure Graham-style \"cigar butt\" value investing toward buying excellent businesses at fair prices; the Berkshire Hathaway of Sees Candies, Coca-Cola, and Apple reflects Munger's influence\n- **The Latticework of [[mental-models|Mental Models]]** — Munger's signature intellectual contribution: accumulating mental models from many disciplines to reason more clearly across domains\n- **The Psychology of Human Misjudgment** — his landmark talk cataloging 25+ cognitive biases; predates and parallels much of behavioral economics\n- **[[inversion|Inversion]]** — popularized the Jacobi maxim \"invert, always invert\" as a core problem-solving technique\n- **Daily Journaling and Reading** — lifelong learner who read voraciously across biology, physics, history, mathematics, and psychology into his 90s\n\n## Key Works\n- *Poor Charlie's Almanack* (collected speeches and talks, various editions; 2023 expanded edition published by Stripe Press)\n\n## Related Topics\n- [[mental-models-and-multidisciplinary-thinking]] — his central contribution\n- [[mental-models]] — the framework he built and popularized\n"}, {"id": "lisa-damour", "title": "Lisa Damour", "date": "2026-05-18", "tags": ["psychology", "adolescence", "parenting", "education"], "related": ["teenage-girl-development", "developmental-strands"], "category": "people", "excerpt": "Lisa Damour\n\nClinical psychologist, author, and leading expert on the psychological development of teenage girls.\n\nBackground\n\nDamour holds a Ph.D. in clinical psychology and maintains a private psychotherapy practice focused on adolescents and their", "content": "---\ntitle: \"Lisa Damour\"\ndate: 2026-05-18\ntags: [psychology, adolescence, parenting, education]\nrelated: [[teenage-girl-development]], [[developmental-strands]]\n---\n\n# Lisa Damour\n\nClinical psychologist, author, and leading expert on the psychological development of teenage girls.\n\n## Background\n\nDamour holds a Ph.D. in clinical psychology and maintains a private psychotherapy practice focused on adolescents and their families. She is an instructor in the Department of Psychological Sciences at Case Western Reserve University, and serves as a consulting psychologist and director of the Center for Research on Girls at Laurel School, an independent all-girls school in Ohio. She is also a mother of two daughters.\n\n## Key Contributions\n\n- **Untangled** (2016) — a developmental framework for understanding teenage girls through seven distinct \"strands\"; reframes adolescent behavior as purposeful development rather than chaos to be endured\n- **Under Pressure** (2019) — examines the stress and anxiety epidemic among teenage girls; practical guidance for parents and educators\n- Regular contributor to the New York Times and consultant to media on adolescent issues\n- Adaptation of Anna Freud's developmental strands framework into a practical, parent-facing tool\n\n## Key Works\n- *Untangled: Guiding Teenage Girls Through the Seven Transitions into Adulthood* (2016)\n- *Under Pressure: Confronting the Epidemic of Stress and Anxiety in Girls* (2019)\n\n## Related Topics\n- [[teenage-girl-development]] — her central subject\n- [[developmental-strands]] — the framework she applies\n"}, {"id": "michael-finkel", "title": "Michael Finkel", "date": "2026-05-18", "tags": ["journalism", "author", "narrative-nonfiction"], "related": ["stephane-breitwieser", "art-theft-and-obsession"], "category": "people", "excerpt": "Michael Finkel\n\nAmerican journalist and narrative nonfiction author. Contributes to GQ, National Geographic, and other major publications.\n\nRelevance to This Wiki\n\nAuthor of The Art Thief (2023, Knopf), the definitive account of art thief Stéphane Br", "content": "---\ntitle: \"Michael Finkel\"\ndate: 2026-05-18\ntags: [journalism, author, narrative-nonfiction]\nrelated: [[art-theft-and-obsession]], [[stephane-breitwieser]]\n---\n\n# Michael Finkel\n\nAmerican journalist and narrative nonfiction author. Contributes to *GQ*, *National Geographic*, and other major publications.\n\n## Relevance to This Wiki\n\nAuthor of *The Art Thief* (2023, Knopf), the definitive account of art thief **[[stephane-breitwieser|Stéphane Breitwieser]]**. Originally reported as \"The Secrets of the World's Greatest Art Thief\" in *GQ* (February 2019).\n\n## Other Work\n\n- *The Stranger in the Woods* (2017) — account of Christopher Knight, the \"North Pond Hermit,\" who lived alone in the Maine woods for 27 years\n\n## Style\n\nFinkel works in the tradition of intimate, access-based narrative journalism — spending extended time with his subjects to understand motivation from the inside. *The Art Thief* is notable for its non-judgmental lens: Finkel presents Breitwieser's aesthetic obsession on its own terms before interrogating its ethics.\n\n## Related Topics\n\n- [[art-theft-and-obsession]] — primary source synthesis\n- [[stephane-breitwieser]] — the subject\n"}, {"id": "john-green", "title": "John Green", "date": "2026-05-18", "tags": ["author", "public-health", "storytelling"], "related": ["tuberculosis-and-global-health", "health-equity", "partners-in-health"], "category": "people", "excerpt": "John Green\n\nAmerican author and public intellectual known primarily for young adult fiction (The Fault in Our Stars, Looking for Alaska) who has become a significant voice in global health advocacy and science communication.\n\nRelevance to This Wiki", "content": "---\ntitle: \"John Green\"\ndate: 2026-05-18\ntags: [author, public-health, storytelling]\nrelated: [[tuberculosis-and-global-health]], [[health-equity]], [[partners-in-health]]\n---\n\n# John Green\n\nAmerican author and public intellectual known primarily for young adult fiction (*The Fault in Our Stars*, *Looking for Alaska*) who has become a significant voice in global health advocacy and science communication.\n\n## Relevance to This Wiki\n\nAuthor of *Everything Is Tuberculosis* (2025), a nonfiction investigation into why tuberculosis — curable since the 1950s — still kills over a million people per year.\n\n## Key Arguments\n\n- TB's persistence is a moral and political failure, not a scientific one\n- How we **frame** illness determines who receives care and who dies — framing is never neutral\n- The cure for TB exists; the problem is that *the cure is where the disease is not*\n- Health crises are inseparable from [[health-equity]] — poverty, race, and geography determine access to medicine\n\n## Personal Connection\n\nGreen's great-uncle **Stokes Goodrich** died of TB in 1930 in an Asheville sanatorium at age 29. This personal history anchors the book's emotional argument.\n\n## Work with Partners in Health\n\nGreen and his wife Sarah visited Lakka Government Hospital in Sierra Leone — supported by **[[partners-in-health|Partners in Health]]** — where he encountered active TB cases, including a child patient named Henry, and multidrug-resistant TB strains.\n\n## Media and Outreach\n\nGreen co-created the educational YouTube channel *Crash Course* and *Mental Floss*. His public platform has brought global health topics — especially TB and neglected tropical diseases — to mainstream audiences who would not otherwise encounter them.\n\n## Related Topics\n\n- [[tuberculosis-and-global-health]] — primary source text\n- [[health-equity]] — the structural argument of the book\n"}, {"id": "jo-boaler", "title": "Jo Boaler", "date": "2026-05-18", "tags": ["education", "mathematics", "stanford", "growth-mindset"], "related": ["mathematics-education", "growth-mindset", "carol-dweck"], "category": "people", "excerpt": "Jo Boaler\n\nProfessor of Mathematics Education at Stanford University; founder of YouCubed, a research and outreach initiative that provides open mathematics tasks and professional development resources to teachers worldwide.\n\nKey Contributions\n\n- App", "content": "---\ntitle: \"Jo Boaler\"\ndate: 2026-05-18\ntags: [education, mathematics, stanford, growth-mindset]\nrelated: [[mathematics-education]], [[growth-mindset]], [[carol-dweck]]\n---\n\n# Jo Boaler\n\nProfessor of Mathematics Education at Stanford University; founder of **YouCubed**, a research and outreach initiative that provides open mathematics tasks and professional development resources to teachers worldwide.\n\n## Key Contributions\n\n- Applied [[growth-mindset]] theory (developed by [[carol-dweck]]) specifically to mathematics learning\n- Identified the specific ways traditional math instruction creates fixed-mindset students — especially through timed tests, ability grouping, and emphasis on speed\n- Developed \"open tasks\" (low-floor, high-ceiling problems) that allow multiple entry points and solution paths\n- Demonstrated via research that mixed-ability grouping with role-based structures closes achievement gaps\n\n## Major Work\n\n*Mathematical Mindsets: Unleashing Students' Potential through Creative Mathematics, Inspiring Messages and Innovative Teaching* (1st ed. 2016; 2nd ed. 2022, Jossey-Bass)\n\nFull synthesis: [[mathematics-education]]\n\n## YouCubed\n\nStanford-based research center and teacher support hub. Provides:\n- Free open math tasks for K–12 teachers\n- Professional development workshops\n- Research summaries on brain science and math learning\n- \"Week of Inspirational Math\" — annual curriculum used by millions of students\n\n## Key Claims\n\n1. Timed tests activate the amygdala and suppress mathematical reasoning ability — they measure anxiety, not competence\n2. Mistakes made and noticed produce more synaptic growth than correct answers\n3. \"Speed = smart\" is a cultural myth that disproportionately harms girls and students of color\n4. Visual and spatial approaches to mathematics develop deeper understanding than symbol manipulation alone\n\n## Related Topics\n\n- [[mathematics-education]] — full topic synthesis\n- [[growth-mindset]] — the theoretical foundation\n- [[carol-dweck]] — collaborator and intellectual predecessor\n"}, {"id": "carol-dweck", "title": "Carol Dweck", "date": "2026-05-18", "tags": ["psychology", "stanford", "mindset", "education"], "related": ["jo-boaler", "mathematics-education", "growth-mindset"], "category": "people", "excerpt": "Carol Dweck\n\nProfessor of Psychology at Stanford University; originator of growth-mindset theory.\n\nKey Work\n\nMindset: The New Psychology of Success (2006) — the foundational text on fixed vs. growth mindsets. Based on decades of research on motivatio", "content": "---\ntitle: \"Carol Dweck\"\ndate: 2026-05-18\ntags: [psychology, stanford, mindset, education]\nrelated: [[growth-mindset]], [[jo-boaler]], [[mathematics-education]]\n---\n\n# Carol Dweck\n\nProfessor of Psychology at Stanford University; originator of **[[growth-mindset]]** theory.\n\n## Key Work\n\n*Mindset: The New Psychology of Success* (2006) — the foundational text on fixed vs. growth mindsets. Based on decades of research on motivation, achievement, and how people respond to failure.\n\n## Core Contribution\n\nIdentified two implicit theories of intelligence that people hold:\n- **Entity theory (fixed mindset)**: ability is a fixed trait — you have a certain amount and that's it\n- **Incremental theory (growth mindset)**: ability develops through effort and learning\n\nChildren and adults who hold an incremental theory show greater persistence, take on harder challenges, recover better from setbacks, and ultimately achieve more.\n\n## Influence on Mathematics Education\n\n[[jo-boaler|Jo Boaler]] applied Dweck's framework specifically to mathematics, showing that math culture in schools is uniquely prone to fixed-mindset messaging. See [[mathematics-education]] for full synthesis.\n\n## Related Topics\n\n- [[growth-mindset]] — her core contribution\n- [[jo-boaler]] — applied her work to math education\n- [[mathematics-education]]\n"}, {"id": "anne-laure-le-cunff", "title": "Anne-Laure Le Cunff", "date": "2026-05-18", "tags": ["neuroscience", "productivity", "writing", "entrepreneurship"], "related": ["growth-mindset", "tiny-experiments", "carol-dweck", "experimental-mindset"], "category": "people", "excerpt": "Anne-Laure Le Cunff\n\nFrench-Algerian neuroscientist, writer, and founder of Ness Labs; author of Tiny Experiments.\n\nBackground\n\nLe Cunff was raised in Paris, the daughter of a French father (from Dinan, Brittany) and an Algerian mother (from Sidi Okb", "content": "---\ntitle: \"Anne-Laure Le Cunff\"\ndate: 2026-05-18\ntags: [neuroscience, productivity, writing, entrepreneurship]\nrelated: [[experimental-mindset]], [[tiny-experiments]]\n---\n\n# Anne-Laure Le Cunff\n\nFrench-Algerian neuroscientist, writer, and founder of Ness Labs; author of *Tiny Experiments*.\n\n## Background\n\nLe Cunff was raised in Paris, the daughter of a French father (from Dinan, Brittany) and an Algerian mother (from Sidi Okba). She was the first woman in her family to pursue higher education. After studying science and business, she joined Google, where she worked in digital health — rising to a global role before resigning at 27 to found a startup. After the startup failed, she returned to school to study neuroscience, eventually completing a Ph.D. She built Ness Labs — a newsletter and community focused on mindful productivity and applied neuroscience — to 100,000+ readers while completing her academic training.\n\n## Key Contributions\n\n- **Ness Labs** — newsletter, community, and small business at the intersection of neuroscience, productivity, and personal growth\n- ***Tiny Experiments*** (2024) — a book arguing for an experimental, curiosity-driven approach to life and career over linear goal-setting; grounded in neuroscience of learning\n- **The \"100 articles in 100 workdays\" experiment** — her founding pact for Ness Labs; demonstrated that small, bounded commitments driven by curiosity can compound into substantial impact\n- Research on how different brains learn differently using EEG and eye-tracking\n\n## Key Works\n- *Tiny Experiments* (2024, Penguin)\n\n## Related Topics\n- [[experimental-mindset]] — her central framework\n- [[tiny-experiments]] — the core concept of her book\n- [[growth-mindset]] — related concept from [[carol-dweck]]\n"}, {"id": "stephane-breitwieser", "title": "Stéphane Breitwieser", "date": "2026-05-18", "tags": ["art-theft", "crime", "psychology", "collecting"], "related": ["compulsive-collecting", "michael-finkel", "art-theft-and-obsession"], "category": "people", "excerpt": "Stéphane Breitwieser\n\n(b. 1971, Mulhouse, France) — considered the most prolific art thief in history.\n\nOverview\n\nOver roughly a decade spanning the 1990s and early 2000s, Breitwieser stole approximately 239 works from museums, churches, and auction", "content": "---\ntitle: \"Stéphane Breitwieser\"\ndate: 2026-05-18\ntags: [art-theft, crime, psychology, collecting]\nrelated: [[art-theft-and-obsession]], [[compulsive-collecting]], [[michael-finkel]]\n---\n\n# Stéphane Breitwieser\n\n(b. 1971, Mulhouse, France) — considered the **most prolific art thief in history**.\n\n## Overview\n\nOver roughly a decade spanning the 1990s and early 2000s, Breitwieser stole approximately **239 works** from museums, churches, and auction houses across Europe. Estimated combined value: hundreds of millions of dollars. He operated alongside his girlfriend **Anne-Catherine Kleinklaus**.\n\nHis defining characteristic: he **never sold a single stolen work**. Everything was kept in a secret two-room attic above his mother's house in Mulhouse, France.\n\n## Method\n\n- Posed as ordinary museum-visiting couple with Kleinklaus\n- Scouted locations solo before each theft; memorized guard rotations and exit routes\n- Exploited predictable lunchtime security gaps\n- Used an oversized coat; Kleinklaus carried a large bag for concealment\n- Preferred small, older works — ivory carvings, silver objects, enameled boxes — that could be concealed on the body\n\n## First Major Theft\n\n**February 1997, Rubens House, Antwerp** — an ivory sculpture of *Adam and Eve* by Georg Petel (1627). He had visited once before just to scout, became obsessed with the piece, and returned with Kleinklaus to steal it. The method: removing two screws from a plexiglass display box during the lunchtime guard gap.\n\n## The Attic Collection\n\nHis private collection included:\n- Ivory sculpture of Diana (Roman goddess of hunting)\n- Ivory statuette of Catherine of Alexandria\n- Ivory Cupid resting on a skull\n- Napoleon's personal golden tobacco box in blue enamel\n- Émile Gallé flower vase\n- Silver goblet engraved with garlands\n- Countless silver platters, bowls, pewter miniatures, gilded tea sets, medieval weapons\n\nHe arranged these on every available surface in his bedroom, described as a private museum more coherent than many public ones.\n\n## Psychology\n\nBreitwieser is a case study in [[compulsive-collecting]] decoupled entirely from monetary motivation. His stated drive: the desire to possess beauty, to touch what master craftsmen made centuries before, to wake up surrounded by transcendent objects.\n\nThe epigraph of Finkel's book: *\"Aesthetics are higher than ethics.\" — Oscar Wilde*\n\n## Arrest and Aftermath\n\nHis arrest and the subsequent fate of the collection form the second half of Finkel's narrative — including the destruction of works by his mother.\n\n## Related Topics\n\n- [[art-theft-and-obsession]] — full topic synthesis\n- [[compulsive-collecting]] — the psychology\n- [[michael-finkel]] — the journalist who documented his story\n"}, {"id": "partners-in-health", "title": "Partners in Health", "date": "2026-05-18", "tags": ["global-health", "nonprofit", "tuberculosis", "health-equity"], "related": ["john-green", "tuberculosis-and-global-health", "health-equity"], "category": "people", "excerpt": "Partners in Health (PIH)\n\nGlobal nonprofit health organization co-founded by Dr. Paul Farmer and Jim Yong Kim. Operates hospitals and community health worker programs in 11 countries, including Haiti, Rwanda, Sierra Leone, and Peru.\n\nMission\n\nProvide", "content": "---\ntitle: \"Partners in Health\"\ndate: 2026-05-18\ntags: [global-health, nonprofit, tuberculosis, health-equity]\nrelated: [[tuberculosis-and-global-health]], [[health-equity]], [[john-green]]\n---\n\n# Partners in Health (PIH)\n\nGlobal nonprofit health organization co-founded by Dr. Paul Farmer and Jim Yong Kim. Operates hospitals and community health worker programs in 11 countries, including Haiti, Rwanda, Sierra Leone, and Peru.\n\n## Mission\n\nProvide high-quality healthcare to the world's poorest populations, with the explicit argument that geography and poverty should not determine who receives treatment.\n\n## Relevance to This Wiki\n\n- Supports **Lakka Government Hospital** in Sierra Leone, where [[john-green]] visited and first encountered active TB cases up close\n- PIH pioneered the **community health worker (CHW)** model: training local community members as healthcare extenders who follow patients home, ensure medication adherence, and address social barriers to treatment\n- Paul Farmer's work on TB in Haiti demonstrated that drug-resistant TB could be treated in resource-limited settings when dismissed as \"too expensive\" by global health institutions\n\n## Key Figure: Paul Farmer (1959–2022)\n\n- Co-founder of PIH\n- Physician-anthropologist who argued that poverty itself is the primary driver of preventable disease\n- His career is documented in Tracy Kidder's *Mountains Beyond Mountains* (2003)\n\n## Relation to TB\n\nPIH helped demonstrate that multi-drug resistant TB (MDR-TB) treatment is both medically and logistically feasible in low-resource settings — a key argument in the narrative that [[tuberculosis-and-global-health]] presents.\n\n## Related Topics\n\n- [[tuberculosis-and-global-health]]\n- [[health-equity]]\n- [[john-green]]\n"}, {"id": "david-stockman", "title": "David Stockman", "date": "2026-05-18", "tags": ["economics", "politics", "reagan", "fiscal-policy"], "related": ["sound-money", "crony-capitalism", "crony-capitalism-and-monetary-deformation", "bubble-finance"], "category": "people", "excerpt": "David Stockman\n\nReagan's budget director (1981–1985), Wall Street veteran, and contrarian critic of both parties' fiscal and monetary policies.\n\nBackground\n\nBorn in Michigan, Stockman worked in Republican politics before serving in Congress and then", "content": "---\ntitle: \"David Stockman\"\ndate: 2026-05-18\ntags: [economics, politics, reagan, fiscal-policy]\nrelated: [[crony-capitalism-and-monetary-deformation]], [[crony-capitalism]], [[sound-money]]\n---\n\n# David Stockman\n\nReagan's budget director (1981–1985), Wall Street veteran, and contrarian critic of both parties' fiscal and monetary policies.\n\n## Background\n\nBorn in Michigan, Stockman worked in Republican politics before serving in Congress and then as Ronald Reagan's first director of the Office of Management and Budget. He was the architect of Reagan's initial budget plan — and one of its most clear-eyed critics after leaving the administration. He later spent two decades on Wall Street in leveraged buyout finance, including an ill-fated $4 billion auto parts supplier that went bankrupt.\n\n## Key Contributions\n\n- **The Triumph of Politics** (1986) — his first memoir documenting the failure of Reagan's fiscal revolution; an insider account of how political constraints overwhelmed economic principles\n- **The Great Deformation** (2013) — a sweeping critique of American monetary and fiscal policy from FDR through Obama; argues that [[crony-capitalism|crony capitalism]] and [[bubble-finance|bubble finance]] have corrupted American democracy\n- Coined the \"supply-side\" critique from the inside: as budget director he understood that the deficit math didn't work even while publicly defending it\n- One of the few figures to criticize both parties' bailout cultures from a consistent free-market, [[sound-money|sound-money]] perspective\n\n## Key Works\n- *The Triumph of Politics* (1986)\n- *The Great Deformation: The Corruption of Capitalism in America* (2013)\n\n## Related Topics\n- [[crony-capitalism-and-monetary-deformation]] — his central thesis\n- [[crony-capitalism]] — the mechanism he identifies as corrupting free markets\n- [[sound-money]] — his preferred alternative to Fed bubble finance\n"}, {"id": "ethan-mollick", "title": "Ethan Mollick", "date": "2026-05-18", "tags": ["ai", "innovation", "education", "wharton"], "related": ["large-language-models", "jagged-frontier", "living-and-working-with-ai"], "category": "people", "excerpt": "Ethan Mollick\n\nProfessor at the Wharton School (University of Pennsylvania), researcher in innovation and entrepreneurship, and one of the most prominent academic voices on the practical implications of generative AI.\n\nBackground\n\nMollick is an Assoc", "content": "---\ntitle: \"Ethan Mollick\"\ndate: 2026-05-18\ntags: [ai, innovation, education, wharton]\nrelated: [[living-and-working-with-ai]], [[large-language-models]], [[jagged-frontier]]\n---\n\n# Ethan Mollick\n\nProfessor at the Wharton School (University of Pennsylvania), researcher in innovation and entrepreneurship, and one of the most prominent academic voices on the practical implications of generative AI.\n\n## Background\n\nMollick is an Associate Professor at Wharton whose research focuses on innovation, entrepreneurship, and education technology. Unlike most AI commentators, he approached LLMs as an early hands-on user — incorporating ChatGPT into his classes within days of its launch in November 2022 — and has since run numerous research studies on AI's actual effects on knowledge work.\n\n## Key Contributions\n\n- **Co-Intelligence** (2024) — a widely-read book on how to live and work with AI, pitched at general audiences and grounded in both academic research and personal experimentation\n- **The [[jagged-frontier|Jagged Frontier]]** — a key concept describing the irregular, invisible boundary of AI capability; coined with co-authors based on empirical studies of AI performance on professional tasks\n- Newsletter and public writing that makes AI research accessible to practitioners\n- Early classroom research showing AI's productivity impact on business students\n\n## Key Works\n- *Co-Intelligence: Living and Working With AI* (2024, Penguin)\n\n## Related Topics\n- [[living-and-working-with-ai]] — his central topic\n- [[large-language-models]] — the technology he analyzes\n- [[jagged-frontier]] — the key concept he helped develop\n"}, {"id": "compulsive-collecting", "title": "Compulsive Collecting", "date": "2026-05-18", "tags": ["psychology", "obsession", "collecting", "aesthetics"], "related": ["stephane-breitwieser", "art-theft-and-obsession"], "category": "concepts", "excerpt": "Compulsive Collecting\n\nThe psychological drive to acquire objects as an end in itself — distinct from investment, utility, or social display. In extreme cases, collecting becomes the primary organizing principle of a person's life, overriding rationa", "content": "---\ntitle: \"Compulsive Collecting\"\ndate: 2026-05-18\ntags: [psychology, obsession, collecting, aesthetics]\nrelated: [[art-theft-and-obsession]], [[stephane-breitwieser]]\n---\n\n# Compulsive Collecting\n\nThe psychological drive to acquire objects as an end in itself — distinct from investment, utility, or social display. In extreme cases, collecting becomes the primary organizing principle of a person's life, overriding rational, ethical, and social constraints.\n\n## The Spectrum\n\n- **Normal collecting**: stamps, books, records — organized, shared, openly displayed\n- **Passionate collecting**: obsessive focus on a category; significant expense; identity tied to the collection\n- **Compulsive hoarding**: acquisition of objects regardless of value; disorganized; associated with anxiety and loss of living space\n- **Compulsive collecting (aesthetic type)**: acquisition driven by intense aesthetic experience; objects carefully curated; secrecy common; can involve theft\n\n## Stéphane Breitwieser as Case Study\n\n**[[stephane-breitwieser|Stéphane Breitwieser]]** represents a rare and extreme instance: a man who stole ~239 museum-quality works over a decade and never sold a single one. His motive was purely experiential — to possess the transcendent aesthetic quality he felt in the presence of old ivory and silver.\n\nKey features of his psychology:\n- The emotional experience of an object triggered an irresistible acquisition compulsion\n- Standard deterrents (law, social norms, imprisonment risk) were overridden by the intensity of aesthetic desire\n- The collection was secret, never displayed to others — suggesting the need was internal, not social\n- He organized the attic as a private museum with genuine curatorial sensibility\n\nThe epigraph of Finkel's book — *\"Aesthetics are higher than ethics\" (Oscar Wilde)* — captures his implicit worldview.\n\n## Philosophical Dimension\n\nBreitwieser's case raises serious questions:\n- Is there a form of private aesthetic experience so intense it constitutes a moral category of its own?\n- Are institutional custodians of art necessarily better stewards than private obsessives?\n- What is the difference between loving something and owning it?\n\n## Relationship to Broader Psychology\n\n- Overlaps with **obsessive-compulsive spectrum** disorders\n- Distinct from kleptomania (which is characterized by tension relief, not aesthetic purpose)\n- Related to **flow states** — the complete absorption in an activity described by Csikszentmihalyi\n\n## Related Topics\n\n- [[art-theft-and-obsession]] — primary source\n- [[stephane-breitwieser]] — primary case study\n"}, {"id": "sound-money", "title": "Sound Money", "date": "2026-05-18", "tags": ["economics", "monetary-policy", "gold-standard", "austrian-economics"], "related": ["crony-capitalism", "david-stockman", "crony-capitalism-and-monetary-deformation"], "category": "concepts", "excerpt": "Sound Money\n\nA monetary system in which the currency is disciplined by a commodity anchor (gold) or strict rules that prevent the central bank from inflating asset prices or monetizing government deficits at will.\n\nKey Properties\n\n- Commodity anchor", "content": "---\ntitle: \"Sound Money\"\ndate: 2026-05-18\ntags: [economics, monetary-policy, gold-standard, austrian-economics]\nrelated: [[crony-capitalism-and-monetary-deformation]], [[crony-capitalism]], [[david-stockman]]\n---\n\n# Sound Money\n\nA monetary system in which the currency is disciplined by a commodity anchor (gold) or strict rules that prevent the central bank from inflating asset prices or monetizing government deficits at will.\n\n## Key Properties\n\n- **Commodity anchor** — historically, gold; money is redeemable at a fixed rate, preventing unlimited expansion of the money supply\n- **Fiscal discipline** — when borrowing must be financed at market rates without central bank support, governments face real budget constraints\n- **Price signals** — sound money preserves the information content of prices; distorted monetary policy corrupts price signals and misdirects investment\n- **Debt discipline** — insolvency is real; creditors and investors bear the consequences of bad bets rather than receiving bailouts\n\n## Historical Context\n\n- **Bretton Woods (1944–1971)** — post-WWII international monetary system anchored to gold via the dollar; provided relative stability and the \"golden age\" of postwar growth\n- **Nixon's 1971 decision** — closing the gold window ended dollar-gold convertibility and launched the era of floating fiat currencies; from Stockman's perspective, this was the original sin of modern monetary deformation\n- **The Volcker shock (1979–1982)** — Paul Volcker's aggressive rate hikes to break inflation represent the last exercise of sound money discipline in Stockman's view; largely abandoned since\n- **Post-2008 QE** — the Federal Reserve's quantitative easing programs mark, for sound money advocates, the apex of monetary deformation\n\n## Criticism of the Concept\n\nCritics argue that gold-standard rigidity caused the Great Depression by preventing monetary expansion when it was needed. They also note that \"sound money\" regimes often created severe deflation and financial panics in the 19th century. Modern monetary theory (MMT) represents the polar opposite view: that currency-issuing governments face no fundamental financing constraint.\n\n## Related Topics\n- [[crony-capitalism-and-monetary-deformation]] — Stockman's argument for sound money\n- [[crony-capitalism]] — what sound money discipline is meant to prevent\n"}, {"id": "latticework-pedagogy", "title": "Latticework Pedagogy", "date": "2026-05-18", "tags": ["thinking", "education", "mental-models", "cognition", "transfer-learning"], "related": ["mental-models", "mental-models-and-multidisciplinary-thinking", "inversion", "latticework-feedback-loops-outside-investing", "charlie-munger", "disposition-vs-knowledge", "superforecasting"], "category": "concepts", "excerpt": "Latticework Pedagogy\n\nThe question of whether Munger's latticework approach can be systematically taught — and what the evidence from cognitive science and educational practice says about the limits of that transmission.\n\nThe Core Tension\n\nThe mental", "content": "---\ntitle: \"Latticework Pedagogy\"\ndate: 2026-05-18\ntags: [thinking, education, mental-models, cognition, transfer-learning]\nrelated: [[mental-models]], [[mental-models-and-multidisciplinary-thinking]], [[charlie-munger]], [[disposition-vs-knowledge]], [[superforecasting]], [[latticework-feedback-loops-outside-investing]]\n---\n\n# Latticework Pedagogy\n\nThe question of whether [[charlie-munger|Munger's]] latticework approach can be systematically taught — and what the evidence from cognitive science and educational practice says about the limits of that transmission.\n\n## The Core Tension\n\nThe [[mental-models|mental models]] themselves are explicit and articulable. The latticework — a structure where models reinforce and cross-reference each other — is a property that emerges from long practice, not from knowing the list. Teaching the models is necessary but not sufficient for building the lattice.\n\n## What Behavioral Evidence Shows\n\n### The Debiasing Problem\n\nDecades of teaching cognitive biases (through behavioral economics, psychology courses, and popular books) has produced limited real-world debiasing. Research by Kahneman, Fischhoff, and others finds that:\n\n- **Knowing about a bias does not reliably reduce susceptibility to it** — especially under pressure, time constraints, or emotional stakes\n- **Abstract instruction rarely transfers** to novel domains; people apply debiasing strategies in contexts that look like the training context and fail in others\n- **The gap between stated belief and actual behavior** is wide: people who correctly explain availability bias still make availability-driven errors in unfamiliar formats\n\nThe implication for latticework pedagogy: teaching model names and definitions may produce people who can *discuss* mental models without people who *reason with* them.\n\n### Transfer Learning in Cognitive Science\n\nTransfer of learning — using knowledge acquired in one context to solve problems in a new one — is reliably harder than it appears. Key findings:\n\n- **Near transfer** (applying a skill to a closely similar problem) is achievable with practice\n- **Far transfer** (applying a principle across distant domains, as the latticework requires) is rare and fragile without deep structural understanding of *why* the principle works\n- **Interleaved practice** — mixing domains during study rather than blocking by subject — improves far transfer but is less efficient in the short term and is rarely how courses are designed\n- **Deliberate application with feedback** is necessary; passive exposure to examples is not sufficient\n\nMunger's actual practice — reading voraciously, applying models in real investments with real consequences, revisiting failures — approximates the conditions cognitive science identifies as necessary for far transfer.\n\n## What Has Been Transmitted Successfully\n\nDespite the ceiling, partial transmission clearly occurs:\n\n- **Farnam Street** (Shane Parrish) has built a large audience around mental models; many readers report applying [[inversion]], circle of competence, and opportunity cost in decisions\n- **\"Super Thinking\"** (Gabriel Weinberg) and similar books systematize the vocabulary and have found audiences in professional communities\n- **Value investing education** at Columbia Business School (where Graham and Buffett both taught) has produced practitioners who apply at least some of Munger's framework\n\nThe pattern: *vocabulary and awareness* transmit well; *intuitive integration under pressure* requires years of real-stakes application.\n\n## The Role of Feedback Loops\n\nA latticework built without feedback loops is brittle. Munger's models were tested against market prices — an unforgiving, objective signal. Most pedagogical contexts lack equivalent feedback:\n\n- Business school cases are solved *post-hoc*, with the answer known, eliminating genuine uncertainty\n- Reading a model and nodding in agreement is not the same as having the model fail you and forcing you to update it\n- The models that *stick* in Munger's usage are the ones he has seen both succeed and fail in real situations\n\nImplication: effective latticework pedagogy would need to embed models in contexts with meaningful, low-latency feedback — closer to clinical rotations or apprenticeship than lecture.\n\n## What Requires Traits Beyond Instruction\n\nSome elements of Munger's practice appear to depend on traits that are formed before any formal instruction:\n\n| Trait | Why it matters | How to cultivate |\n|---|---|---|\n| Intrinsic cross-disciplinary curiosity | Drives the breadth of reading that fills the lattice | Unclear; formed early; hard to install |\n| Comfort with not knowing | Prevents premature model closure | Modeling by teachers helps; selection matters more |\n| Long time horizons | The lattice compounds over decades | Cultural, not curricular |\n| Contrarianism / independence | Resists social proof and institutional imperative | Partly modeled, partly dispositional |\n\nSee [[disposition-vs-knowledge]] for the broader argument.\n\n## Practical Pedagogy Implications\n\nIf the goal is maximum transmission of the approach, the evidence points toward:\n\n1. **Start with fewer models, applied deeply** — mastery of inversion and opportunity cost across many domains beats exposure to 50 models shallowly\n2. **Interleave disciplines** — force students to apply economic reasoning to biological problems and vice versa; don't silo by subject\n3. **Use real stakes where possible** — simulations, forecasting tournaments, and decision journals with review create better feedback than case studies\n4. **Teach the failures of models explicitly** — when does inversion mislead? When is mean reversion inapplicable? Knowing limits sharpens judgment\n5. **Select for disposition** — programs like Buffett's partnership or Munger's law firm selected people with existing curiosity and intellectual honesty; pedagogy alone cannot replace selection\n\n## Open Questions\n\n- Does forecasting practice (as in Philip Tetlock's superforecaster research) produce meaningful latticework-like integration?\n- Are there structural differences between people who successfully internalize multi-model reasoning and those who only learn the vocabulary — and can those differences be measured before training?\n- What is the minimum viable feedback loop for latticework development outside investing?\n\n## Related Topics\n- [[mental-models]] — the framework itself\n- [[mental-models-and-multidisciplinary-thinking]] — Munger's central contribution\n- [[charlie-munger]] — who developed and practiced the approach\n- [[disposition-vs-knowledge]] — the deeper question of whether wisdom is transmissible at all\n"}, {"id": "tiny-experiments", "title": "Tiny Experiments", "date": "2026-05-18", "tags": ["productivity", "learning", "growth", "curiosity"], "related": ["growth-mindset", "anne-laure-le-cunff", "experimental-mindset"], "category": "concepts", "excerpt": "Tiny Experiments\n\nSmall, bounded, curiosity-driven trials that prioritize learning over predetermined outcomes — proposed by Anne-Laure Le Cunff as an alternative to linear goal-setting.\n\nDefinition\n\nA tiny experiment is a structured attempt to learn", "content": "---\ntitle: \"Tiny Experiments\"\ndate: 2026-05-18\ntags: [productivity, learning, growth, curiosity]\nrelated: [[experimental-mindset]], [[anne-laure-le-cunff]], [[growth-mindset]]\n---\n\n# Tiny Experiments\n\nSmall, bounded, curiosity-driven trials that prioritize learning over predetermined outcomes — proposed by Anne-Laure Le Cunff as an alternative to linear goal-setting.\n\n## Definition\n\nA tiny experiment is a structured attempt to learn something by doing it in a limited, low-stakes way. Unlike a goal (which defines success as arriving at a target), a tiny experiment defines success as learning something useful — regardless of whether the outcome matches the hypothesis.\n\n## Structure\n\nA well-formed tiny experiment has:\n1. **A clear hypothesis** — what do I expect or want to learn?\n2. **A bounded commitment** — a specific time window or output count (e.g., \"write 100 articles in 100 workdays\")\n3. **A learning criterion** — what will I observe and what will it tell me?\n4. **Permission to iterate** — if the experiment reveals new information, adjust the next experiment accordingly\n\n## Key Properties\n\n- **Small scope** — designed to be completable without major upfront commitment; reduces the cost of failure\n- **Curiosity-driven** — motivated by genuine interest in the outcome, not by external pressure or social signaling\n- **Fast feedback** — produces observable results quickly enough to inform the next iteration\n- **Fail-forward** — failures are valuable data, not defeats; the experimental frame normalizes negative outcomes\n\n## Neuroscience Basis\n\nLe Cunff grounds the concept in research on intrinsic motivation and the brain's reward system. Curiosity-driven behavior (exploring, discovering) activates dopaminergic reward circuits differently from threat-avoidance behavior (avoiding failure, meeting external targets). Experiments sustain intrinsic motivation better than outcome-based goals.\n\n## Examples\n- Le Cunff's own \"100 articles in 100 workdays\" pact → became Ness Labs\n- Amelia Earhart's early aviation experiments (passenger flight, photography, trucking) → enabled her solo transatlantic flight\n\n## Relationship to Adjacent Concepts\n- [[growth-mindset]] — shares the orientation toward learning over performance; Dweck's work provides a psychological foundation\n- [[experimental-mindset]] — the broader framework of which tiny experiments are the core practice\n\n## Related Topics\n- [[experimental-mindset]] — the broader philosophy\n- [[anne-laure-le-cunff]] — the originator of this framework\n"}, {"id": "large-language-models", "title": "Large Language Models", "date": "2026-05-18", "tags": ["ai", "machine-learning", "technology", "nlp"], "related": ["general-purpose-technology", "ethan-mollick", "jagged-frontier", "living-and-working-with-ai"], "category": "concepts", "excerpt": "Large Language Models\n\nNeural networks trained on vast text corpora to predict the next token in a sequence; the underlying technology behind ChatGPT, Claude, Gemini, and related systems.\n\nKey Properties\n\n- Scale — trained on trillions of tokens of t", "content": "---\ntitle: \"Large Language Models\"\ndate: 2026-05-18\ntags: [ai, machine-learning, technology, nlp]\nrelated: [[living-and-working-with-ai]], [[ethan-mollick]], [[jagged-frontier]]\n---\n\n# Large Language Models\n\nNeural networks trained on vast text corpora to predict the next token in a sequence; the underlying technology behind ChatGPT, Claude, Gemini, and related systems.\n\n## Key Properties\n\n- **Scale** — trained on trillions of tokens of text; model size (parameters) has grown by roughly an order of magnitude per year since the transformer architecture emerged in 2017\n- **Emergence** — capabilities arise non-linearly with scale; abilities like reasoning, code generation, and multilingual translation were not explicitly trained but emerged from scale and architecture\n- **Stochastic** — outputs are probabilistic, not deterministic; the same prompt can produce different responses; there is no single \"correct\" answer\n- **Alien cognition** — LLMs process language in fundamentally different ways than humans (via tokens and attention weights, not meaning), yet produce outputs that mimic human reasoning closely enough to pass the Turing Test\n- **No persistent memory (by default)** — each conversation context is typically bounded; LLMs do not learn from interactions in real time (though fine-tuning can update a model)\n\n## Capability Profile (as of 2024)\n- Excellent: writing, summarization, code generation, idea generation, translation, question answering, structured output\n- Good: complex reasoning (with chain-of-thought), simple math, research synthesis\n- Weak: exact counting, precise arithmetic without tools, persistent state across sessions, factual reliability (hallucination risk)\n\n## The Jagged Frontier\nSee [[jagged-frontier]] — the irregular and counterintuitive boundary between tasks LLMs handle well vs. poorly.\n\n## Societal Implications\nMollick argues LLMs are a [[general-purpose-technology|General Purpose Technology]] that will transform cognitive work across all domains. Early productivity studies show 20–80% improvement on knowledge work tasks — far exceeding past GPT impact on physical labor.\n\n## Related Topics\n- [[living-and-working-with-ai]] — how to work with LLMs effectively\n- [[jagged-frontier]] — LLM capability boundaries\n"}, {"id": "crony-capitalism", "title": "Crony Capitalism", "date": "2026-05-18", "tags": ["economics", "politics", "finance", "corruption"], "related": ["sound-money", "bubble-finance", "david-stockman", "crony-capitalism-and-monetary-deformation"], "category": "concepts", "excerpt": "Crony Capitalism\n\nAn economic system in which market outcomes are systematically distorted by the capture of state institutions — especially the central bank, regulatory agencies, and the legislative process — by private financial interests.\n\nKey Pro", "content": "---\ntitle: \"Crony Capitalism\"\ndate: 2026-05-18\ntags: [economics, politics, finance, corruption]\nrelated: [[crony-capitalism-and-monetary-deformation]], [[david-stockman]], [[sound-money]]\n---\n\n# Crony Capitalism\n\nAn economic system in which market outcomes are systematically distorted by the capture of state institutions — especially the central bank, regulatory agencies, and the legislative process — by private financial interests.\n\n## Key Properties\n\n- **State capture** — private actors (banks, corporations, lobbies) gain outsized influence over the rules of the game, including tax codes, bailout decisions, and regulatory standards\n- **Socialized losses, privatized gains** — profits accrue to connected private actors; losses (through bailouts, subsidies, or lax enforcement) are absorbed by taxpayers or the public\n- **Regulatory capture** — agencies intended to police industries come to serve them instead; the \"revolving door\" between Wall Street and Washington is a key mechanism\n- **[[bubble-finance|Bubble finance]] enablement** — crony capitalism and loose monetary policy are mutually reinforcing: central banks inflate asset prices, enriching the financial sector, which then lobbies to keep the conditions in place\n\n## Stockman's Application\n\n[[david-stockman|David Stockman]] uses \"crony capitalism\" to describe the bipartisan Washington consensus from Nixon through Obama: bailouts of Wall Street (TARP), AIG, and the auto industry; the Fed's systematic inflation of asset prices; and K Street lobbying that shapes tax and spending policy to favor connected industries. He argues this is distinct from genuine free markets, which would have allowed insolvent institutions to fail.\n\n## Distinctions\n\n- **Crony capitalism vs. free markets** — in a genuine free market, losses discipline bad decisions; in crony capitalism, losses are externalized\n- **Crony capitalism vs. socialism** — both distort markets, but crony capitalism maintains the form of private ownership while socializing risk\n- **Crony capitalism vs. corruption** — corruption is individual and transactional; crony capitalism is systemic, embedded in institutions\n\n## Related Topics\n- [[crony-capitalism-and-monetary-deformation]] — Stockman's detailed historical account\n- [[sound-money]] — the monetary alternative Stockman advocates\n"}, {"id": "jagged-frontier", "title": "Jagged Frontier", "date": "2026-05-18", "tags": ["ai", "capability", "llm", "mental-model"], "related": ["ethan-mollick", "large-language-models", "living-and-working-with-ai"], "category": "concepts", "excerpt": "Jagged Frontier\n\nA metaphor for the irregular, invisible boundary of AI capability — developed by Ethan Mollick and co-authors based on empirical research into LLM performance on professional tasks.\n\nDefinition\n\nImagine a fortress wall with irregular", "content": "---\ntitle: \"Jagged Frontier\"\ndate: 2026-05-18\ntags: [ai, capability, llm, mental-model]\nrelated: [[living-and-working-with-ai]], [[ethan-mollick]], [[large-language-models]]\n---\n\n# Jagged Frontier\n\nA metaphor for the irregular, invisible boundary of AI capability — developed by Ethan Mollick and co-authors based on empirical research into LLM performance on professional tasks.\n\n## Definition\n\nImagine a fortress wall with irregular battlements: some towers jut far out into the countryside (tasks AI handles easily), while others fold back toward the castle interior (tasks AI handles poorly). The wall represents AI capability, and its key feature is that it is **invisible** — you cannot tell from the outside which tasks are on which side.\n\n## Key Insight\n\nTasks that seem equally difficult may be on opposite sides of the frontier:\n- Writing a sonnet → easy for AI (inside the frontier)\n- Writing an exactly 50-word poem → surprisingly hard (outside the frontier, because LLMs tokenize rather than count words)\n- Generating creative ideas → easy\n- Basic arithmetic without a calculator → often unreliable\n\nThe counterintuitive distribution means that **experience-based mapping is essential** — you cannot predict where the frontier falls for your specific domain without experimenting.\n\n## Implications\n\n1. **Individual advantage** — a worker in a specific domain who systematically experiments with AI for their tasks becomes the world's leading expert on AI in that domain, because no dataset or research team has their specific knowledge\n2. **Risk of misapplication** — tasks that feel like they should be inside the frontier may be outside it; over-reliance leads to confident errors (hallucinations, miscounts, fabricated citations)\n3. **Evolving boundary** — the frontier shifts with each model generation; what is outside today may be inside tomorrow, requiring continuous re-mapping\n\n## Research Basis\n\nMollick and co-authors conducted studies with management consultants using AI for professional tasks. They found that AI helped most on tasks within the frontier but actively harmed performance when consultants over-relied on AI for tasks outside it — the AI's confident errors led consultants astray.\n\n## Related Topics\n- [[living-and-working-with-ai]] — the broader context of working with AI\n- [[large-language-models]] — the technology whose capabilities the frontier describes\n"}, {"id": "health-equity", "title": "Health Equity", "date": "2026-05-18", "tags": ["public-health", "equity", "social-determinants", "global-health"], "related": ["mathematics-education", "tuberculosis-and-global-health", "john-green", "partners-in-health"], "category": "concepts", "excerpt": "Health Equity\n\nThe principle that every person should have a fair and just opportunity to be as healthy as possible — regardless of geography, income, race, or social position.\n\nCore Idea\n\nHealth equity is not the same as equal treatment. It's about", "content": "---\ntitle: \"Health Equity\"\ndate: 2026-05-18\ntags: [public-health, equity, social-determinants, global-health]\nrelated: [[tuberculosis-and-global-health]], [[john-green]], [[partners-in-health]]\n---\n\n# Health Equity\n\nThe principle that every person should have a fair and just opportunity to be as healthy as possible — regardless of geography, income, race, or social position.\n\n## Core Idea\n\nHealth equity is not the same as equal treatment. It's about removing the **structural barriers** — poverty, geography, discrimination, inadequate infrastructure — that cause some populations to get sick and die at higher rates than others.\n\n## Health *Inequity* vs. Health *Inequality*\n\n- **Inequality**: a measurable difference in health outcomes between groups\n- **Inequity**: an inequality that is avoidable, unfair, and rooted in social injustice\n\nNot all health differences are inequitable (e.g., higher cancer rates in older populations). But when curable diseases kill millions because treatment is inaccessible to poor countries, that is inequity.\n\n## TB as the Paradigm Case\n\n[[tuberculosis-and-global-health|Tuberculosis and Global Health]] is [[john-green|John Green]]'s argument that TB is the clearest modern example of health inequity:\n- TB has been curable since 1952\n- 1.25 million people died of it in 2023\n- The deaths are concentrated in low-income countries where drugs are scarce\n- Dr. Peter Mugyenyi's formulation: *\"The drugs are where the disease is not. The disease is where the drugs are not.\"*\n\n## Social Determinants of Health\n\nFactors that structure health outcomes:\n- Income and wealth\n- Housing stability\n- Education access\n- Race and ethnicity (via discrimination and structural racism)\n- Geographic location (urban vs. rural; rich vs. poor country)\n- Access to clean water, food, and sanitation\n\n## Key Organizations\n\n- **[[partners-in-health|Partners in Health]]** — Paul Farmer's organization; pioneered community health worker models in Haiti and Sierra Leone to reach populations unreached by traditional healthcare\n- WHO — tracks global disease burden; sets targets like \"End TB\" by 2030\n\n## Connection to Mathematics Education\n\nAn unexpected link: [[mathematics-education|Mathematics Education]] research shows that who gets tracked into rigorous mathematics is not random — it correlates with race and socioeconomic status. Math access is a social determinant of economic health later in life.\n\n## Open Questions\n\n- Is health equity achievable without global wealth redistribution?\n- How does intellectual property law (on drugs and vaccines) perpetuate health inequity?\n\n## Related Topics\n\n- [[tuberculosis-and-global-health]]\n- [[mathematics-education]] (equity in educational access)\n"}, {"id": "romanticization-of-illness", "title": "Romanticization of Illness", "date": "2026-05-18", "tags": ["illness", "culture", "narrative", "tuberculosis", "art", "history"], "related": ["health-equity", "contemporary-romanticized-illnesses", "art-theft-and-obsession", "john-green", "illness-narrative-and-coping", "tuberculosis-and-global-health"], "category": "concepts", "excerpt": "Romanticization of Illness\n\nThe cultural practice of associating certain diseases with desirable qualities — artistic sensitivity, moral refinement, spiritual depth — rather than biological cause. The romanticization of illness shapes who receives ca", "content": "---\ntitle: \"Romanticization of Illness\"\ndate: 2026-05-18\ntags: [illness, culture, narrative, tuberculosis, art, history]\nrelated: [[tuberculosis-and-global-health]], [[health-equity]], [[art-theft-and-obsession]], [[illness-narrative-and-coping]], [[contemporary-romanticized-illnesses]]\n---\n\n# Romanticization of Illness\n\nThe cultural practice of associating certain diseases with desirable qualities — artistic sensitivity, moral refinement, spiritual depth — rather than biological cause. The romanticization of illness shapes who receives care, who is blamed for their disease, and who is allowed to die.\n\n## Key Properties\n\n- Illness becomes a *character trait* rather than a pathogen\n- Symptoms are aestheticized (pallor, thinness, feverish intensity read as beauty or genius)\n- The framing flatters certain victims (artists, the sensitive) while stigmatizing others (the poor, the racially marginalized)\n- Romanticization is never neutral: it redistributes sympathy — and therefore resources and medical attention\n\n## Tuberculosis as the Paradigm Case\n\nFor roughly two centuries (c. 1750–1950), TB — then called \"consumption\" — was the defining romanticized disease. Its symptoms mapped onto Romantic ideals:\n\n| Symptom | Romantic Reading |\n|---|---|\n| Extreme pallor | Spiritual purity, otherworldliness |\n| Weight loss and wasting | Transcendence of the material body |\n| Flushed cheeks and bright eyes | Passionate intensity |\n| Night sweats and fever | Creative frenzy |\n| Early death | Tragic genius, dying at the height of powers |\n\nThe disease was described as making its sufferers *more themselves* — more sensitive, more creative, more alive in a heightened way before death.\n\n## Famous Artists Who Died of TB\n\nThe romanticization was partly self-reinforcing: so many prominent artists died of TB (because TB was everywhere) that TB became associated with artistic identity.\n\n- **John Keats** (poet) — died 1821, age 25\n- **Frédéric Chopin** (composer) — died 1849, age 39\n- **Anton Chekhov** (playwright/short story writer) — died 1904, age 44\n- **Amedeo Modigliani** (painter) — died 1920, age 35\n- **Franz Kafka** (novelist) — died 1924, age 40\n- **D.H. Lawrence** (novelist) — died 1930, age 44\n- **George Orwell** (novelist) — died 1950, age 46\n- **Robert Louis Stevenson** (novelist) — died 1894, age 44\n\nThe pattern is not coincidence: in an era before antibiotics, TB infected a quarter to a third of all people. Artists died of it for the same reason everyone else did — ubiquitous exposure. The myth inverted the causation.\n\n## The Harm of the Myth\n\nThe romanticization of TB as an \"artist's disease\" or disease of the sensitive caused direct, measurable harm:\n\n1. **It obscured the true cause.** TB was understood as an expression of personality or inheritance rather than a bacterial infection. This delayed germ-theory acceptance and treatment development.\n2. **It concentrated sympathy on the wrong people.** Sanatorium care, rest cures, and social support went preferentially to middle- and upper-class consumptives whose suffering was legible as tragic. The urban poor — who bore the highest disease burden — were instead blamed for their own illness (moral failing, whiskey, inherited degeneracy).\n3. **It suppressed urgency for the masses.** A disease framed as a mark of distinction cannot also be a political emergency demanding redistribution.\n\nThis is the core argument of [[john-green]]'s *Everything Is Tuberculosis* and of Susan Sontag's *Illness as Metaphor* (1978): **how we narrate disease determines who lives.**\n\n## Susan Sontag's Analysis\n\nSontag's *Illness as Metaphor* is the definitive critique. She argues that metaphorizing illness — TB as passion, cancer as repression — is always punitive. It implies the patient's character caused the disease, and that a better character could cure it. The corrective is to treat illness as *only* biological: a pathogen acting on a body, with no moral meaning.\n\n## Connection to Health Equity\n\nThe romanticization/stigmatization axis is a primary mechanism through which [[health-equity]] failures are produced and justified. When illness is framed as deserved (by the poor, by certain ethnic groups) or as beautiful (among the artistic classes), the political will to distribute cures evenly collapses.\n\nSee also: [[tuberculosis-and-global-health]] for how this plays out in TB specifically; [[health-equity]] for the structural framework.\n\n## Open Questions\n\n- Which contemporary diseases carry romanticized framings? (Depression as \"creative sensitivity\"? Autoimmune disease?)\n- How does social media change the aestheticization of illness?\n- **Does Sontag's prescription — strip all metaphor from illness — leave patients without useful narrative tools for coping?**  \n  Sontag's critique is correct as diagnosis but extreme as prescription. Yes, stripping metaphor stops the blame cycle and removes the implication that illness reflects character. But patients facing serious illness need *some* interpretive frame to organize their experience — meaning-making is not optional for human cognition. Arthur Frank's *The Wounded Storyteller* (1995) offers a better framework: he distinguishes three illness narratives — *restitution* (I will get better), *chaos* (there is no order), and *quest* (illness yields insight). Frank does not say illness has moral meaning, but recognizes that patients need narrative structure to live inside illness. The problem Sontag identifies is not narrative per se but *specific narratives that impute blame* — cancer as repression, TB as sensitivity. What patients lose from Sontag's prescription: the ability to write themselves as protagonists rather than victims of meaningless biology. What they gain: freedom from the implication that their character caused their disease. The practical reconciliation is to allow narratives that give structure and agency (the quest frame, communal framing, political framing) while stripping narratives that assign moral meaning to the disease itself. Arthur Kleinman's distinction between *disease* (biological dysfunction) and *illness* (the human experience of being sick) is useful here: you can narrate the illness experience richly without narrating the disease as morally meaningful.\n"}, {"id": "disposition-vs-knowledge", "title": "Disposition vs. Knowledge", "date": "2026-05-18", "tags": ["thinking", "philosophy", "education", "wisdom", "character"], "related": ["munger-disposition-formation", "latticework-pedagogy", "mental-models", "mental-models-and-multidisciplinary-thinking", "inversion", "wisdom-traditions-practice-vs-doctrine", "charlie-munger", "disposition-building-practices"], "category": "concepts", "excerpt": "Disposition vs. Knowledge\n\nThe distinction between knowing a framework and having the character to apply it — a fault line that runs through philosophy, education, and any attempt to transmit wisdom across the gap between instruction and practice.\n\nT", "content": "---\ntitle: \"Disposition vs. Knowledge\"\ndate: 2026-05-18\ntags: [thinking, philosophy, education, wisdom, character]\nrelated: [[latticework-pedagogy]], [[mental-models]], [[charlie-munger]], [[mental-models-and-multidisciplinary-thinking]], [[disposition-building-practices]], [[munger-disposition-formation]], [[wisdom-traditions-practice-vs-doctrine]]\n---\n\n# Disposition vs. Knowledge\n\nThe distinction between *knowing a framework* and *having the character to apply it* — a fault line that runs through philosophy, education, and any attempt to transmit wisdom across the gap between instruction and practice.\n\n## The Core Distinction\n\n**Knowledge** is propositional: knowing that [[inversion]] is useful, that availability bias distorts judgment, that incentives drive behavior. It can be stated, tested, and transmitted through text.\n\n**Disposition** is a stable orientation toward the world: the habit of actually inverting problems before deciding, the reflex to ask \"what are my incentives here?\", the patience to sit with uncertainty rather than force a model onto it. Dispositions are formed through practice, habituation, and character — not through reading alone.\n\nMunger's latticework lives at the disposition end. Knowing about it and doing it are different things. See [[latticework-pedagogy]] for the pedagogical evidence.\n\n## The Ancient Version of This Problem\n\nThis distinction is old. Aristotle called the knowledge of what is good *episteme* or *nous*; the disposition to act well he called *phronesis* (practical wisdom) and, at the character level, *arete* (virtue). His central claim in the *Nicomachean Ethics*: virtue is not taught by instruction but by habituation. You become courageous by doing courageous things, not by learning the definition of courage.\n\nThe Stoics made a similar point: knowing Stoic philosophy and being a Stoic sage are not the same. Epictetus was emphatic that most students left lectures able to recite principles and unchanged in behavior.\n\n## The Modern Version\n\n### Behavioral Economics\n\nThe behavioral economics literature provides a running empirical demonstration of the gap. People who can correctly describe cognitive biases in a lecture room make the same bias-driven errors when the task is framed differently. The knowledge is there; the disposition to counter the bias in practice is not automatically installed.\n\n### Expertise Research\n\nDreyfus and Dreyfus's skill acquisition model describes a progression from rule-following (novice) to intuitive, context-sensitive judgment (expert). Experts don't apply rules consciously — they perceive situations directly in terms of what to do. That perception is a disposition, built from thousands of hours of practice and feedback. Rules and frameworks are useful for novices but insufficient for expertise.\n\n### Character Education\n\nDecades of research on character education in schools (honesty, compassion, resilience) shows that explicit instruction in virtue has weak effects on behavior. The strongest predictors of character outcomes are: modeling by adults in the environment, institutional culture that reinforces the behavior, and genuine practice with stakes.\n\n## Why the Gap Exists\n\nSeveral mechanisms explain why knowledge doesn't automatically become disposition:\n\n1. **Context-dependence of retrieval** — knowledge learned in one setting (a lecture, a book) is encoded with that context and is less available in a different setting (a real decision under stress)\n2. **Motivation gap** — knowing you *should* think a certain way doesn't mean you *want to* in the moment; the disposition requires that the habit of mind feel natural, not effortful\n3. **Competing dispositions** — most of us have entrenched habits (social proof-seeking, loss aversion, confirmation bias) that are faster and more automatic than deliberately applied frameworks\n4. **Feedback lag** — dispositions strengthen when behavior is followed by clear feedback; many wisdom contexts (investing, relationship decisions, leadership) have slow, noisy, or ambiguous feedback\n\n## Cases Where the Gap Closes\n\nThe gap narrows under specific conditions:\n\n- **Long deliberate practice** with meaningful feedback — Munger's 60+ years of investment decisions; a physician's years of clinical rotations\n- **High stakes** that make the cost of disposition-failure vivid — people who've made painful errors due to a specific bias are more likely to develop a disposition against it\n- **Community and culture** that model and reinforce the disposition — Munger and Buffett's ongoing dialogue, their shared reading culture, created a reinforcing environment\n- **Selection effects** — people with pre-existing intellectual curiosity, humility, and independence are more likely to develop latticework-like dispositions from the same instruction\n\n## Implications for Knowledge Transmission\n\nIf the disposition/knowledge gap is real, several things follow:\n\n- **Curricula that only convey content will produce declarative knowledge, not practice** — people who can define inversion but don't actually invert\n- **The most effective teachers model the disposition** — Munger's talks work partly because listeners see the disposition in action, not just the content\n- **Apprenticeship and mentorship outperform lecture** for wisdom transmission — the learner is embedded in an environment where the disposition is practiced, not just described\n- **Self-selection matters enormously** — who chooses to pursue a discipline is often more predictive of who develops the relevant disposition than the quality of instruction\n\n## Relevance to Munger's Approach\n\nThe question of whether the [[latticework-pedagogy|latticework can be taught]] is partly a question of whether Munger's disposition — genuine curiosity, independence, comfort with uncertainty, long time horizons — can be cultivated or only selected for. The evidence from philosophy, cognitive science, and educational research suggests: cultivated partially, selected for mostly.\n\nMunger himself read voraciously before he had any framework for why it was useful. The disposition preceded and enabled the latticework, not the reverse.\n\n## Open Questions\n\n- Is there a minimal set of practices (journaling, forecasting, decision review) that reliably builds disposition rather than just knowledge?\n- How much of Munger's dispositional advantage was formed before age 30 versus cultivated deliberately in adulthood?\n- **Do wisdom traditions (Stoicism, Zen, Confucianism) that emphasize practice over doctrine outperform knowledge-focused traditions on behavioral outcomes?**  \n  The evidence is suggestive but messy. Practice-oriented traditions appear to produce stronger behavioral alignment for at least two reasons: (1) *encoding in context* — practice-based learning is embedded in real situations (the meditation cushion, the ritual, the actual decision), whereas doctrinal instruction is abstracted from use; (2) *identity formation* — traditions that require repeated behavioral commitment (daily practice, vows, community membership) leverage identity-consistency effects that lectures cannot. Buddhist meditation shows the clearest empirical support: mindfulness-based interventions produce measurable change in self-regulation and emotional reactivity in ways that reading about mindfulness does not. Confucianism's *li* (ritual propriety) — performing repeated social gestures of respect even before one feels respect — reflects an ancient behavioral conditioning insight consistent with modern habit research (Duhigg, Wood). Stoicism's practice emphasis in Epictetus (keep a journal, do the exercises, not just read the *Enchiridion*) tracks the same insight. But the comparison against \"knowledge-focused\" traditions is confounded: most ostensibly doctrine-heavy traditions (Protestant Christianity, Reform Judaism, secular philosophy) also embed community, prayer, and practice. The purest knowledge-only transmission is the modern academic classroom — which is clearly the weakest vector for behavioral change. The honest answer: practice-heavy traditions outperform on behavior change, but the mechanism is probably the *practice, community, and repetition*, not the specific doctrinal content — which means the Stoic morning exercises and Zen sitting may be interchangeable vehicles for the same underlying dispositional development.\n\n## Related Topics\n- [[latticework-pedagogy]] — application of this distinction to Munger's mental models approach\n- [[mental-models]] — frameworks that live at the knowledge end and require disposition to apply\n- [[charlie-munger]] — a case study in disposition preceding and enabling a knowledge framework\n- [[mental-models-and-multidisciplinary-thinking]] — the broader context\n"}, {"id": "growth-mindset", "titl
