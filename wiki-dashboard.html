<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vinh's Wiki</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.9.0/d3.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/marked/9.1.6/marked.min.js"></script>
<style>
/* ── Notion-inspired light palette ── */
:root {
  --bg:        #FFFFFF;
  --bg2:       #F7F7F5;
  --bg3:       #EFEEEC;
  --sidebar:   #FBFBFA;
  --border:    #E9E9E7;
  --border2:   #D3D3CF;
  --text:      #37352F;
  --text2:     #787774;
  --text3:     #9B9A97;
  --hover:     #F1F1EF;
  --hover2:    #EBEBEA;
  --accent:    #2383E2;
  --accent-bg: #EBF3FE;

  /* category colours – muted Notion pastels */
  --c-concept:    #2383E2;
  --c-concept-bg: #EBF3FE;
  --c-topic:      #0F7B6C;
  --c-topic-bg:   #DBEDDB;
  --c-people:     #9065B0;
  --c-people-bg:  #EEE0F5;

  --radius: 6px;
  --sidebar-w: 230px;
  --reader-w: 440px;
  --shadow-sm: 0 1px 3px rgba(0,0,0,.07), 0 1px 2px rgba(0,0,0,.05);
  --shadow-md: 0 4px 12px rgba(0,0,0,.08), 0 2px 4px rgba(0,0,0,.04);
}

/* ── Reset ── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; font-family: ui-sans-serif, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); font-size: 14px; overflow: hidden; -webkit-font-smoothing: antialiased; }

/* ── Top-level layout: sidebar | main | reader ── */
#app { display: flex; height: 100vh; min-width: 0; }

/* ── Sidebar ── */
#sidebar {
  width: var(--sidebar-w);
  background: var(--sidebar);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  flex-shrink: 0;
  overflow: hidden;
}
.sidebar-logo { padding: 16px 14px 12px; }
.sidebar-logo h1 { font-size: 14px; font-weight: 600; color: var(--text); letter-spacing: -0.2px; display: flex; align-items: center; gap: 6px; }
.sidebar-logo p  { font-size: 11px; color: var(--text3); margin-top: 3px; padding-left: 22px; }
.sidebar-divider { height: 1px; background: var(--border); margin: 4px 10px; }
.nav-section { padding: 6px 8px; flex: 1; }
.nav-label { font-size: 10.5px; font-weight: 600; color: var(--text3); text-transform: uppercase; letter-spacing: 0.7px; padding: 8px 8px 4px; }
.nav-item {
  display: flex; align-items: center; gap: 8px;
  padding: 6px 8px; border-radius: 5px;
  cursor: pointer; color: var(--text2); font-size: 13px;
  transition: background 0.12s, color 0.12s;
  border: none; background: none; width: 100%; text-align: left;
}
.nav-item:hover  { background: var(--hover2); color: var(--text); }
.nav-item.active { background: var(--hover2); color: var(--text); font-weight: 500; }
.nav-item svg { flex-shrink: 0; opacity: 0.7; }
.nav-item.active svg { opacity: 1; }
.sidebar-footer { padding: 10px 12px 14px; border-top: 1px solid var(--border); }
.stat-row { display: flex; justify-content: space-between; align-items: center; padding: 3px 0; }
.stat-label { font-size: 11px; color: var(--text3); }
.stat-val   { font-size: 11px; font-weight: 600; color: var(--text2); }
.stat-val.c { color: var(--c-concept); }
.stat-val.t { color: var(--c-topic); }
.stat-val.p { color: var(--c-people); }

/* ── Main area (topbar + scrollable content) ── */
#main { flex: 1; display: flex; flex-direction: column; overflow: hidden; min-width: 0; }

#topbar {
  height: 50px;
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; gap: 10px;
  padding: 0 18px;
  background: var(--bg);
  flex-shrink: 0;
}
#topbar-title { font-size: 14px; font-weight: 600; color: var(--text); white-space: nowrap; }

/* KEY FIX: #content scrolls, flex:1, min-height:0 */
#content { flex: 1; overflow-y: auto; min-height: 0; background: var(--bg); }
#content::-webkit-scrollbar { width: 6px; }
#content::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 4px; }
#content::-webkit-scrollbar-track { background: transparent; }

/* search */
#search-input {
  flex: 1; max-width: 340px;
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 6px; padding: 5px 12px;
  color: var(--text); font-size: 13px; outline: none;
  transition: border-color 0.15s, box-shadow 0.15s;
}
#search-input:focus { border-color: var(--accent); box-shadow: 0 0 0 2px var(--accent-bg); }
#search-input::placeholder { color: var(--text3); }

/* category filter chips in topbar */
.cat-filters { display: flex; gap: 6px; }
.cat-chip {
  padding: 4px 10px; border-radius: 20px; font-size: 12px; font-weight: 500;
  cursor: pointer; border: 1.5px solid var(--border2); color: var(--text2);
  background: var(--bg); transition: all 0.12s; white-space: nowrap;
}
.cat-chip:hover { border-color: var(--border2); background: var(--hover); color: var(--text); }
.cat-chip.active.all      { border-color: var(--text2); background: var(--text); color: var(--bg); }
.cat-chip.active.concepts { border-color: var(--c-concept); background: var(--c-concept-bg); color: var(--c-concept); }
.cat-chip.active.topics   { border-color: var(--c-topic);   background: var(--c-topic-bg);   color: var(--c-topic); }
.cat-chip.active.people   { border-color: var(--c-people);  background: var(--c-people-bg);  color: var(--c-people); }

/* ── Cards ── */
.cards-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(272px, 1fr)); gap: 12px; padding: 18px; }
.card {
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 14px 16px;
  cursor: pointer;
  transition: box-shadow 0.15s, border-color 0.15s;
  position: relative;
}
.card:hover { border-color: var(--border2); box-shadow: var(--shadow-md); }
.cat-badge {
  display: inline-block; font-size: 10px; font-weight: 600;
  text-transform: uppercase; letter-spacing: 0.5px;
  padding: 2px 7px; border-radius: 4px; margin-bottom: 7px;
}
.cat-badge.concepts { background: var(--c-concept-bg); color: var(--c-concept); }
.cat-badge.topics   { background: var(--c-topic-bg);   color: var(--c-topic); }
.cat-badge.people   { background: var(--c-people-bg);  color: var(--c-people); }
.card-title   { font-size: 14px; font-weight: 600; color: var(--text); margin-bottom: 5px; line-height: 1.4; }
.card-excerpt { font-size: 12px; color: var(--text2); line-height: 1.65; display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; }
.card-footer  { display: flex; align-items: center; justify-content: space-between; margin-top: 10px; }
.card-date    { font-size: 11px; color: var(--text3); }
.card-tags    { display: flex; gap: 4px; flex-wrap: wrap; }
.card-tag     { font-size: 10px; background: var(--bg2); color: var(--text3); padding: 1px 6px; border-radius: 4px; }
.new-badge    {
  position: absolute; top: 10px; right: 10px;
  background: var(--accent); color: #fff;
  font-size: 9px; font-weight: 700; padding: 2px 7px; border-radius: 20px;
  text-transform: uppercase; letter-spacing: 0.4px;
}

/* ── Home ── */
.home-hero { padding: 32px 24px 20px; }
.home-hero h2 { font-size: 26px; font-weight: 700; color: var(--text); letter-spacing: -0.5px; margin-bottom: 4px; }
.home-hero p  { font-size: 13px; color: var(--text2); }
.stats-strip  { display: flex; border-top: 1px solid var(--border); border-bottom: 1px solid var(--border); background: var(--bg2); }
.stat-box     { flex: 1; padding: 14px 20px; border-right: 1px solid var(--border); }
.stat-box:last-child { border-right: none; }
.stat-box .num { font-size: 24px; font-weight: 700; line-height: 1; color: var(--text); }
.stat-box .lbl { font-size: 11px; color: var(--text3); margin-top: 3px; text-transform: uppercase; letter-spacing: 0.4px; }
.stat-box.c .num { color: var(--c-concept); }
.stat-box.t .num { color: var(--c-topic); }
.stat-box.p .num { color: var(--c-people); }
.section-hd { display: flex; align-items: center; justify-content: space-between; padding: 18px 20px 8px; }
.section-hd h3 { font-size: 13px; font-weight: 600; color: var(--text); }
.section-hd a  { font-size: 12px; color: var(--accent); cursor: pointer; text-decoration: none; }
.section-hd a:hover { text-decoration: underline; }

/* ── Index tag filters ── */
.tag-filter-bar { padding: 10px 18px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 6px; background: var(--bg2); overflow-x: auto; }
.tag-filter-bar::-webkit-scrollbar { height: 3px; }
.tag-filter-bar::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }
.tag-pill {
  display: inline-flex; padding: 3px 9px; border-radius: 20px; font-size: 11px;
  cursor: pointer; border: 1px solid var(--border2); color: var(--text2);
  white-space: nowrap; transition: all 0.12s; background: var(--bg); flex-shrink: 0;
}
.tag-pill:hover, .tag-pill.active { border-color: var(--accent); color: var(--accent); background: var(--accent-bg); }
.results-count { padding: 8px 18px 2px; font-size: 12px; color: var(--text3); }

/* ── Authors ── */
.authors-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 12px; padding: 18px; }
.author-card { background: var(--bg); border: 1px solid var(--border); border-radius: var(--radius); padding: 18px; cursor: pointer; transition: box-shadow 0.15s, border-color 0.15s; }
.author-card:hover { border-color: var(--c-people); box-shadow: var(--shadow-md); }
.author-avatar { width: 40px; height: 40px; border-radius: 8px; background: var(--c-people-bg); display: flex; align-items: center; justify-content: center; font-size: 15px; font-weight: 700; color: var(--c-people); margin-bottom: 11px; }
.author-name { font-size: 14px; font-weight: 600; color: var(--text); margin-bottom: 4px; }
.author-excerpt { font-size: 12px; color: var(--text2); line-height: 1.6; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
.author-meta { font-size: 11px; color: var(--text3); margin-top: 8px; }
.author-tags { display: flex; gap: 4px; flex-wrap: wrap; margin-top: 8px; }

/* ── Graph ── */
#graph-wrap { width: 100%; height: 100%; position: relative; overflow: hidden; background: var(--bg2); }
#graph-svg { width: 100%; height: 100%; }
.graph-search { position: absolute; top: 14px; left: 50%; transform: translateX(-50%); background: var(--bg); border: 1px solid var(--border); border-radius: 6px; padding: 7px 14px; color: var(--text); font-size: 13px; outline: none; width: 260px; box-shadow: var(--shadow-sm); }
.graph-search:focus { border-color: var(--accent); }
.graph-controls { position: absolute; bottom: 20px; left: 20px; display: flex; flex-direction: column; gap: 4px; }
.graph-btn { background: var(--bg); border: 1px solid var(--border); border-radius: 6px; width: 30px; height: 30px; display: flex; align-items: center; justify-content: center; cursor: pointer; color: var(--text2); font-size: 15px; box-shadow: var(--shadow-sm); transition: background 0.12s; }
.graph-btn:hover { background: var(--hover); color: var(--text); }
.graph-legend { position: absolute; bottom: 20px; right: 20px; background: var(--bg); border: 1px solid var(--border); border-radius: 8px; padding: 10px 14px; box-shadow: var(--shadow-sm); }
.legend-row { display: flex; align-items: center; gap: 8px; font-size: 12px; color: var(--text2); margin-bottom: 5px; }
.legend-row:last-child { margin-bottom: 0; }
.legend-dot { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; }
.graph-tooltip { position: absolute; background: var(--bg); border: 1px solid var(--border); border-radius: 6px; padding: 8px 12px; font-size: 12px; pointer-events: none; opacity: 0; transition: opacity 0.12s; max-width: 200px; box-shadow: var(--shadow-md); z-index: 10; }

/* ── Upload ── */
.upload-wrap { max-width: 580px; margin: 0 auto; padding: 32px 24px; }
.upload-wrap h2 { font-size: 20px; font-weight: 700; margin-bottom: 6px; }
.upload-wrap > p { color: var(--text2); font-size: 13px; margin-bottom: 22px; }
.upload-zone { border: 2px dashed var(--border2); border-radius: 10px; padding: 44px 28px; text-align: center; cursor: pointer; transition: all 0.18s; background: var(--bg2); }
.upload-zone:hover, .upload-zone.drag-over { border-color: var(--accent); background: var(--accent-bg); }
.upload-zone svg { color: var(--text3); margin-bottom: 14px; }
.upload-zone h3 { font-size: 15px; font-weight: 600; margin-bottom: 5px; }
.upload-zone p { font-size: 13px; color: var(--text2); }
.path-guide { background: var(--bg2); border: 1px solid var(--border); border-radius: 8px; padding: 14px 16px; margin-top: 18px; }
.path-guide h4 { font-size: 12px; font-weight: 600; color: var(--text); margin-bottom: 10px; }
.path-row { display: flex; align-items: center; gap: 8px; padding: 4px 0; font-size: 12px; color: var(--text2); }
.path-ext { font-family: monospace; background: var(--bg3); border: 1px solid var(--border); border-radius: 3px; padding: 1px 6px; color: var(--c-concept); font-size: 11px; }
.path-arrow { color: var(--text3); }
.path-target { color: var(--c-topic); font-family: monospace; font-size: 11px; }
.guide-note { font-size: 11px; color: var(--text3); margin-top: 10px; }
.upload-preview { background: var(--bg2); border: 1px solid var(--border); border-radius: 8px; padding: 14px 16px; margin-top: 14px; }
.upload-preview h4 { font-size: 12px; font-weight: 600; margin-bottom: 8px; }
.upload-fname { font-size: 13px; font-weight: 500; color: var(--accent); }
.upload-sz { font-size: 11px; color: var(--text3); margin-left: 8px; }
.upload-dest { font-size: 12px; color: var(--text2); margin-bottom: 6px; }
.upload-content-pre { font-size: 11px; color: var(--text2); font-family: monospace; background: var(--bg); border: 1px solid var(--border); border-radius: 4px; padding: 10px; max-height: 160px; overflow-y: auto; white-space: pre-wrap; word-break: break-all; margin-top: 8px; }
.btn { display: inline-flex; align-items: center; gap: 6px; padding: 7px 14px; border-radius: 6px; font-size: 13px; font-weight: 500; cursor: pointer; border: none; transition: all 0.12s; }
.btn-primary { background: var(--accent); color: #fff; }
.btn-primary:hover { background: #1a6fc4; }
.btn-ghost { background: var(--bg2); color: var(--text2); border: 1px solid var(--border); }
.btn-ghost:hover { background: var(--hover2); color: var(--text); }

/* ── Reader panel ──
   KEY FIXES:
   1. display:flex flex-direction:column on the panel
   2. flex:1 + min-height:0 on reader-body so it scrolls within the panel
   3. related-section fixed at bottom with flex-shrink:0
*/
#reader-panel {
  width: var(--reader-w);
  flex-shrink: 0;
  background: var(--bg);
  border-left: 1px solid var(--border);
  /* flex column so children stack and reader-body can flex-grow */
  display: flex;
  flex-direction: column;
  /* translate off-screen when closed */
  transform: translateX(100%);
  transition: transform 0.22s ease;
  overflow: hidden;          /* clip children to panel bounds */
}
#reader-panel.open { transform: translateX(0); }
#reader-panel.resizing { transition: none; user-select: none; }

/* ── Resize handle ── */
#reader-resize {
  position: absolute;
  left: 0; top: 0; bottom: 0;
  width: 5px;
  cursor: col-resize;
  z-index: 20;
  display: flex;
  align-items: center;
  justify-content: center;
}
#reader-resize::after {
  content: '';
  display: block;
  width: 3px;
  height: 40px;
  border-radius: 3px;
  background: transparent;
  transition: background 0.15s;
}
#reader-resize:hover::after,
#reader-resize.active::after { background: var(--accent); }

/* size indicator badge */
#reader-size-badge {
  position: absolute;
  top: 50%;
  left: -32px;
  transform: translateY(-50%);
  background: var(--accent);
  color: #fff;
  font-size: 10px;
  font-weight: 600;
  padding: 2px 6px;
  border-radius: 4px;
  pointer-events: none;
  opacity: 0;
  transition: opacity 0.12s;
  white-space: nowrap;
}

.reader-header {
  flex-shrink: 0;
  padding: 18px 18px 14px;
  border-bottom: 1px solid var(--border);
  display: flex; align-items: flex-start; gap: 10px;
}
.reader-header-left { flex: 1; min-width: 0; }
.reader-close {
  flex-shrink: 0; background: none; border: none; cursor: pointer;
  color: var(--text3); padding: 3px; border-radius: 4px; display: flex;
  transition: background 0.12s, color 0.12s;
}
.reader-close:hover { background: var(--hover2); color: var(--text); }

/* KEY: reader-body must fill remaining height and scroll */
.reader-body {
  flex: 1;
  min-height: 0;          /* allows flex child to shrink below content size */
  overflow-y: auto;
  padding: 20px 20px 24px;
}
.reader-body::-webkit-scrollbar { width: 5px; }
.reader-body::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }

.reader-cat { display: inline-block; font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; padding: 2px 7px; border-radius: 4px; margin-bottom: 8px; }
.reader-cat.concepts { background: var(--c-concept-bg); color: var(--c-concept); }
.reader-cat.topics   { background: var(--c-topic-bg);   color: var(--c-topic); }
.reader-cat.people   { background: var(--c-people-bg);  color: var(--c-people); }
#reader-title { font-size: 20px; font-weight: 700; color: var(--text); line-height: 1.3; letter-spacing: -0.3px; }
#reader-meta  { display: flex; align-items: center; gap: 7px; margin-top: 8px; flex-wrap: wrap; }
.reader-date  { font-size: 11px; color: var(--text3); }

/* prose inside reader */
.reader-content { line-height: 1.75; color: var(--text2); font-size: 13.5px; }
.reader-content h1 { display: none; }
.reader-content h2 { font-size: 14px; font-weight: 600; color: var(--text); margin: 22px 0 8px; padding-bottom: 6px; border-bottom: 1px solid var(--border); }
.reader-content h3 { font-size: 13px; font-weight: 600; color: var(--text); margin: 16px 0 5px; }
.reader-content p  { margin-bottom: 11px; }
.reader-content ul, .reader-content ol { margin: 0 0 11px 18px; }
.reader-content li { margin-bottom: 3px; }
.reader-content strong { color: var(--text); font-weight: 600; }
.reader-content em { font-style: italic; }
.reader-content code { background: var(--bg2); border: 1px solid var(--border); border-radius: 4px; padding: 1px 5px; font-size: 12px; color: var(--c-topic); font-family: monospace; }
.reader-content pre { background: var(--bg2); border: 1px solid var(--border); border-radius: 6px; padding: 12px; overflow-x: auto; margin-bottom: 12px; }
.reader-content pre code { background: none; border: none; padding: 0; }
.reader-content table { width: 100%; border-collapse: collapse; font-size: 12px; margin-bottom: 12px; }
.reader-content th { background: var(--bg2); padding: 6px 10px; text-align: left; border: 1px solid var(--border); color: var(--text); font-size: 11px; font-weight: 600; }
.reader-content td { padding: 6px 10px; border: 1px solid var(--border); color: var(--text2); }
.reader-content blockquote { border-left: 3px solid var(--border2); padding-left: 12px; color: var(--text3); font-style: italic; margin-bottom: 12px; }
.wiki-link { color: var(--accent); text-decoration: none; border-bottom: 1px solid var(--accent-bg); cursor: pointer; transition: border-color 0.12s; }
.wiki-link:hover { border-bottom-color: var(--accent); }

/* related – fixed at bottom, flex-shrink:0 */
.related-section { flex-shrink: 0; border-top: 1px solid var(--border); padding: 14px 18px; background: var(--bg2); }
.related-title { font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.6px; color: var(--text3); margin-bottom: 8px; }
.related-list  { display: flex; flex-direction: column; gap: 4px; max-height: 190px; overflow-y: auto; }
.related-list::-webkit-scrollbar { width: 3px; }
.related-list::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }
.related-item  { display: flex; align-items: center; gap: 8px; padding: 6px 9px; border-radius: 5px; cursor: pointer; transition: background 0.1s; }
.related-item:hover { background: var(--hover2); }
.related-dot   { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
.related-text  { font-size: 12px; color: var(--text2); flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.related-cat   { font-size: 10px; color: var(--text3); }
</style>
</head>
<body>
<div id="app">

  <!-- ── Sidebar ── -->
  <div id="sidebar">
    <div class="sidebar-logo">
      <h1>📖 Vinh's Wiki</h1>
      <p>Personal knowledge base</p>
    </div>
    <div class="sidebar-divider"></div>
    <div class="nav-section">
      <div class="nav-label">Views</div>
      <button class="nav-item active" id="nav-home"    onclick="navigate('home')">
        <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>Home

<script>
/* ── Data ── */
const PAGES = [{"id": "procedural-fluency-vs-open-tasks", "title": "Procedural Fluency vs. Open Tasks", "date": "2026-05-20", "tags": ["education", "mathematics", "pedagogy", "learning", "growth-mindset"], "related": ["jo-boaler", "mathematics-education", "growth-mindset", "cognitive-atrophy-and-ai"], "category": "concepts", "excerpt": "Procedural Fluency vs. Open Tasks\n\nThe apparent tension in mathematics education between Boaler's open-task pedagogy (multiple valid approaches, exploratory, no single right answer) and the need for students to develop procedural fluency — the reliab", "content": "---\ntitle: \"Procedural Fluency vs. Open Tasks\"\ndate: 2026-05-20\ntags: [education, mathematics, pedagogy, learning, growth-mindset]\nrelated: [[mathematics-education]], [[growth-mindset]], [[jo-boaler]], [[cognitive-atrophy-and-ai]]\n---\n\n# Procedural Fluency vs. Open Tasks\n\nThe apparent tension in mathematics education between Boaler's [[mathematics-education|open-task pedagogy]] (multiple valid approaches, exploratory, no single right answer) and the need for students to develop *procedural fluency* — the reliable, efficient execution of standard mathematical operations (long division, polynomial manipulation, equation solving).\n\n## The Apparent Tension\n\nCritics of the open-tasks approach raise a practical concern: if students spend most of their time on open, exploratory problems, do they ever develop the reliable procedural skills they need for higher mathematics? Calculus requires fluent algebra; algebra requires fluent arithmetic. If students are always exploring rather than drilling, do they develop the automaticity that frees working memory for more complex reasoning?\n\nThis is a legitimate question — procedural fluency is not optional. Students who cannot execute basic operations reliably face a ceiling in higher mathematics regardless of their conceptual understanding.\n\n## Boaler's Response: Sequence, Not Competition\n\nBoaler's framework does not eliminate procedural practice — it changes its *sequence* and *context*:\n\n**Conceptual understanding first, procedural fluency second**: Research on mathematics learning (and supported by the neuroscience Boaler cites) suggests that procedural fluency built on conceptual understanding is more durable, more flexible, and more transferable than fluency built on rote repetition without understanding. Students who understand *why* long division works can reconstruct the procedure when they forget a step; students who memorized the algorithm without understanding are stuck.\n\n**Procedures emerging from exploration**: When students encounter open tasks that eventually require a standard procedure, they are more motivated to learn the procedure (they have a use case) and more likely to remember it (they understand the context in which it applies). Procedures taught in isolation are more often forgotten because they lack the semantic scaffolding of a real problem.\n\n**The calculator analogy**: Boaler's framework is similar to the position in the calculator debate: understanding when to divide, and approximately what the answer should be, matters more than executing long division by hand. The procedure serves the concept, not the reverse.\n\n## Where the Tension Is Real\n\nThe resolution is not complete. Three genuine concerns remain:\n\n### 1. Fluency and Working Memory\nThere is solid cognitive science behind automaticity: when operations become automatic (require no working memory to execute), more cognitive capacity is available for higher-order reasoning. A student who fluently executes algebraic manipulation can think about mathematical structure; a student who has to laboriously calculate each step cannot. Open tasks alone, without procedural practice to the point of automaticity, may leave students with conceptual understanding but without the cognitive bandwidth to use it.\n\n### 2. Transfer Requires Dual Competency\nTransfer to higher mathematics requires both understanding and fluency. A student who deeply understands the concept of slope but cannot reliably compute it under time pressure faces an execution bottleneck in calculus. Understanding alone is necessary but not sufficient.\n\n### 3. Equity Implications\nStudents from well-resourced backgrounds have additional opportunities for practice outside school. Students from under-resourced backgrounds may depend more heavily on classroom time to develop procedural fluency. A pedagogy that reduces in-class procedural practice may widen rather than narrow the gap.\n\n## The Integration\n\nThe most defensible synthesis: open tasks and procedural practice are not alternatives but complements in a specific sequence:\n\n1. Open tasks build *motivation and conceptual grounding* for procedures students will learn\n2. Targeted procedural practice (not timed tests, but sufficient repetition) builds the *automaticity* that frees working memory\n3. Return to open tasks at higher levels, where newly automated procedures become tools for the exploration\n\nThe enemy in both cases is *meaningless drill* — repetition that builds brittle automaticity without understanding, and breaks down when the procedure needs to be applied in a novel context. Boaler's framework attacks meaningless drill; it does not argue against fluency.\n\n## Related Concepts\n- [[mathematics-education]] — the full framework; open tasks, growth mindset, and reform pedagogy\n- [[growth-mindset]] — the underlying psychological framework\n- [[cognitive-atrophy-and-ai]] — structurally parallel debate about when friction is productive\n"}, {"id": "focus-vs-orientation", "title": "Focus vs. Orientation: The Tunnel Vision Problem", "date": "2026-05-20", "tags": ["productivity", "focus", "strategy", "decision-making", "prioritization"], "related": ["mental-models", "slow-productivity", "experiment-theater", "the-one-thing", "focusing-question"], "category": "concepts", "excerpt": "Focus vs. Orientation: The Tunnel Vision Problem\n\nThe failure mode of extreme focus strategies — including Keller's ONE Thing — in which deep narrowing of attention prevents the peripheral awareness needed to notice whether you are pointed in the rig", "content": "---\ntitle: \"Focus vs. Orientation: The Tunnel Vision Problem\"\ndate: 2026-05-20\ntags: [productivity, focus, strategy, decision-making, prioritization]\nrelated: [[the-one-thing]], [[focusing-question]], [[slow-productivity]], [[mental-models]], [[experiment-theater]]\n---\n\n# Focus vs. Orientation: The Tunnel Vision Problem\n\nThe failure mode of extreme focus strategies — including Keller's [[the-one-thing|ONE Thing]] — in which deep narrowing of attention prevents the peripheral awareness needed to notice whether you are pointed in the right direction.\n\n## The Core Distinction\n\n**Execution focus** (the ONE Thing, deep work, time-blocking) optimizes *within* a chosen direction. It answers: given that I'm building this thing, what's the most leveraged action right now?\n\n**Orientation** is the prior question: am I building the right thing? Is this the right mountain? The ONE Thing model is excellent for execution and provides no tools for orientation.\n\nThe failure mode: applying execution focus *continuously*, never returning to orientation, and gradually losing the peripheral awareness that would reveal the direction is wrong.\n\n## Four Specific Tunnel Vision Risks\n\n### 1. Signal Filtering\nOnce committed to a focus, perceptual systems actively suppress competing signals — inattentional blindness and motivated cognition operating in concert. Important weak signals that don't fit the current \"one thing\" become literally invisible. The entrepreneur so focused on their product roadmap may miss early indicators of market shift that a more peripheral observer would catch immediately.\n\n### 2. Adjacent Opportunity Cost\nLarge value-creation events often come from peripheral awareness: a different business's solution applicable to your domain, a relationship that opens an unexpected door, a method from an adjacent field. Deep focus makes these harder to notice. This is not an argument against focus; it's an argument for preserving dedicated time for peripheral scanning outside the execution sprint.\n\n### 3. Failure to Update on Negative Feedback\nSunk cost effects are amplified in narrow-focus strategies. When you've structured your life and schedule around one thing, incoming evidence that it isn't working is harder to process honestly. The very commitment the ONE Thing creates (valuable for execution) becomes an obstacle to course correction. The framework provides no mechanism for recognizing when the focus itself should change.\n\n### 4. Neglect Cascades\nKeller acknowledges \"counterbalancing\" as a solution to neglected areas (relationships, health, peripheral competencies), but treats it as manageable through periodic rebalancing. Empirically, neglected areas frequently reach crisis points that retroactively undermine the very \"one thing\" they were sacrificed for. The executive neglecting relationships in pursuit of career outcomes who faces a divorce; the athlete neglecting recovery in pursuit of training volume who faces a career-ending injury.\n\n## The Resolution: Separate Orientation from Execution\n\nThe practical integration:\n\n1. **Quarterly/annual orientation phase**: broad peripheral scanning (reading widely, maintaining diverse weak ties, scheduled reflection on whether you're still climbing the right mountain). Deliberately *not* operating the ONE Thing logic. Ask: is this still the right direction? What am I not seeing?\n\n2. **Execution sprints** (weeks to months): apply the ONE Thing / deep work / focus frameworks within the confirmed direction. Minimize peripheral distraction. Move the lead domino.\n\n3. **Explicit stopping conditions for the orientation phase**: don't let orientation become [[experiment-theater|experiment theater]]. Define when \"enough\" scanning has happened and a direction is confirmed, then commit to execution.\n\n## Relationship to Other Frameworks\n\n- [[focusing-question]]: the ONE Thing's core tool — excellent within an execution sprint, requires orientation context to be aimed correctly\n- [[slow-productivity]]: Newport's \"do fewer things\" is the structural twin; both need a meta-strategy above them that asks whether the sprint is aimed correctly\n- [[mental-models]]: Munger's approach is inherently more orientation-heavy — he reads widely, builds peripheral awareness, and waits for convergence before committing; the ONE Thing is more execution-oriented\n- [[experiment-theater]]: the mirror failure — where experiment theater avoids commitment through perpetual exploration, tunnel vision avoids reorientation through perpetual execution\n\n## The Deep Metaphor\n\nKeller's domino image is apt for execution: the right first action enables progressively larger wins. But it assumes the dominoes are arranged correctly in the first place. Arrangement requires standing back, looking at the whole board, and sometimes resetting the sequence entirely. The framework is excellent for toppling the sequence you have; it doesn't help you know if you've arranged the right sequence.\n\n## Related Concepts\n- [[the-one-thing]] — the source framework this failure mode applies to\n- [[focusing-question]] — the core tool\n- [[experiment-theater]] — the mirror failure mode\n- [[slow-productivity]] — compatible structural framework\n"}, {"id": "adaptive-leadership-and-psychological-safety", "title": "Adaptive Leadership and Psychological Safety", "date": "2026-05-20", "tags": ["leadership", "psychology", "organizational-change", "heifetz", "edmondson"], "related": ["stoic-justice", "adaptive-vs-technical-challenges", "disposition-vs-knowledge", "adaptive-leadership"], "category": "concepts", "excerpt": "Adaptive Leadership and Psychological Safety\n\nThe apparent tension between two influential frameworks: Heifetz's productive disequilibrium (effective leadership maintains discomfort to drive change) and Edmondson's psychological safety (effective tea", "content": "---\ntitle: \"Adaptive Leadership and Psychological Safety\"\ndate: 2026-05-20\ntags: [leadership, psychology, organizational-change, heifetz, edmondson]\nrelated: [[adaptive-leadership]], [[adaptive-vs-technical-challenges]], [[stoic-justice]], [[disposition-vs-knowledge]]\n---\n\n# Adaptive Leadership and Psychological Safety\n\nThe apparent tension between two influential frameworks: Heifetz's *productive disequilibrium* (effective leadership maintains discomfort to drive change) and Edmondson's *psychological safety* (effective teams require freedom from fear of humiliation or punishment). These are complementary at the system level but can appear opposed at the individual level.\n\n## The Apparent Tension\n\n- **Heifetz** ([adaptive-leadership]): The leader's job is to regulate distress — to keep the system in a productive discomfort zone where people feel pressure to change values, beliefs, and behaviors. Letting people off the hook (reducing tension) enables work avoidance. Adaptive change requires the discomfort of genuinely confronting hard problems.\n\n- **Edmondson**: Psychological safety is interpersonal — freedom from humiliation, punishment, and social exclusion for speaking up, admitting mistakes, or raising concerns. High-performing teams (IDEO, hospital units) score high on psychological safety. Fear suppresses the honest communication that learning requires.\n\nReading these together naively: the leader who maintains adaptive pressure is creating fear, which undermines safety, which destroys the learning that the adaptive work requires. One framework seems to undercut the other.\n\n## The Resolution: Two Different Threats\n\nThe frameworks operate on different threat channels:\n\n| Dimension | Heifetz's Disequilibrium | Edmondson's Safety |\n|---|---|---|\n| Type of threat | Cognitive / moral: \"my values and assumptions are being challenged\" | Social / interpersonal: \"I might be punished or humiliated for speaking up\" |\n| What it's for | Motivating genuine engagement with hard adaptive problems | Creating the conditions for honest communication and risk-taking |\n| Failure mode | Too little: people avoid the adaptive work; too much: system collapses | Too little: people hide, deflect, perform; too much: complacency |\n\nYou can have both simultaneously: **high interpersonal safety + high adaptive challenge = the learning zone**. This is exactly what Edmondson's highest-performing teams occupy. People feel safe to be honest *about* a difficult, discomforting problem — the safety is about the *social* environment, not the difficulty of the problem itself.\n\n## Why Psychological Safety Enables Adaptive Work\n\nWithout interpersonal safety, people respond to adaptive pressure through exactly the \"work avoidance\" behaviors Heifetz identifies:\n- **Scapegoating** — blame an external cause to avoid confronting internal values\n- **Distracting** — redirect attention to a technical problem where expertise (rather than change) is the answer\n- **Externalizing** — attribute the problem to forces outside the group's control\n\nThese avoidance mechanisms are activated by *social* threat: if speaking honestly about the real problem risks punishment or exclusion, avoidance is the rational response. Psychological safety removes this incentive for avoidance and makes it possible for people to actually engage with the adaptive challenge.\n\n## The Holding Environment as the Bridge\n\nHeifetz's concept of the **holding environment** — a container strong enough to hold the heat of change without exploding — is the bridge concept. A strong holding environment provides:\n1. **Enough adaptive pressure** to prevent complacency and avoidance (Heifetz's contribution)\n2. **Enough relational safety** to prevent fight-or-flight responses and enable honest engagement (Edmondson's contribution)\n\nA leader who maintains adaptive pressure without relational safety will produce fight-or-flight, not adaptive work. A leader who maintains relational safety without adaptive pressure will produce pleasant but unproductive meetings. Both are required.\n\n## Leadership Style Implication\n\nA Heifetz-influenced leader who reads the framework as license to create anxiety (without also ensuring interpersonal safety) misreads it. The goal is *cognitive and moral* discomfort about genuinely difficult problems — not social threat, unpredictability, or fear of punishment. The leader who is direct about hard problems, holds people accountable, and challenges assumptions *while also* being consistent, fair, and free from interpersonal punishment is exercising both frameworks correctly.\n\n## Related Concepts\n- [[adaptive-leadership]] — the source framework; productive disequilibrium and the holding environment\n- [[adaptive-vs-technical-challenges]] — the diagnostic that precedes this: is the problem technical or adaptive?\n"}, {"id": "experiment-theater", "title": "Experiment Theater", "date": "2026-05-20", "tags": ["productivity", "decision-making", "commitment", "psychology", "career"], "related": ["slow-productivity", "experimental-mindset", "tiny-experiments", "focusing-question", "disposition-vs-knowledge", "anne-laure-le-cunff"], "category": "concepts", "excerpt": "Experiment Theater\n\nThe failure mode of the experimental mindset in which perpetual exploration substitutes for decision. Experiment theater is the appearance of productive inquiry that actually serves as emotional protection against commitment and t", "content": "---\ntitle: \"Experiment Theater\"\ndate: 2026-05-20\ntags: [productivity, decision-making, commitment, psychology, career]\nrelated: [[experimental-mindset]], [[tiny-experiments]], [[anne-laure-le-cunff]], [[disposition-vs-knowledge]], [[focusing-question]]\n---\n\n# Experiment Theater\n\nThe failure mode of the [[experimental-mindset|experimental mindset]] in which perpetual exploration substitutes for decision. Experiment theater is the appearance of productive inquiry that actually serves as emotional protection against commitment and the possibility of failure.\n\n## The Mechanism\n\nExperiment theater thrives on ambiguity and serves a hidden function: if you never fully commit, you never fully fail. The experimental framework — with its explicit embrace of \"learning over outcomes\" — is unusually vulnerable to this misuse because it provides legitimate-sounding vocabulary for indefinite deferral. \"I'm still gathering data\" is structurally indistinguishable from \"I'm afraid to find out.\"\n\nSigns you are in experiment theater rather than genuine experimentation:\n- Your experiments have been circling the same domain for years without escalation\n- Your success criteria for \"enough learning to decide\" remain undefined or perpetually expandable\n- The experiments have been getting *more* exploratory and *less* committed over time\n- You have accumulated insights without any of them producing decisions\n\n## Five Structural Antidotes\n\n### 1. Pre-commit to a Stopping Condition\nDefine what would count as \"enough learning to decide\" *before* launching the experiment. The failure mode is open-ended criteria (\"I need more data,\" \"I want to understand the space better\") that can always be extended because they were never defined. A stopping condition forces honest evaluation: when the condition is met, the experiment ends and a decision is made.\n\n### 2. Distinguish Low-Cost Probes from High-Cost Ones\nNot all experiments are equivalent. A three-month newsletter trial is cheap; a sabbatical to \"explore\" is expensive. Escalation to costlier experiments should require evidence from cheaper ones, not just curiosity. This creates a discipline of *progressive commitment* — each experiment earns the right to the next, more expensive one.\n\n### 3. Build Escalation Gates\nAfter each experiment, ask not \"should I keep exploring?\" but \"what would need to be true for me to commit?\" This reframes the question as accumulating evidence toward a decision rather than indefinitely deferring one. The gate is active: passing it triggers a commitment decision, not another experiment.\n\n### 4. Notice the Avoidance Function\nIf your experiments are circling the same domain for years without escalation, the obstacle is probably emotional rather than epistemic. You know enough to decide; something else is preventing the decision. Naming this honestly is necessary before any structural fix can work. Le Cunff's PACT framework (Pact → Act → React) is designed to force integration of what you learn — the *React* phase is where avoidance becomes visible.\n\n### 5. Time-Box and Force the Question\nGive each experiment a fixed window, after which you must either commit meaningfully or formally close it. The deadline makes the avoidance visible: if the experiment ends and you are neither committing nor closing, the real question becomes \"what am I avoiding?\" rather than \"what should I try next?\"\n\n## The Compatible Version\n\nThe experimental mindset is fully compatible with deep commitment. The correct version: commitment *follows* evidence rather than *precedes* it. A person running genuine experiments commits more frequently and more deeply than someone making intuitive leaps — because each experiment produces the evidence that makes commitment feel warranted rather than reckless.\n\nThe failure mode is not running experiments; it's using experiments as a substitute for commitment rather than as a path to it.\n\n## Relationship to Other Frameworks\n\n- [[focusing-question]]: the ONE Thing focusing question is one antidote to experiment theater — it forces specification of the most leveraged next commitment\n- [[slow-productivity]]: Cal Newport's model requires commitment to a small number of obligations; the discipline of *closing* experiments is the mirror image of Newport's discipline of not opening new ones\n- [[disposition-vs-knowledge]]: experiment theater is a disposition failure, not a knowledge failure — the person usually knows they need to decide; the obstacle is character and habit\n\n## Related Concepts\n- [[experimental-mindset]] — the broader framework this failure mode corrupts\n- [[tiny-experiments]] — Le Cunff's PACT structure as a countermeasure\n- [[focusing-question]] — the complementary commitment-forcing tool\n"}, {"id": "stockman-2008-critique", "title": "Stockman's 2008 Critique: Was Intervention Necessary?", "date": "2026-05-20", "tags": ["economics", "financial-crisis", "monetary-policy", "david-stockman", "bailouts"], "related": ["sound-money", "david-stockman", "crony-capitalism-and-monetary-deformation", "crony-capitalism", "bubble-finance"], "category": "concepts", "excerpt": "Stockman's 2008 Critique: Was Intervention Necessary?\n\nDavid Stockman's central empirical claim in The Great Deformation: the 2008 TARP bailout was unnecessary — a \"Blackberry Panic\" manufactured by Goldman Sachs alumni to extract public subsidies. T", "content": "---\ntitle: \"Stockman's 2008 Critique: Was Intervention Necessary?\"\ndate: 2026-05-20\ntags: [economics, financial-crisis, monetary-policy, david-stockman, bailouts]\nrelated: [[crony-capitalism-and-monetary-deformation]], [[david-stockman]], [[crony-capitalism]], [[sound-money]], [[bubble-finance]]\n---\n\n# Stockman's 2008 Critique: Was Intervention Necessary?\n\nDavid Stockman's central empirical claim in *The Great Deformation*: the 2008 TARP bailout was unnecessary — a \"Blackberry Panic\" manufactured by Goldman Sachs alumni to extract public subsidies. This claim does not hold up against the empirical record, though Stockman's moral critique of *how* the intervention was executed has substantial validity.\n\n## What Stockman Claims\n\nStockman calls the 2008 crisis response a \"hissy fit on Wall Street\" driven by panic rather than systemic necessity. His argument: there were no dark ATMs, no imminent collapse of the real economy — just Wall Street melodrama that Hank Paulson (a Goldman transplant) exploited to direct massive public transfers to financial firms. The \"contagion\" narrative was a cover story for crony capitalism in action.\n\n## What the Empirical Record Shows\n\nThe measurable disruptions in September-October 2008 are incompatible with the \"manufactured crisis\" framing:\n\n- **Commercial paper markets froze**: Short-term credit that corporations depend on for payroll and operations stopped functioning as investors fled risk.\n- **Money market funds broke the buck**: Immediately after Lehman's collapse, the Reserve Primary Fund fell below $1/share, triggering a run on the $3.5 trillion money-market industry. The government had to explicitly guarantee money market funds to stop the run.\n- **Interbank lending essentially halted**: LIBOR spreads spiked to levels indicating banks would not lend to each other — the core mechanism by which credit flows through the economy.\n\nBen Bernanke — a serious scholar of the Great Depression, not a Wall Street insider — was specifically responding to the mechanism by which 1929 became 1932: bank-run contagion propagating through the real economy via credit contraction. His response was shaped by the lesson that insufficient intervention in 1930-31 converted a recession into a catastrophe.\n\nCounterfactual analysis (Gorton; Acemoglu and others) suggests that without intervention, cascading institutional failures could have pushed unemployment well above the ~10% actual peak — potentially toward Depression-era levels.\n\n## Where Stockman's Libertarian Priors Mislead Him\n\nStockman reads the presence of **moral hazard** (which is real and severe) as proof that the underlying systemic risk was manufactured. But both can be true simultaneously:\n\n- Systemic risk was genuine → intervention of some kind was probably necessary to prevent a depression\n- The specific intervention was structured to benefit financial firms at public expense → moral hazard was created and not addressed\n\nHis libertarian framework has difficulty holding both propositions at once. The existence of crony capture in the bailout design does not retroactively eliminate the systemic risk that made some intervention necessary.\n\n## Where Stockman Is Correct\n\nHis critique of *how* the intervention was executed has substantial merit:\n\n1. **Bailout terms were too favorable to shareholders and executives**: Goldman Sachs received 100 cents on the dollar on AIG counterparty contracts; equity shareholders who bore the risk were not wiped out as would occur in a normal bankruptcy\n2. **\"Too big to fail\" was left structurally unaddressed**: The post-crisis period locked in the very dynamic Stockman criticizes — banks emerged larger, more concentrated, and with implicit government backing more entrenched than before\n3. **Subsequent QE went far beyond crisis-fighting**: Once the acute phase passed, the Fed continued asset-purchase programs that concentrated gains to capital owners and suppressed the market-clearing processes that normal recessions accomplish\n4. **Moral hazard was severe**: Firms that made catastrophic bets were rescued with limited consequences for decision-makers, setting incentives for future risk-taking\n\n## The Correct Synthesis\n\nIntervention of *some* kind was probably necessary to prevent a depression. The specific intervention that occurred was poorly structured — captured by the interests it was meant to discipline — and generated severe long-term moral hazard. Stockman is the right diagnostician of the pathology and the wrong analyst of whether surgery was required.\n\n## Related Concepts\n- [[crony-capitalism-and-monetary-deformation]] — the full thesis\n- [[bubble-finance]] — the broader monetary context Stockman critiques\n- [[sound-money]] — his prescriptive framework\n- [[crony-capitalism]] — the structural capture mechanism\n"}, {"id": "latticework-failure-modes", "title": "Latticework Failure Modes", "date": "2026-05-20", "tags": ["thinking", "mental-models", "decision-making", "charlie-munger", "epistemology"], "related": ["latticework-pedagogy", "mental-models", "mental-models-and-multidisciplinary-thinking", "charlie-munger", "disposition-vs-knowledge"], "category": "concepts", "excerpt": "Latticework Failure Modes\n\nThe categories of problems that resist multi-model synthesis — where Munger's latticework approach fails, misleads, or is simply insufficient.\n\nOverview\n\nThe latticework is a tool for judgment under uncertainty in complex,", "content": "---\ntitle: \"Latticework Failure Modes\"\ndate: 2026-05-20\ntags: [thinking, mental-models, decision-making, charlie-munger, epistemology]\nrelated: [[mental-models-and-multidisciplinary-thinking]], [[mental-models]], [[latticework-pedagogy]], [[charlie-munger]], [[disposition-vs-knowledge]]\n---\n\n# Latticework Failure Modes\n\nThe categories of problems that resist [[mental-models|multi-model synthesis]] — where Munger's [[mental-models-and-multidisciplinary-thinking|latticework approach]] fails, misleads, or is simply insufficient.\n\n## Overview\n\nThe latticework is a tool for *judgment under uncertainty in complex, slow-feedback domains*. It was developed in the context of investment analysis and business evaluation — domains with rich historical patterns, legible incentive structures, and time horizons long enough for models to play out. Several categories of problems fall outside these conditions.\n\n## Five Categories Where Latticework Falls Short\n\n### 1. Deep Procedural Expertise\nThe latticework is a tool for judgment, not technical execution. Differential equations, surgical technique, bench biology, advanced software engineering, and similar skills require deliberate practice and domain-specific feedback that no amount of cross-disciplinary reading can replace. Munger himself is clear about this: he operates through others who have technical expertise; he provides judgment about whether to deploy it and in what direction, not the execution itself.\n\nThe failure mode: overconfident generalists who believe their breadth substitutes for technical depth in domains requiring both. The latticework *complements* domain expertise; it does not replace it.\n\n### 2. Model Conflict Without Resolution\nThe framework doesn't specify how to weight competing models when they point in different directions. Munger's preferred answer is \"wait for the lollapalooza\" — act only when multiple models align. This works in patient, low-frequency decision contexts (Berkshire's investment pace). In higher-frequency contexts with forced decisions, model conflict is a genuine problem the framework leaves unresolved.\n\nThe failure mode: paralysis when models disagree, or post-hoc rationalization where the preferred answer gets \"confirmed\" by cherry-picking which models to apply.\n\n### 3. Truly Novel Domains\nIn domains where no settled models yet exist — early LLMs (2019-2020), mRNA vaccines pre-COVID, the early internet — applying familiar frameworks from adjacent fields can be *actively misleading*. Analogies to previous technological transitions may miscalibrate both speed and nature of change.\n\nOverconfident polymaths are a real phenomenon: the same breadth that enables insight in established domains can generate spurious analogies in genuinely novel ones. The latticework is most powerful when applied to domains with long historical records (business competition, human psychology, engineering tradeoffs); it is least reliable when applied to domains that are structurally unprecedented.\n\n### 4. Fast-Iteration, High-Pressure Environments\nThe latticework is a deliberate, reflective process. In emergency medicine, competitive athletics, active trading, or operational crisis response, tacit expertise built through high-volume practice (Kahneman's System 1, Dreyfus's \"expert\" level) typically outperforms conscious model consultation. The cognitive overhead of model retrieval and synthesis is unavailable under time pressure.\n\nThe resolution: the latticework is valuable for *preparation* in these domains (building pattern libraries, designing protocols, understanding failure modes in advance) but not for *in-the-moment* decision-making. Surgeons who've built mental models of complication patterns recognize them faster; the models are still operating, but they're encoded in tacit perception, not explicit retrieval.\n\n### 5. Irreducibly Political Problems\nMental models can diagnose why institutions resist change (incentive-caused bias, commitment and consistency, social proof, etc.) but cannot determine whether change will happen or how to force it. The best models provide structural analysis of power dynamics and entrenched interest; they don't specify action in political contexts where coalition-building, timing, and contingency dominate.\n\nThe failure mode: a well-modeled analysis of \"why this institution is broken\" that doesn't translate into effective action because the models describe dynamics without supplying leverage points.\n\n## The Meta-Point: The Latticework Has a Domain\n\nThe latticework is an excellent general-purpose tool for *reflective judgment in complex, established domains* by *individuals operating across long time horizons*. Its failure modes are mostly predictable expansions of those constraints: strip out the reflective time, remove the established patterns, or enter a domain requiring technical execution rather than judgment, and the approach's advantages diminish or reverse.\n\nMunger himself exhibits characteristic competence within these bounds: he consistently defers to technical experts (geologists, scientists, engineers) and focuses his own model-application on the business and human dimensions where his approach is genuinely powerful.\n\n## Related Concepts\n- [[mental-models]] — the tools in the latticework\n- [[mental-models-and-multidisciplinary-thinking]] — the full framework\n- [[latticework-pedagogy]] — whether it can be taught\n- [[disposition-vs-knowledge]] — the character requirements for applying models well\n"}, {"id": "slow-productivity-and-ai-craft", "title": "Slow Productivity and AI: The Craft-Building Problem", "date": "2026-05-20", "tags": ["productivity", "ai", "craft", "learning", "cognitive-atrophy", "cal-newport"], "related": ["cognitive-atrophy-and-ai", "slow-productivity", "experiment-theater", "pseudo-productivity", "disposition-vs-knowledge"], "category": "concepts", "excerpt": "Slow Productivity and AI: The Craft-Building Problem\n\nCal Newport's slow-productivity framework depends on the accumulation of genuine craft — the quality flywheel operates only if practitioners are actually developing deeper skill over time. AI assi", "content": "---\ntitle: \"Slow Productivity and AI: The Craft-Building Problem\"\ndate: 2026-05-20\ntags: [productivity, ai, craft, learning, cognitive-atrophy, cal-newport]\nrelated: [[slow-productivity]], [[cognitive-atrophy-and-ai]], [[pseudo-productivity]], [[disposition-vs-knowledge]], [[experiment-theater]]\n---\n\n# Slow Productivity and AI: The Craft-Building Problem\n\nCal Newport's [[slow-productivity]] framework depends on the accumulation of genuine craft — the quality flywheel operates only if practitioners are actually developing deeper skill over time. AI assistance creates a specific risk: that the friction Newport identifies as productive (deep engagement with hard problems, seasons of slow struggle) gets bypassed, producing outputs without the underlying skill development that gives the framework its long-term payoff.\n\n## The Craft Dependency\n\nNewport's three principles are asymmetric in their vulnerability to AI disruption:\n\n1. **Do Fewer Things** — unaffected by AI. This is about workload and focus, not about how you execute tasks.\n2. **Work at a Natural Pace** — partially affected. AI can compress calendar time for specific tasks, but the \"seasonal\" rhythm Newport describes (intensity and slack at the career scale) is a structural choice, not a byproduct of task speed.\n3. **Obsess Over Quality** — directly threatened. The quality obsession that drives the flywheel requires developing *judgment* about quality, which requires accumulating failures and revisions over time.\n\nThe third principle is where the tension lives. Newport's examples — Jewel performing relentlessly at small venues, McPhee lying under the ash tree before writing — are illustrations of skill being built through struggle. AI can produce a plausible first draft; it cannot produce the judgment to know that the draft is wrong, which part is salvageable, and why the revision works better.\n\n## The Atrophy Mechanism\n\n[[cognitive-atrophy-and-ai]] identifies the specific failure mode: **chronic atrophy from insufficient practice reps**. The Dreyfus model requires thousands of hours of struggle-with-feedback for expert intuition to develop. AI assistance that eliminates the struggle phase eliminates the reps.\n\nFor slow productivity specifically:\n- Newport's \"quality obsession\" requires taste — a calibrated sense of what excellent work looks like and feels like. Taste develops through: making things, failing, noticing the failure, revising. AI-assisted practitioners who skip the rough draft phase don't develop the sensitivity that makes the quality comparison meaningful.\n- \"Working at a natural pace\" requires knowing your own rhythm — when you're in genuine deep work vs. when you're in avoidance. AI-augmented work can mask the difference: you're producing output, the output looks reasonable, but the slow integrative processing that Newport describes (McPhee's two weeks under the tree) was skipped.\n\n## Where AI Actually Helps Slow Productivity\n\nThe atrophy risk is specific to *generative* and *developmental* tasks at early skill stages. AI is compatible with the slow productivity framework in several ways:\n\n| AI Use | Compatibility with Slow Productivity |\n|---|---|\n| Handling administrative overhead (email drafts, scheduling) | High — frees deep work time for craft |\n| Research and information retrieval | High — expands the raw material without substituting synthesis |\n| Feedback on finished drafts you've already labored over | High — AI as editor after you've done the substantive work |\n| Generating first drafts you then revise substantially | Medium — depends on whether the revision requires and builds judgment |\n| Replacing the struggle phase entirely | Low — eliminates the practice reps that build quality sense |\n\n## The Relevant Heuristic\n\nFrom [[cognitive-atrophy-and-ai]]: *use AI to expand the range of what you can do; avoid using AI to bypass the development of the judgment required to do it well.*\n\nApplied to slow productivity: AI is compatible with the framework when it removes friction that doesn't build craft (administrative burden, repetitive tasks, research overhead) and incompatible when it removes friction that *does* build craft (deep engagement, productive struggle, revision cycles).\n\nNewport's model requires not just output quality but the *development of the practitioner*. The quality flywheel — where great work earns autonomy which creates conditions for more great work — only spins if the practitioner is actually becoming more skilled. AI assistance that produces quality outputs without developing the practitioner's skill stalls the flywheel: the work looks good but the artist hasn't grown.\n\n## The Practical Resolution\n\nFor practitioners trying to use both frameworks:\n1. **Protect generative struggle**: Do the hard first pass yourself. Use AI after you've engaged deeply with the problem, not before.\n2. **Use AI for expansion, not bypass**: Let AI handle tasks where speed is the value (research, formatting, drafts of low-stakes communication). Reserve slow, difficult work for things where the struggle is the point.\n3. **Periodically work without AI assistance** in your core domain — not to be purist, but to maintain the skill baseline that makes your AI-augmented work good rather than merely adequate.\n\n## Related Concepts\n- [[slow-productivity]] — Newport's framework\n- [[cognitive-atrophy-and-ai]] — the atrophy mechanism in detail\n- [[pseudo-productivity]] — what slow productivity is a remedy for; AI misuse can reinstantiate pseudo-productivity in new form\n"}, {"id": "stoic-truth-telling-and-tact", "title": "Stoic Truth-Telling and Tact", "date": "2026-05-20", "tags": ["stoicism", "ethics", "communication", "virtue", "honesty"], "related": ["stoic-justice", "stoic-virtues", "disposition-vs-knowledge", "ryan-holiday"], "category": "concepts", "excerpt": "Stoic Truth-Telling and Tact\n\nThe Stoic framework for navigating the tension between the obligation to speak honestly and the virtue of doing so with care. Marcus Aurelius's formulation: \"Speak the truth as you see it, but with kindness. With humilit", "content": "---\ntitle: \"Stoic Truth-Telling and Tact\"\ndate: 2026-05-20\ntags: [stoicism, ethics, communication, virtue, honesty]\nrelated: [[stoic-justice]], [[stoic-virtues]], [[ryan-holiday]], [[disposition-vs-knowledge]]\n---\n\n# Stoic Truth-Telling and Tact\n\nThe Stoic framework for navigating the tension between the obligation to speak honestly and the virtue of doing so with care. Marcus Aurelius's formulation: *\"Speak the truth as you see it, but with kindness. With humility. Without hypocrisy.\"*\n\n## The Stoic Baseline: Truth as Obligation\n\nHoliday's [[stoic-justice]] treatment is unambiguous on the baseline: truth-telling is not heroism but *obligation*. His recurring examples — Cynthia Cooper (WorldCom), Daniel Ellsberg (Pentagon Papers), Tyler Shultz (Theranos), Li Wenliang (COVID warning) — are framed not as exceptional acts of courage but as what any person of integrity would do. The Solzhenitsyn quote sets the bar: *\"The simple act of an ordinary brave man is not to participate in lies.\"*\n\nFor the Stoics, participation in deception — even through silence, even for socially comfortable reasons — is itself a vice. It is not merely suboptimal; it corrupts the practitioner. The person who stays quiet to avoid discomfort forms the habit of protecting themselves at the expense of truth.\n\n## Where Tact Enters\n\nMarcus Aurelius's prescription adds three modifiers to truth-telling: *kindness*, *humility*, and *non-hypocrisy*. These are not contradictions of the truth obligation — they are specifications of how the virtue should be exercised:\n\n**Kindness**: Truth is not a weapon. A person who uses honest speech primarily to wound, diminish, or assert superiority has turned a virtue into a vice. The *content* of honest communication is constrained only by what you actually believe; the *manner* should reflect genuine care for the recipient. Brutal honesty without kindness is often cruelty wearing virtue's clothes.\n\n**Humility**: \"As you see it\" — not \"as it is.\" Stoic epistemology was fallibilist: we form impressions, and impressions can be wrong. Marcus's daily practice in *Meditations* was to examine his own judgments for distortion. Humility in truth-telling means communicating your honest assessment while acknowledging it may be incomplete or mistaken. \"I believe X, though I may be wrong about Y\" is more honest than a confident declaration that doesn't account for epistemic limits.\n\n**Non-hypocrisy**: You can only hold others to truths you are willing to apply to yourself. Demanding honesty from others while evading it yourself corrupts the act. The whistleblower examples in *Right Thing, Right Now* work precisely because the truth-tellers are applying to institutions the same standard they apply to themselves — they are not exempting themselves from accountability while demanding it of others.\n\n## The False Dichotomy\n\n\"Truth vs. tact\" frames these as in tension. The Stoic view is that they operate on different dimensions:\n\n- **Truth** governs *what* you say: your honest assessment, stated without distortion, omission designed to mislead, or diplomatic untruth\n- **Tact** governs *how* you say it: with care for the person, acknowledgment of your own fallibility, and timing appropriate to the situation\n\nYou can be fully truthful and tactful simultaneously. You cannot be merely tactful without truth — that is not tact but diplomacy in the pejorative sense: protecting comfort at the expense of substance.\n\n## When Tact Becomes an Excuse\n\nThe failure mode is using \"tact\" as a rationalization for avoiding honest communication. Signs of this:\n- \"The timing isn't right\" (when timing becomes perpetually not-right)\n- \"They can't handle it\" (when this is an assumption, not a fact)\n- \"It's not my place\" (when it clearly is)\n- \"I don't want to hurt them\" (when the real motive is avoiding your own discomfort)\n\nThe Stoic test: would a person of complete integrity — who genuinely cares for the recipient and genuinely commits to truth — say what you are planning to say, in the way you plan to say it? If not, adjust either the content or the manner, but don't suppress the communication entirely.\n\n## The Whistleblower as the Extreme Case\n\nHoliday's whistleblowers speak in contexts where tact would counsel silence indefinitely. The cases illustrate that tact, pushed far enough, becomes complicity. The question is not \"is this the tactful moment?\" but \"what does justice require?\" — and then, given that the answer is to speak, how to do it with the most care and least unnecessary harm.\n\n## Related Concepts\n- [[stoic-justice]] — the source text; truth-telling as baseline obligation\n- [[stoic-virtues]] — the cardinal virtues framework\n- [[disposition-vs-knowledge]] — speaking truth requires the *disposition* toward honesty, not just knowing that honesty is good\n"}, {"id": "wisdom-traditions-practice-vs-doctrine", "title": "Wisdom Traditions: Practice vs. Doctrine", "date": "2026-05-20", "tags": ["philosophy", "wisdom", "religion", "character", "behavioral-change"], "related": ["stoic-justice", "Disposition vs. Knowledge", "latticework-pedagogy", "stoic-virtues", "latticework-feedback-loops-outside-investing", "disposition-vs-knowledge", "disposition-building-practices"], "category": "concepts", "excerpt": "Wisdom Traditions: Practice vs. Doctrine\n\nThe empirical question of whether traditions that emphasize doing (meditation, ritual, exercises, vows) produce stronger behavioral outcomes than traditions that emphasize knowing (doctrine, scripture study,", "content": "---\ntitle: \"Wisdom Traditions: Practice vs. Doctrine\"\ndate: 2026-05-20\ntags: [philosophy, wisdom, religion, character, behavioral-change]\nrelated: [[disposition-vs-knowledge]], [[disposition-building-practices]], [[stoic-virtues]], [[stoic-justice]], [[latticework-pedagogy]]\n---\n\n# Wisdom Traditions: Practice vs. Doctrine\n\nThe empirical question of whether traditions that emphasize *doing* (meditation, ritual, exercises, vows) produce stronger behavioral outcomes than traditions that emphasize *knowing* (doctrine, scripture study, theological instruction).\n\n## The Core Finding\n\nPractice-heavy traditions outperform doctrine-heavy ones on behavioral change — but the mechanism is the *practice, community, and repetition* themselves, not the specific doctrinal content. The Stoic morning exercises, Zen sitting, and Confucian ritual propriety may be interchangeable vehicles for the same underlying dispositional development.\n\n## Evidence by Tradition\n\n### Buddhist Meditation\nThe clearest empirical support. Mindfulness-based interventions (MBSR and related protocols derived from vipassanā practice) produce measurable changes in:\n- Self-regulation and emotional reactivity (fMRI studies show structural changes in amygdala response)\n- Attention control and cognitive flexibility\n- Prosocial behavior\n\nCrucially, *reading about mindfulness* does not produce these changes. The practice is load-bearing in a way the doctrine is not. The Buddha's instruction was always behavioral: \"do not merely discuss what is good — do it.\"\n\n### Confucian *Li* (Ritual Propriety)\nConfucianism explicitly theorizes the behavioral pathway. *Li* requires performing the gestures of social respect, filial piety, and courtesy *before* one feels the corresponding virtue — the external behavior produces the internal disposition over time. This is a 2,500-year-old version of the modern habit literature (Duhigg, Wood): behavior change precedes attitude change. Repeated enactment of ritual gestures shapes the practitioner's perceptual and motivational structure.\n\n### Stoic Exercises\nEpictetus was scathing about students who could recite Stoic principles and remained unchanged. His prescription was practice-based: the *premeditatio malorum* (morning visualization of hardships), journaling (Marcus's *Meditations* is a private practice log, not a treatise), and carefully monitored *assent* to impressions throughout the day. The practice structure of Stoicism closely mirrors modern cognitive-behavioral therapy — repeated behavioral exercises, not doctrinal belief.\n\n### Contrast: Academic/Doctrinal Transmission\nThe purest knowledge-only transmission is the modern academic classroom — which is the weakest vector for behavioral change. The behavioral economics literature provides a running demonstration: people who can correctly describe cognitive biases in a lecture room make identical bias-driven errors when the task is framed differently. The knowledge exists; the disposition does not transfer.\n\n## Why Practice Works Where Doctrine Doesn't\n\nFour mechanisms converge:\n\n1. **Encoding in context** — practice-based learning is embedded in real situations (the meditation cushion, the ritual, the actual decision), whereas doctrinal instruction is abstracted from use. Memory research confirms context-dependence: knowledge learned in one setting is less available in a different setting.\n\n2. **Identity formation** — traditions requiring repeated behavioral commitment (daily practice, vows, community membership) leverage identity-consistency effects. Doing Zen sitting daily builds a self-concept as \"a person who sits\" which then motivates further practice and behavioral alignment.\n\n3. **Feedback loops** — practice creates micro-feedback (attention wanders, return to breath; impulse arises, observe it) that trains perceptual sensitivity. Doctrine provides no feedback. See [[latticework-feedback-loops-outside-investing]] for why feedback is the key variable.\n\n4. **Community reinforcement** — practice traditions typically embed practitioners in communities that model and reinforce the behavior. This is the [[disposition-building-practices]] finding: community is the strongest environmental predictor of disposition development.\n\n## The Confound to Watch\n\nMost ostensibly doctrine-heavy traditions (Protestant Christianity, Reform Judaism, secular philosophy) also embed community, prayer, and practice. The experimental comparison is hard to isolate. What the evidence actually suggests: the *practice and community components* within any tradition are doing the causal work; the *doctrinal* component has weak behavioral effect independently.\n\n## Implications for the [[Disposition vs. Knowledge]] Problem\n\nIf the mechanism is practice + community + repetition, then:\n- Choosing between traditions on doctrinal grounds is largely irrelevant to behavioral outcomes\n- What matters is whether a tradition or personal regimen provides: daily behavioral exercises, feedback on execution, a community that models and reinforces the behavior, and identity commitments that make the behavior feel self-consistent\n- A secular person can build equivalent dispositional development through journaling, deliberate practice, accountability structures, and community — without any particular tradition's doctrinal content\n\nSee [[disposition-building-practices]] for a practical framework derived from this conclusion.\n\n## Related Concepts\n- [[disposition-vs-knowledge]] — the parent question this answers\n- [[disposition-building-practices]] — practical applications\n- [[stoic-virtues]] — the Stoic practice tradition\n- [[latticework-pedagogy]] — parallel question for intellectual dispositions\n"}, {"id": "stoicism-and-systemic-injustice", "title": "Stoicism and Systemic Injustice", "date": "2026-05-20", "tags": ["stoicism", "ethics", "justice", "political-philosophy", "systemic-change"], "related": ["stoic-justice", "stoic-virtues", "disposition-vs-knowledge", "ryan-holiday"], "category": "concepts", "excerpt": "Stoicism and Systemic Injustice\n\nThe question of whether Stoic ethics — built around individual conduct and ta eph' hēmin (things up to us) — can address collective, structural injustice, or whether it is inherently limited to personal virtue within", "content": "---\ntitle: \"Stoicism and Systemic Injustice\"\ndate: 2026-05-20\ntags: [stoicism, ethics, justice, political-philosophy, systemic-change]\nrelated: [[stoic-justice]], [[stoic-virtues]], [[ryan-holiday]], [[disposition-vs-knowledge]]\n---\n\n# Stoicism and Systemic Injustice\n\nThe question of whether Stoic ethics — built around individual conduct and *ta eph' hēmin* (things up to us) — can address collective, structural injustice, or whether it is inherently limited to personal virtue within unjust systems.\n\n## The Core Finding\n\nStoicism scales inadequately to systemic critique without supplementation. It excels at *personal conduct within* unjust systems but has no theory of collective action, structural change, or power distribution. The individual Stoic acting justly within an unjust institution can mistake personal virtue for structural remedy.\n\n## What Stoicism Gets Right\n\n### Psychological Endurance for Sustained Reformers\nStoic practice builds the psychological infrastructure for long-term engagement with unjust systems. The *memento mori*, the negative visualization, the clarity about what is and isn't in one's control — these tools allow reformers to sustain effort over years without burning out in frustration at outcomes they can't control.\n\nExamples in Ryan Holiday's framing: Epictetus (a slave) practicing Stoicism had no power to end slavery but could maintain integrity and dignity within that condition. Imprisoned dissidents (Solzhenitsyn, Mandela) drew on Stoic-adjacent frameworks to survive without being psychologically destroyed.\n\n### Anti-Corruption Under Pressure\nThe Stoic insistence that virtue is its own reward and that external outcomes are \"preferred indifferents\" protects reformers from corruption. The risk in long campaigns for structural change is that activists become willing to compromise integrity for results. The Stoic framework resists this: act rightly regardless of outcome. This is why the [[stoic-justice|whistleblower examples]] Holiday emphasizes (Cooper, Ellsberg, Shultz, Li Wenliang) are apt — they all acted correctly without any assurance of good outcomes.\n\n### Truth-Telling as Structural Disruption\nAt scale, individual truth-telling *is* a form of structural action. Solzhenitsyn: \"the simple act of an ordinary brave man is not to participate in lies.\" Multiplied across enough individuals, this creates the conditions for systemic change even without explicit political coordination.\n\n## Where Stoicism Fails\n\n### 1. The Sphere-of-Control Problem\nStoic ethics centers on *ta eph' hēmin* (things up to us): judgments, impulses, desires, aversions. Structural forces — historical patterns of resource allocation, legal frameworks, policy — are emphatically *not* up to us individually. The risk: the framework naturalizes the separation between personal virtue and collective responsibility, encouraging a kind of principled withdrawal (\"I acted rightly\") that leaves systems untouched.\n\n### 2. No Theory of Collective Action\nStoicism has rich individual ethics but almost no account of how individuals should coordinate to change institutions. The Stoics who are remembered most favorably — Cato, Marcus Aurelius — worked within institutions of enormous power. Their model is virtue-within-power, not virtue-organizing-against-power. For people without institutional power, this is a significant gap.\n\n### 3. Self-Congratulation Risk\nThe Stoic who maintains personal justice while tolerating structural injustice can easily mistake the former for the latter. A nurse who treats every patient equitably in a hospital that systematically under-diagnoses Black patients has done something good; she has not addressed the structural problem. The framework provides insufficient friction against this conflation.\n\n## The Supplement: Political Philosophy\n\nThe missing pieces are a theory of *distribution* and *power* — which is where political philosophy supplements Stoicism's individual-level framework:\n\n- **Rawls** (justice as fairness) provides a theory of what just institutional arrangements would look like, against which existing structures can be evaluated\n- **Nussbaum's capabilities approach** grounds justice in what conditions humans need to actually flourish — more tractable for structural critique than Stoic virtue ethics\n- **Political economy frameworks** (class analysis, institutional analysis) provide models of how structural change happens that Stoicism doesn't attempt\n\nThe relationship is additive, not competitive: Stoicism supplies the character infrastructure for individuals engaged in structural change (integrity, psychological endurance, anti-corruption); political philosophy supplies the analytical framework for what structural change should look like and how to pursue it.\n\n## Practical Integration\n\nFor someone pursuing structural change:\n1. Use Stoic practice for personal psychological maintenance — the tools f
