 "category": "concepts", "excerpt": "AI Tutoring\n\nThe use of large language models to provide personalized, interactive tutoring at scale — the closest technological\napproach to Benjamin Bloom's \"2 Sigma\" ideal of one-on-one instruction.\n\nThe Bloom 2 Sigma Problem\n\nBenjamin Bloom (1984)", "content": "---\ntitle: \"AI Tutoring\"\ndate: 2026-05-19\ntags: [education, AI, LLMs, personalized-learning]\nrelated: [[ai-in-education]], [[sal-khan]], [[large-language-models]], [[jagged-frontier]], [[cognitive-atrophy-and-ai]]\n---\n\n# AI Tutoring\n\nThe use of large language models to provide personalized, interactive tutoring at scale — the closest technological\napproach to Benjamin Bloom's \"2 Sigma\" ideal of one-on-one instruction.\n\n## The Bloom 2 Sigma Problem\n\nBenjamin Bloom (1984) documented that students tutored one-on-one performed 2 standard deviations above\nclassroom-taught peers. The catch: there aren't enough human tutors to deliver this at scale and cost. AI tutoring\nis the first plausible path to solving Bloom's problem.\n\n## Design Principles (from Khanmigo)\n\n- **Socratic over answer-giving**: Prompt the AI to ask leading questions, not provide solutions. GPT-4's\n  steerability (vs. GPT-3.5) made this feasible — earlier models would revert to giving answers no matter the prompt.\n- **Role maintenance**: AI can take on consistent personas (Socratic tutor, historical figure, debate partner)\n  throughout a session\n- **Safety by design**: Guardrails for minors, appropriate tone, avoidance of harmful content — must be designed in\n  before deployment, not added after\n\n## Capabilities Beyond Tutoring\n\nModern AI tutoring systems can:\n- Role-play historical and literary figures for immersive learning\n- Serve as debate opponents (student argues a position; AI argues the other side)\n- Act as guidance counselors and career coaches\n- Generate practice assessments adapted to individual progress\n- Help teachers with lesson planning, student progress analysis, and administrative tasks\n\n## Risks and Limits\n\n- **Cognitive atrophy**: If students use AI to *avoid* thinking rather than to *deepen* it, the tutoring\n  becomes counterproductive. See [[cognitive-atrophy-and-ai]].\n- **Jagged frontier failures**: AI may be excellent on some topics and quietly wrong on others; students may\n  not be able to detect the errors. See [[jagged-frontier]].\n- **Equity**: High-quality AI tutoring requires device access, internet connectivity, and often subscription fees —\n  potentially widening rather than closing educational gaps unless deployed intentionally.\n\n## Related Topics\n- [[ai-in-education]] — Khan's full argument\n- [[large-language-models]] — the underlying technology\n- [[growth-mindset]] — Dweck's framework suggests AI tutoring works best when students approach it with\n  a growth orientation, using failure as information\n"}, {"id": "contemporary-romanticized-illnesses", "title": "Contemporary Romanticized Illnesses", "date": "2026-05-19", "tags": ["illness", "culture", "narrative", "mental-health", "social-media", "health-equity"], "related": ["romanticization-of-illness", "illness-narrative-and-coping", "tuberculosis-and-global-health", "health-equity"], "category": "concepts", "excerpt": "Contemporary Romanticized Illnesses\n\nWhich present-day diseases carry framings analogous to TB's \"artist's disease\" myth — illnesses that have been aestheticized, mythologized, or attached to desirable identity traits in ways that obscure the underly", "content": "---\ntitle: \"Contemporary Romanticized Illnesses\"\ndate: 2026-05-19\ntags: [illness, culture, narrative, mental-health, social-media, health-equity]\nrelated: [[romanticization-of-illness]], [[illness-narrative-and-coping]], [[tuberculosis-and-global-health]], [[health-equity]]\n---\n\n# Contemporary Romanticized Illnesses\n\nWhich present-day diseases carry framings analogous to TB's \"artist's disease\" myth — illnesses that have been aestheticized, mythologized, or attached to desirable identity traits in ways that obscure the underlying pathology and redistribute political sympathy. Extends the [[romanticization-of-illness]] analysis from the 19th-century case to the 21st-century landscape.\n\n## The Pattern to Look For\n\nDrawing on the structural test from [[romanticization-of-illness]] and [[illness-narrative-and-coping]], a contemporary illness is \"romanticized\" when it exhibits some combination of:\n\n1. **Symptoms recoded as desirable traits** (pallor → spiritual purity in TB; insomnia → drive; thinness → discipline)\n2. **The disease attached to a flattering identity** (artist's disease; high performer's affliction; tortured genius)\n3. **Sympathy concentrated on a subset of sufferers** (typically the educated and economically secure) while others bearing the same diagnosis are stigmatized or ignored\n4. **Treatment access shaped by the romantic framing** — care infrastructure clustered around the \"deserving\" subset\n5. **Cultural production reinforcing the loop** — memoirs, films, viral content, fashion aesthetics that recycle the romance\n\n## The Major Contemporary Cases\n\n### Depression and Anxiety as \"Creative Sensitivity\"\n\nThe most widely diffused contemporary romanticization is the linkage between mood and anxiety disorders and creative or perceptual gifts. Manifestations:\n\n- The \"tortured artist\" trope mapped to clinical depression — writers, musicians, comedians.\n- The \"highly sensitive person\" framing that recodes anxiety vulnerability as superior perception.\n- The \"anxious overachiever\" identity that flatters anxiety as the price of high performance.\n\n**Sontag test:** Causal assignment is partly inverted (illness is not caused by moral failing; it is the price of insight). But sympathy concentrates on the productive and articulate, while severe clinical depression — catatonia, treatment-resistant cases, depression in the unhoused — receives no aesthetic protection. The romantic framing makes mild-to-moderate depression *easier* to talk about and, paradoxically, the worst cases harder to see.\n\nThis is the question explicitly flagged in [[romanticization-of-illness]]. The [[illness-narrative-and-coping]] resolution applies: community-building uses of the narrative are not necessarily harmful, but the asymmetric political sympathy it produces is the recognizable TB-pattern.\n\n### ADHD as \"Superpower\" or \"Different Brain\"\n\nOver the past two decades, ADHD has acquired a distinctive romantic framing: not a disorder but a *cognitive style*, often paired with claims of creative advantage, entrepreneurial drive, or hyperfocus as a gift. Manifestations:\n\n- \"ADHD is a superpower\" book and TED-talk genre\n- The hyperfocus-as-asset framing\n- Identification with entrepreneurial / inventive archetypes (the \"scattered genius\")\n\n**Sontag test:** This framing reduces stigma (a real gain) but recodes symptoms as features and is most legible for high-functioning, economically supported patients. The framing rarely accommodates ADHD presenting as job loss, criminal-justice involvement, school failure, or substance use — outcomes more common in under-resourced populations with the same diagnosis. The romantic framing distributes sympathy unevenly even within a single diagnostic category.\n\n### Autoimmune Disease as \"Body Attacking Itself\"\n\nAutoimmune conditions (lupus, MS, rheumatoid arthritis, Crohn's, Hashimoto's) have acquired a metaphorical framing — *the body at war with itself* — that has both supportive and harmful aspects.\n\n**Sontag test:** The framing **does not assign moral blame**, which would have been the punitive form (\"you brought this on yourself with stress\"). But it does aestheticize the disease as internal conflict, with the patient cast as battlefield. The \"spoonie\" identity (Christine Miserandino's spoon theory) is a partly romantic framing — solidarity-building and useful, but also creating an identity around chronic illness that can become a barrier to integration. As [[illness-narrative-and-coping]] notes, over-identifying with the sick role correlates with poorer outcomes.\n\n### Cancer as \"Warrior\" / \"Journey\"\n\nThe cancer-as-battle narrative is one of the most analyzed contemporary metaphors (Sontag herself extended *Illness as Metaphor* with *AIDS and Its Metaphors* in 1989). Manifestations:\n\n- \"Battling cancer,\" \"cancer warrior,\" \"lost their battle\"\n- Pink ribbon culture as aesthetic and identity\n- \"Cancer changed my life for the better\" survivor narratives\n\n**Sontag test:** Sontag flagged this pattern in 1978 and it has only intensified. The warrior frame can be empowering (agency restoration — see [[illness-narrative-and-coping]]) but also implies that *losing* the battle reflects insufficient will. The pink-ribbon aesthetic concentrates resources on a particular framing of breast cancer that is more culturally legible than, e.g., metastatic, lung, or pancreatic cancer. Patient advocates within the breast cancer community have themselves objected to the romanticization of \"survivorship\" as obscuring metastatic patients who will not survive.\n\n### Eating Disorders as \"Discipline\" or Aesthetic\n\nEating disorders — particularly anorexia nervosa — carry one of the most dangerous contemporary romanticizations because the symptoms (thinness, control of intake) are not just aestheticized but actively desired by the surrounding culture.\n\n**Sontag test:** This is the closest modern analog to TB's \"consumption is beauty\" frame. Symptoms are read as virtue (discipline, willpower, beauty); the disease is associated with a high-status, educated, often female demographic; treatment access is uneven; cultural production (fashion, \"thinspiration\") actively reinforces the disease as ideal. Pro-ana online communities are the explicit, undisguised version of what TB's literary and salon culture did implicitly in the 19th century.\n\nThe harm here is especially acute because the symptoms themselves are reinforced by the romantic framing — losing weight produces social reward in a way that night sweats and hemoptysis never did.\n\n### Bipolar Disorder as \"Manic Genius\"\n\nThe Kay Redfield Jamison *Touched with Fire* tradition — manic-depressive illness linked to artistic genius — is the bipolar version of the TB-as-artist's-disease frame.\n\n**Sontag test:** The hypomanic episode (productivity, expansive thinking) is recoded as gift; the depressive episode and the destructive consequences of full mania (debt, broken relationships, hospitalization, suicide) are deprioritized in the public framing. The romance applies most legibly to artists with the resources to recover between episodes; it does not apply to patients with bipolar disorder who become homeless or incarcerated.\n\n### Long COVID and Chronic Fatigue Conditions\n\nA newer case, with both stigmatization (often dismissed as malingering or hypochondria, particularly in women) and emerging romantic counter-framings (the suffering high-achiever cut down at her peak). [[illness-narrative-and-coping]] applies: the political stakes are which framing wins, because that determines whether research funding and disability accommodation follow.\n\n### Addictive Disorders — The Bohemian Romance\n\nSubstance use disorders, particularly involving opioids, alcohol, and stimulants, carry persistent romantic framings in artistic and literary culture — Beat Generation drug use, the rock-star overdose, the \"tortured genius drinks himself to death\" template (Hemingway, Fitzgerald, Kerouac).\n\n**Sontag test:** Romance attaches to the famous and the productive; the same addiction in poor, non-white, or rural populations is criminalized rather than aestheticized. The unequal treatment of crack vs. powder cocaine in 1980s–90s U.S. drug policy is a textbook example of the same disease producing radically different cultural responses based on who has it.\n\n## How Social Media Changes the Pattern\n\n[[romanticization-of-illness]] flags this as a separate open question; it is so entangled with the contemporary romanticization landscape that it cannot be cleanly separated:\n\n- **Aestheticization is faster and more visual.** TikTok and Instagram condense illness into images and short clips that select for visual legibility (thin bodies, tearful confessionals, \"this is what depression looks like\" aesthetics). The selection bias is stronger than in any prior medium.\n- **Community formation is real and double-edged.** Patients with rare or stigmatized conditions can find peers in ways unavailable to 19th-century consumptives. This is a genuine gain (see [[illness-narrative-and-coping]] on community formation). It can also produce identity-stickiness around the diagnosis itself.\n- **Self-diagnosis and \"diagnosis influencers\" reshape who claims an illness.** ADHD, autism, dissociative disorders, and chronic illness all show contemporary patterns of online communities expanding the population that identifies with the diagnosis, sometimes with limited clinical confirmation.\n- **Algorithmic amplification rewards engagement, not accuracy.** The most viral illness content is rarely the most representative; the platform's incentives produce a romantic skew.\n\n## The Test, Restated\n\nThe TB pattern from [[romanticization-of-illness]] is not \"any positive framing of illness is harmful.\" The [[illness-narrative-and-coping]] resolution is that meaning-making, agency restoration, and community formation are legitimate uses of illness narrative. The harmful pattern is specifically:\n\n> **Sympathy concentrated on the legible, productive, articulate, or aesthetically congruent subset of patients, with structural neglect of the rest.**\n\nThe contemporary cases above mostly satisfy this test. The lesson Green draws from TB applies to all of them: *how we narrate disease determines who is allowed to die*. Eating disorders make the point most starkly; depression and cancer make it most pervasively; ADHD and long COVID make it most quietly.\n\n## Implications\n\n- **Patient narrative tools** (the [[illness-narrative-and-coping]] argument) are not the problem and should not be sacrificed to fight romanticization.\n- **Public discourse** about an illness needs auditing against the Sontag test: who does this framing make legible, and who does it erase?\n- **Health-system accommodation** should track whether resources follow the romantic frame (depression treatment for the productively anxious) or the disease burden (severe depression where it co-occurs with poverty, addiction, housing instability).\n- **Cultural production** — books, films, viral content — about illness is not neutral; its incentives are toward romance, and the corrective is conscious editorial counter-pressure.\n\n## Related Topics\n- [[romanticization-of-illness]] — the parent concept and the TB case\n- [[illness-narrative-and-coping]] — the patient-side corrective that preserves narrative without endorsing romance\n- [[tuberculosis-and-global-health]] — the historical paradigm case\n- [[health-equity]] — the structural framework romanticization operates within\n"}, {"id": "focusing-question", "title": "Focusing Question", "date": "2026-05-19", "tags": ["productivity", "focus", "prioritization", "decision-making"], "related": ["mental-models", "slow-productivity", "inversion", "gary-keller", "the-one-thing"], "category": "concepts", "excerpt": "Focusing Question\n\nGary Keller's core tool from The ONE Thing:\n\n> \"What's the ONE thing I can do such that by doing it, everything else will be easier or unnecessary?\"\n\nHow It Works\n\nThe question forces prioritization by elimination — not adding the", "content": "---\ntitle: \"Focusing Question\"\ndate: 2026-05-19\ntags: [productivity, focus, prioritization, decision-making]\nrelated: [[the-one-thing]], [[gary-keller]], [[mental-models]], [[inversion]]\n---\n\n# Focusing Question\n\nGary Keller's core tool from *The ONE Thing*:\n\n> **\"What's the ONE thing I can do such that by doing it, everything else will be easier or unnecessary?\"**\n\n## How It Works\n\nThe question forces prioritization by *elimination* — not adding the most important task to a list, but identifying\nthe single action whose completion would most change the landscape of what comes next. The key phrase: \"easier or\nunnecessary.\" A good ONE Thing doesn't just accomplish something; it clears the path for future progress.\n\n## Scales of Application\n\nThe question applies at every time horizon:\n- **Life**: What is the ONE thing I want my life to be about?\n- **5-year**: What is the ONE thing I can do in the next five years toward that life?\n- **Annual**: What ONE thing would make this year the foundation for the next?\n- **Monthly/weekly**: What ONE thing can I do this week such that everything else becomes easier or unnecessary?\n- **Daily**: What is the first, most important thing to accomplish today?\n\nUsed consistently, this creates the [[the-one-thing|domino effect]] — each completion sequences into the next priority.\n\n## Why It Works\n\n- Forces *sequential* thinking over *simultaneous* prioritization\n- Surfaces the *lead domino* — the action that, by moving, moves other things\n- Eliminates the decision overhead of managing complex priority systems\n- Creates momentum through completion rather than perpetual work-in-progress\n\n## Relationship to Other Frameworks\n\n- [[inversion]]: the focusing question is a form of forward-reasoning inversion — start with the outcome you want,\n  work backward to the most leveraged action\n- [[mental-models]]: a heuristic that belongs in the working toolbox alongside Munger's checklist\n- [[slow-productivity]]: Newport's \"do fewer things\" is the structural twin — reduce active obligations (Newport)\n  and within those obligations, identify the most leveraged action (Keller)\n\n## Limitation\n\nThe question assumes you can identify what \"easier or unnecessary\" means — which requires a clear vision of what\nyou're optimizing for. Without that, the focusing question just gives a feeling of clarity without the substance.\n"}, {"id": "bubble-finance", "title": "Bubble Finance", "date": "2026-05-19", "tags": ["economics", "monetary-policy", "finance", "markets"], "related": ["sound-money", "crony-capitalism", "david-stockman", "crony-capitalism-and-monetary-deformation"], "category": "concepts", "excerpt": "Bubble Finance\n\nBubble finance is David Stockman's term for a monetary regime in which central banks repeatedly prop up asset prices, suppress interest rates, and encourage speculation rather than allowing markets to clear. In his account, bubble fin", "content": "---\ntitle: \"Bubble Finance\"\ndate: 2026-05-19\ntags: [economics, monetary-policy, finance, markets]\nrelated: [[crony-capitalism-and-monetary-deformation]], [[sound-money]], [[crony-capitalism]]\n---\n\n# Bubble Finance\n\nBubble finance is [[david-stockman|David Stockman]]'s term for a monetary regime in which central banks repeatedly prop up asset prices, suppress interest rates, and encourage speculation rather than allowing markets to clear. In his account, bubble finance is the financial mechanism behind modern [[crony-capitalism]].\n\n## Key Properties\n\n- **Asset-price reflation** — downturns are met by policies that revive stocks, housing, credit, or leveraged buyout markets.\n- **Distorted risk pricing** — cheap money makes bad debts and speculative bets look safer than they are.\n- **Bailout expectations** — investors assume the state or central bank will intervene when losses threaten large financial institutions.\n- **Real-economy weakness** — financial gains mask stagnant productivity, wages, and productive investment.\n\n## Related Topics\n\n- [[crony-capitalism-and-monetary-deformation]] — the main Stockman synthesis\n- [[sound-money]] — the monetary discipline bubble finance displaces\n- [[crony-capitalism]] — the political economy bubble finance reinforces\n"}, {"id": "mapping-the-jagged-frontier", "title": "Mapping the Jagged Frontier — A Profession-by-Profession Approach", "date": "2026-05-19", "tags": ["ai", "productivity", "work", "llm", "learning", "skill-development"], "related": ["cognitive-atrophy-and-ai", "ai-tutoring", "ethan-mollick", "large-language-models", "jagged-frontier", "living-and-working-with-ai"], "category": "concepts", "excerpt": "Mapping the Jagged Frontier — A Profession-by-Profession Approach\n\nHow workers in any given profession should invest mapping effort to locate the jagged frontier of AI capability across the tasks that actually compose their work — and what the Mollic", "content": "---\ntitle: \"Mapping the Jagged Frontier — A Profession-by-Profession Approach\"\ndate: 2026-05-19\ntags: [ai, productivity, work, llm, learning, skill-development]\nrelated: [[jagged-frontier]], [[living-and-working-with-ai]], [[ethan-mollick]], [[cognitive-atrophy-and-ai]], [[large-language-models]]\n---\n\n# Mapping the Jagged Frontier — A Profession-by-Profession Approach\n\nHow workers in any given profession should invest mapping effort to locate the [[jagged-frontier|jagged frontier]] of AI capability across the tasks that actually compose their work — and what the [[ethan-mollick|Mollick]] research suggests about who reaps the gains.\n\n## Why Mapping Is a Personal Project\n\n[[living-and-working-with-ai]] establishes the structural feature that makes mapping necessary: the frontier is **irregular and invisible**. Tasks that look similar in difficulty can be on opposite sides; the only way to find out is to experiment. The implication Mollick stresses repeatedly: **the world's leading expert on AI for your specific role is going to be you**, because no research team has your task inventory and no general benchmark captures the friction points of your day.\n\nMapping cannot be outsourced to industry reports or vendor demos. Industry-level studies (Felten, Raj, and Seamans found AI overlap with 980 of 1,016 occupations — see [[living-and-working-with-ai]]) tell you that your job overlaps; they do not tell you which 11 of your 40 weekly tasks the overlap actually lands on.\n\n## The Mapping Method\n\nA practical mapping protocol, derived from Mollick's \"invite AI to everything\" principle:\n\n1. **Inventory tasks at a fine enough grain.** \"Writing\" is too coarse. Break into: drafting cold emails, summarizing meeting notes, generating outlines, copy-editing, writing technical explanations of code, writing performance reviews, writing client-facing memos. Each of these sits in a different place on the frontier.\n2. **Try each task with AI three times.** Mollick's note that consultants in the BCG study were \"simply pasting in the questions\" describes the failure mode of insufficient mapping. One try doesn't reveal whether a task is inside, outside, or on the edge of the frontier; three tries with different prompts establishes a rough probability.\n3. **Score on two axes.** Capability (did the AI produce something useful?) and **confidence-calibration** (did it admit when it didn't know, or did it confabulate?). The Dell'Acqua \"falling asleep at the wheel\" study (181 recruiters evaluating 44 resumes) shows that confident wrong answers from AI are the dangerous case — they corrupt human judgment more than visible failures.\n4. **Mark the edges.** The most valuable knowledge is not \"AI is good at X\" but \"AI is good at X except when X involves Y\" — counting words, exact arithmetic, recent events, citations, applying domain-specific rules. These exceptions are where the frontier turns.\n5. **Re-run quarterly.** Capability improves; the frontier moves. Mollick's fourth rule — \"assume this is the worst AI you'll ever use\" — is mapping advice as well as adoption advice. Cached mental maps go stale within months.\n\n## Where the Frontier Currently Falls — By Profession\n\nThe patterns below summarize what *Co-Intelligence* and the wiki's existing [[cognitive-atrophy-and-ai]] page identify; in every case the personal mapping is what matters, not the table.\n\n### Software development\n- **Inside (high capability):** boilerplate, regex, type-safety refactors, translating between languages, drafting tests for known interfaces, explaining unfamiliar code, generating standard React/SQL/API patterns.\n- **Edge:** complex debugging, architecture decisions with conflicting constraints, performance tuning that requires runtime measurement.\n- **Outside:** anything requiring true reasoning about state across long codebases, security-sensitive correctness, novel algorithm design.\n\n### Clinical medicine\n- **Inside:** literature summary, differential diagnosis brainstorming, patient-facing explanation of known conditions, note dictation cleanup, ICD coding assistance.\n- **Edge:** triage on ambiguous presentations, weighing competing guidelines.\n- **Outside:** physical exam interpretation, the implicit communication of patient cues, decisions where the cost of confident error is catastrophic.\n\n### Law\n- **Inside:** first-pass document summarization, clause comparison, drafting standard contract language, explaining doctrine to a client.\n- **Edge:** issue-spotting in novel facts.\n- **Outside:** citations (LLMs fabricate cases — the Mata v. Avianca pattern), jurisdiction-specific rule application, strategic judgment about what to argue.\n\n### Management consulting (Mollick's BCG-studied population)\n- **Inside:** the 18 BCG tasks — idea generation, market segmentation, draft press releases, internal memos. Consultants using AI were faster, judged more creative, better written, and more analytical.\n- **Outside:** the one BCG task designed with \"a tricky statistical issue and misleading data\" — unaided consultants got it right 84% of the time; AI-aided consultants got it right only 60–70%, because the AI gave a confident wrong answer they did not catch.\n\n### Teaching\n- **Inside:** lesson plan drafts, differentiated explanation of a concept at multiple levels, generating practice problems, feedback on student drafts.\n- **Edge:** formative assessment design, calibrating challenge to a specific student.\n- **Outside:** the relational/motivational work that drives engagement (the question from [[ai-tutoring]] about whether AI tutoring replicates the motivational component).\n\n### Writing / journalism\n- **Inside:** research summarization, outline generation, headline brainstorms, copy-editing, format translation (article → newsletter → social).\n- **Edge:** synthesizing across multiple sources with conflicting framings.\n- **Outside:** original reporting (interviews, document access), voice with sustained idiosyncrasy, fact-claims that require source-of-record verification.\n\n### Design (UX, visual)\n- **Inside:** moodboard generation, variation on a brief, design-token / style-guide drafting, icon and illustration first passes.\n- **Edge:** layout decisions on real product data, accessibility-trade-off design.\n- **Outside:** anything requiring familiarity with the actual user base or the surrounding product context the AI has not seen.\n\n### Marketing / sales\n- **Inside:** ad copy variants, segmentation hypotheses, persona drafts, follow-up email templates.\n- **Outside:** account-specific positioning that requires institutional memory, judgment about timing and trust-building in real relationships.\n\n### Research (academic, market, scientific literature)\n- **Inside:** summarization of long papers (Mollick's own admitted use), generating reading lists, translating jargon across subfields.\n- **Outside:** evaluating novelty against the actual frontier of a field (where the AI's training cutoff matters), reasoning over evidence quality, conducting experiments.\n\nThe pattern across all professions: **AI handles \"first draft of known-shape work\" well and handles \"judgment under uncertainty with downside risk\" badly.** This is the practical heuristic; mapping is how you locate the actual edge for your specific tasks.\n\n## How to Invest Mapping Effort\n\nTime spent mapping is a real cost. The investment logic:\n\n### Prioritize high-volume, low-stakes-of-error tasks first\nThese are where AI's expected value is highest and the downside is bounded. Mollick's \"Delegated Task\" category — tedious, repetitive, low-importance — is where mapping pays off fastest. Discover the inside-frontier tasks here, redeploy the freed time.\n\n### Avoid early reliance on tasks where you'd be the only check\nFor tasks where there's no downstream reviewer (you are the senior partner, the tenured professor, the staff engineer of record), the \"falling asleep at the wheel\" risk is highest. Map carefully; preserve manual practice; treat AI as a second opinion, not the first answer.\n\n### Identify your \"Just Me\" tasks explicitly\nMollick's category — tasks you choose to keep human even if AI could do them — is not a mapping output but a mapping input. Voice, relationship-building, ethical decisions, anything where the *process* of doing it matters as much as the output. Decide before you delegate, not after.\n\n### Re-map after each model release\nFrontier movement is the single biggest reason cached judgments fail. A task that was outside the frontier on GPT-4 may be inside on GPT-5. Schedule mapping reviews — quarterly is roughly right for current model release cadence — and treat them as professional development, not optional experimentation.\n\n### Map across the Centaur and Cyborg modes\nMollick's distinction: **Centaur** work has a clear hand-off (you do A, AI does B); **Cyborg** work intertwines (AI completes your sentence, you redirect, repeat). The frontier looks different in each mode. The same task that fails when fully delegated may succeed when iteratively co-produced. Mapping should include both modes, not just one.\n\n## What Investment Mapping Does *Not* Replace\n\nThe mapping investment locates the frontier; it does not by itself solve the [[cognitive-atrophy-and-ai|cognitive atrophy]] problem. Mapping tells you that AI is good at a task; the question of whether you should *let* AI do that task — especially during your formative years in the discipline — is separate. Mollick's \"be the human in the loop\" is necessary but underdetermined; the atrophy page argues that the threshold between augmentation and atrophy shifts with expertise level.\n\nCombined recommendation:\n\n- **Novices** should map cautiously and deliberately preserve unaided practice on tasks where the expert intuition is still forming.\n- **Senior practitioners** can map aggressively and delegate broadly — the underlying judgment is already built and can catch AI errors.\n- **Everyone** should treat the personal frontier map as a living document, owned by them, not by their employer or industry analyst.\n\nThe mapping investment is high-leverage because the cost is small (an afternoon's experimentation) and the asset is durable (a personal protocol that compounds over a career as the frontier moves). It is also non-substitutable: no vendor, employer, or research report can give you your specific map.\n\n## Source\n- `raw/books/Ethan Mollick - Co-Intelligence_ Living and Working With AI (2024, Penguin Publishing Group).epub` — especially Ch. 3 (\"Four Rules for Co-Intelligence\") and Ch. 6 (\"AI as a Coworker\")\n\n## Related Topics\n- [[jagged-frontier]] — the concept this page operationalizes\n- [[living-and-working-with-ai]] — the broader Mollick framework\n- [[ethan-mollick]] — the researcher\n- [[cognitive-atrophy-and-ai]] — the cost side of aggressive mapping\n- [[large-language-models]] — the technology defining the frontier\n"}, {"id": "munger-disposition-formation", "title": "Munger's Disposition Formation — Pre-30 Substrate vs. Adult Cultivation", "date": "2026-05-19", "tags": ["thinking", "biography", "character", "wisdom", "mental-models"], "related": ["latticework-pedagogy", "mental-models-and-multidisciplinary-thinking", "charlie-munger", "disposition-vs-knowledge", "disposition-building-practices"], "category": "concepts", "excerpt": "Munger's Disposition Formation — Pre-30 Substrate vs. Adult Cultivation\n\nA biographical reading of how Munger's latticework disposition was assembled — separating the traits and habits that were already in place before he turned 30 from those he deli", "content": "---\ntitle: \"Munger's Disposition Formation — Pre-30 Substrate vs. Adult Cultivation\"\ndate: 2026-05-19\ntags: [thinking, biography, character, wisdom, mental-models]\nrelated: [[charlie-munger]], [[disposition-vs-knowledge]], [[latticework-pedagogy]], [[disposition-building-practices]], [[mental-models-and-multidisciplinary-thinking]]\n---\n\n# Munger's Disposition Formation — Pre-30 Substrate vs. Adult Cultivation\n\nA biographical reading of how [[charlie-munger|Munger's]] latticework disposition was assembled — separating the traits and habits that were already in place before he turned 30 from those he deliberately cultivated afterward. The split matters because [[disposition-vs-knowledge]] argues that latticework is more selected for than installed; Munger himself is the central case study.\n\n## The Short Answer\n\nThe **disposition was largely formed before age 30**; the **latticework framework and its specifically Munger-flavored elaboration were cultivated afterward**. Without the pre-30 substrate, the adult practices would not have produced what they produced. Without the adult cultivation, the substrate would have produced an unusually well-read lawyer rather than the Munger of Berkshire Hathaway.\n\n## What Was Already in Place Before 30\n\nFrom the biographical material in *Poor Charlie's Almanack* (the Broggie portrait), several dispositional features are visible by the time Munger leaves Harvard Law School in 1948 (age 24) and were certainly stable by his 30th birthday in 1954:\n\n### Voracious, biographical, cross-disciplinary reading\n\nMunger was reading before he started school (his mother taught him to read phonically and pushed him ahead a grade). His parents gave each child several books at Christmas, \"usually devoured by that night.\" By 14 he was reading Dr. Ed Davis's medical journals and watching surgical films. At the University of Michigan he chose mathematics, then took physics as a requirement and \"was fascinated by the power of physics and its boundless reach.\" The Caltech meteorology training added thermodynamics. **The habit of reading across disciplines preceded any theory of *why* it was useful** — Munger later said as much: \"I read voraciously before I had any framework for why it was useful.\"\n\n### Befriending the \"eminent dead\"\n\nThe Franklin admiration starts in childhood. Munger said later, \"I am a biography nut myself … if you go through life making friends with the eminent dead who had the right ideas, I think it will work better for you in life and work better in education.\" The Franklin imprint — financial independence as a means to public usefulness, polymathic curiosity, plain-prose self-presentation — is visible in the 1950s Munger before any contact with Buffett.\n\n### Comfort with contrarianism\n\nTeachers remembered him as \"a bit of a wiseacre\" who challenged conventional wisdom of teachers and fellow students. At Harvard Law School he was \"abrupt … often interpreted as rudeness\" because pleasantries were of little concern to him. The willingness to be the odd-one-out — what later becomes resistance to the \"institutional imperative\" — predates any deliberate philosophical commitment.\n\n### Logical / quantitative cast of mind\n\nThe Army measured his IQ \"at the top of the curve.\" Mathematics at Michigan, then meteorology training at Caltech, then magna cum laude at Harvard Law (12 of 335). The Fermat-Pascal probability reflex Munger later urged on USC students — he had the substrate for it by the time he was practicing law.\n\n### Hard-times stoicism\n\nThree formative shocks landed before he turned 30:\n1. The Depression, watched up close in 1930s Omaha (hobos, his grandfather risking half his net worth to rescue a relative's bank).\n2. Divorce at 28.\n3. The death of his son Teddy from leukemia at 29 — Munger walking the streets of Pasadena crying between hospital visits.\n\nThe Stoic disposition — accepting what cannot be changed, refusing self-pity, getting back to useful work — is hard to teach and is the part of Munger most aligned with Aristotle's *phronesis*. It was forged by 30 in a way that pure instruction cannot replicate.\n\n### Financial independence as a goal, not wealth as a goal\n\nBy age 30 Munger was already operating on the Franklin / Keynes model: wealth instrumentally, as a route to \"intellectual freedom and genuine autonomy.\" The adult investing career executes this premise; it does not invent it.\n\n## What Was Deliberately Cultivated After 30\n\nThe latticework as a *system* — and the specific Munger contributions to it — were built between roughly age 35 (the 1959 dinner with Buffett) and his 70s:\n\n### The Buffett partnership and its conversational feedback loop\n\nAt 35 Munger met Buffett (29). The biography describes nine-page letters and \"frequent telephone conversations.\" This is the institutional structure that [[disposition-building-practices|disposition-building practices]] identifies as essential — a partner who tests reasoning, asks \"why, why, why,\" and provides high-bandwidth feedback. **Without Buffett, there is no Munger latticework as a public artifact.** The substrate would have remained private.\n\n### Real-stakes investment decisions with consequences\n\nWheeler, Munger & Co. (1962–1975) compounded at 19.8 percent gross over 14 years but suffered back-to-back drawdowns of 31.9 percent and 31.5 percent in 1973–74 — at ages 49–50. The 1973–74 drawdown is the kind of disposition test [[disposition-vs-knowledge]] flags: holding a model under pressure when the market disagrees. Munger held; the partnership rebounded 73.2 percent in 1975. **The disposition was tested at a level that childhood reading cannot supply.**\n\n### The explicit articulation of the latticework\n\nThe 1994 USC talk (\"Elementary Worldly Wisdom\") is Munger at 70 — the framework comes out clearly only after 35+ years of using it. The \"psychology of human misjudgment\" catalog is similarly a product of long observation, not early formation. The articulation is adult; the disposition behind it is not.\n\n### Lifelong reading as deliberate practice\n\nThe reading habit existed before 30; reading *with the explicit aim of accumulating mental models* is post-Buffett. Munger reframed his pre-existing curiosity as systematic model-collection, which is itself a Buffett-era invention.\n\n## What This Means for [[latticework-pedagogy]]\n\nThe decomposition supports the [[latticework-pedagogy|latticework pedagogy]] conclusion that the approach is \"cultivated partially, selected for mostly.\" The dispositional substrate Munger brought to 1959 — voracious cross-disciplinary reading, contrarianism, Stoic equanimity from real loss, quantitative reflex, financial-independence orientation — is *exactly* the trait profile that [[latticework-pedagogy]] flags as resistant to instruction. Adult cultivation refined the framework, the language, and the cases. It did not install the substrate.\n\nIf a pedagogy hopes to produce many Mungers, the implication is uncomfortable: most of the formation has to happen by 30, in environments (heavy reading from age 5, real hardship, intellectually serious parents, mentors like Dr. Davis) that are not curricular. After 30 the leverage is real — Munger gained enormously from the Buffett partnership — but the leverage operates on substrate that was already there.\n\n## The Aristotelian Frame\n\nIn Aristotle's terms (see [[disposition-vs-knowledge]]):\n\n- **Pre-30 Munger** has *arete* (character: curiosity, independence, equanimity) and the beginnings of *phronesis* (practical wisdom in law, real estate, family).\n- **Post-30 Munger** acquires the *episteme* of the latticework — the explicit theory and vocabulary — and the deeper *phronesis* of decades-long investing practice.\n\nAristotle's warning holds: *episteme* without *arete* would have produced a clever lawyer. *Arete* without *episteme* would have produced a wise man without a public framework. The combination — and the order — is what produced Munger.\n\n## Source\n- `raw/books/Poor Charlie's Almanack 2023.epub` — Chapter 1 (Broggie portrait), Talk 2 (USC 1994)\n\n## Related Topics\n- [[charlie-munger]] — the biography itself\n- [[disposition-vs-knowledge]] — the framework this page applies\n- [[latticework-pedagogy]] — what this case study implies for teaching the approach\n- [[disposition-building-practices]] — practices that approximate the adult-cultivation half of the formation\n- [[mental-models-and-multidisciplinary-thinking]] — the framework Munger built\n"}, {"id": "superforecasting", "title": "Superforecasting", "date": "2026-05-19", "tags": ["thinking", "forecasting", "cognition", "decision-making", "calibration", "mental-models"], "related": ["disposition-building-practices", "latticework-pedagogy", "mental-models", "disposition-vs-knowledge"], "category": "concepts", "excerpt": "Superforecasting\n\nPhilip Tetlock's research program — most fully presented in Superforecasting: The Art and Science of Prediction (2015, with Dan Gardner) — on what separates consistently accurate forecasters from the general population, and what the", "content": "---\ntitle: \"Superforecasting\"\ndate: 2026-05-19\ntags: [thinking, forecasting, cognition, decision-making, calibration, mental-models]\nrelated: [[latticework-pedagogy]], [[disposition-vs-knowledge]], [[mental-models]], [[disposition-building-practices]]\n---\n\n# Superforecasting\n\nPhilip Tetlock's research program — most fully presented in *Superforecasting: The Art and Science of Prediction* (2015, with Dan Gardner) — on what separates consistently accurate forecasters from the general population, and what their habits reveal about learnable thinking skills.\n\n## Background\n\nTetlock's original study (*Expert Political Judgment*, 2005) ran from 1984 to 2003 and accumulated nearly 28,000 predictions from 284 expert forecasters. The result was sobering: political and economic experts were barely more accurate than chance over long time horizons, and confident experts were often *less* accurate than cautious generalists. \n\nThe follow-up Good Judgment Project (a US government intelligence initiative) recruited laypeople to make forecasting questions and found a small subset — \"superforecasters\" — who dramatically outperformed professional intelligence analysts.\n\n## What Superforecasters Do Differently\n\nThe profile of the superforecaster maps closely onto the traits identified in [[latticework-pedagogy]] as prerequisites for latticework thinking:\n\n| Superforecaster habit | Latticework equivalent |\n|---|---|\n| Active open-mindedness — actively seeking disconfirming evidence | Resisting confirmation bias and social proof |\n| Aggregating across models — using multiple frameworks and averaging | Multi-model synthesis; \"to a man with a hammer\" problem |\n| Treating beliefs as probability estimates, not commitments | Comfort with uncertainty; avoiding premature model closure |\n| Frequent small updates on new evidence (vs. rare large opinion shifts) | Improvability of mental models |\n| Distinguishing what is knowable from what is not | Circle of competence |\n\n## Does Forecasting Practice Build Latticework Integration?\n\nThis is the key question from [[latticework-pedagogy]].\n\n**The case that it does:**\n- Superforecasting practice explicitly rewards multi-model aggregation: superforecasters who improve most do so by widening the range of models and base rates they consider before forming a view\n- The practice of assigning and revising probabilities installs calibration as a disposition — the habit of *not* being more certain than the evidence warrants\n- The mandatory feedback loop (forecasts are resolved; scores are calculated) provides exactly the low-latency feedback that [[disposition-vs-knowledge]] identifies as missing from most wisdom-building contexts\n- The Good Judgment Project showed that even modest training interventions (a few hours) improved forecasting accuracy measurably — suggesting the cognitive habits are teachable\n\n**The case that it doesn't fully transfer:**\n- Superforecasting builds calibration and aggregation primarily for *near-term, resolvable geopolitical and economic events* — a specific domain\n- [[latticework-pedagogy]] notes that \"far transfer — applying a principle across distant domains — is rare and fragile without deep structural understanding of *why* the principle works.\" Forecasting practice does not guarantee that cross-domain integration\n- Tetlock's superforecasters are drawn from a self-selected population of intellectually curious, motivated individuals — selection effects similar to those Munger's partnership self-selected for\n- Calibration is not the same as wisdom: a superforecaster may know the probability that a policy will fail without having the deeper judgment about *why* it fails and what that implies for other domains\n\n**Summary:** Forecasting practice reliably builds calibration, active open-mindedness, and the habit of aggregating across models — all components of the latticework disposition. But it builds these more reliably than it builds genuine far-transfer integration across distant domains. The superforecaster is a better version of a latticework practitioner, not a proof that the full latticework can be taught through forecasting alone.\n\n## The Hedgehog vs. Fox Distinction\n\nTetlock's most cited finding (from *Expert Political Judgment*): forecasters who organize their worldview around *one big idea* (hedgehogs) are systematically less accurate than those who draw on *many different frameworks* (foxes). The fox/hedgehog distinction is effectively an empirical validation of Munger's latticework intuition — multi-model thinkers outperform single-lens thinkers on real-world predictions.\n\n## Implications for [[disposition-building-practices]]\n\nStructured forecasting is the most rigorous and evidence-backed of the three core disposition-building practices because:\n1. It has the clearest feedback signal\n2. The Good Judgment Project provides experimental (not just observational) evidence of learning\n3. The specific mechanisms (probability calibration, active open-mindedness) are measurable and teachable\n\nThe recommended application: pair forecasting practice with decision journaling so that the *reasoning* behind probability estimates is recorded, not just the estimate. This captures the model-selection step that pure forecasting scores do not reward.\n\n## Related Topics\n- [[latticework-pedagogy]] — evidence on transmitting the latticework approach\n- [[disposition-vs-knowledge]] — why practices matter\n- [[disposition-building-practices]] — the practical application\n- [[mental-models]] — the cognitive framework Munger developed independently\n"}, {"id": "cognitive-atrophy-and-ai", "title": "Cognitive Atrophy and AI", "date": "2026-05-19", "tags": ["ai", "cognition", "skills", "atrophy", "learning", "technology"], "related": ["large-language-models", "disposition-vs-knowledge", "jagged-frontier", "living-and-working-with-ai"], "category": "concepts", "excerpt": "Cognitive Atrophy and AI\n\nThe question of whether outsourcing cognitive tasks to AI systems causes skilled workers to lose abilities they would otherwise develop or maintain — and where the threshold lies between augmentation and atrophy.\n\nThe Core T", "content": "---\ntitle: \"Cognitive Atrophy and AI\"\ndate: 2026-05-19\ntags: [ai, cognition, skills, atrophy, learning, technology]\nrelated: [[living-and-working-with-ai]], [[jagged-frontier]], [[disposition-vs-knowledge]], [[large-language-models]]\n---\n\n# Cognitive Atrophy and AI\n\nThe question of whether outsourcing cognitive tasks to AI systems causes skilled workers to lose abilities they would otherwise develop or maintain — and where the threshold lies between augmentation and atrophy.\n\n## The Core Tension\n\n[[living-and-working-with-ai]] captures Ethan Mollick's framing: AI should be treated as augmentation (\"be the human in the loop\"), not replacement. But the distinction between using AI to *do more* and using AI to *avoid developing judgment* is not always obvious in practice.\n\nTwo kinds of atrophy risk exist:\n1. **Acute atrophy**: real-time performance degradation from over-relying on AI for tasks outside the [[jagged-frontier|jagged frontier]] — documented in Mollick's management consultant study\n2. **Chronic atrophy**: long-term failure to develop expert intuition because the practice reps required for expertise are outsourced before they accumulate\n\n## The Dreyfus Model and the Practice Requirement\n\n[[disposition-vs-knowledge]] describes the Dreyfus and Dreyfus skill acquisition model: the progression from novice (rule-following) to expert (intuitive, context-sensitive perception) requires thousands of hours of practice with feedback. At the expert level, cognition is not \"applying rules\" but *perceiving the situation directly in terms of what to do*.\n\nThis has a direct implication for AI augmentation: if the practice reps required to build expert intuition are outsourced to AI during the formative stages of skill development, the practitioner may reach competence without ever developing expertise.\n\n**The stakes are higher for foundational skills.** Writing, clinical reasoning, mathematical problem-solving, and code architecture are domains where expert judgment is built by accumulating a large library of worked examples — including failures. An AI-assisted practitioner who never writes a rough draft, never diagnoses without AI input, never debugs without AI assistance, may produce acceptable outputs while failing to develop the pattern recognition that generates *excellent* outputs or catches AI errors.\n\n## Acute Atrophy: The Jagged Frontier Problem\n\n[[jagged-frontier]] documents that AI-over-reliance causes measurable performance harm when humans use AI for tasks outside its capability boundary. The consultants in Mollick's study who applied AI to tasks outside the frontier performed *worse* than unassisted consultants — the AI's confident errors led them astray.\n\nThis is acute atrophy: the skill of identifying when AI is wrong is itself degraded by the habit of trusting AI uncritically. The atrophy mechanism:\n1. Worker uses AI for task X\n2. AI performs task X within the frontier → worker's direct skill at X atrophies from disuse\n3. Worker uses AI for task Y (outside the frontier) → cannot detect errors because the judgment for Y has atrophied\n4. AI's confident errors propagate into outputs without correction\n\n## Chronic Atrophy: When the Practice Reps Don't Accumulate\n\nThe more insidious risk is not an immediately detectable performance degradation but a failure of development: skills that would have developed through struggle don't develop at all because the friction is eliminated too early.\n\nAnalogies from other domains:\n- **GPS navigation** — studies suggest that people who rely heavily on GPS for navigation develop weaker spatial reasoning and map-reading than those who navigate unaided. The skill atrophy is not dramatic; it is cumulative and often invisible until the GPS fails.\n- **Calculators in education** — the debate over when to introduce calculators in mathematics education is structurally identical: calculators eliminate the arithmetic burden but may also eliminate the practice reps that build number sense, which in turn supports higher-order mathematical reasoning.\n- **Spell-checkers** — most writers who came of age with spell-checkers have weaker spelling than previous generations; the question is whether this matters and what they gained in exchange.\n\n## The Key Distinction: What AI Should and Shouldn't Replace\n\nThe evidence from [[living-and-working-with-ai]] and [[disposition-vs-knowledge]] suggests a practical heuristic:\n\n**Use AI to expand the range of what you can do; avoid using AI to bypass the development of the judgment required to do it well.**\n\n| AI use | Category | Atrophy risk |\n|---|---|---|\n| Generating initial drafts you then substantially revise | Expansion | Low — revision requires and builds judgment |\n| Automating tasks you've already mastered | Expansion | Low — frees capacity for higher-order work |\n| Performing tasks you've never learned to do manually | Bypass | High — skips the practice reps |\n| Checking your work after you've done it independently | Augmentation | Very low — AI as proofreader, not replacement |\n| Doing the first pass on tasks you're learning | Bypass | High — eliminates early struggle that builds intuition |\n\n## The Mollick Principle Revisited\n\nMollick's \"be the human in the loop\" is the right principle but underdetermines the practice. Being \"in the loop\" for a skill you've already developed (oversight, error-catching, judgment calls) is not the same as being \"in the loop\" for a skill you're still developing (where you need to generate work independently to build intuition).\n\nThe implication: **the threshold between augmentation and atrophy shifts with expertise level.**\n- For experts: aggressive AI augmentation is safer — the underlying expert intuition is already built and can catch AI errors\n- For novices and developing practitioners: early AI assistance for generative tasks carries atrophy risk that should be weighed against productivity gains\n- For everyone: regularly practicing without AI assistance in your core domains is a form of cognitive maintenance, analogous to physical exercise\n\n## Related Topics\n- [[living-and-working-with-ai]] — Mollick's framework; source of the augmentation vs. replacement distinction\n- [[jagged-frontier]] — where AI over-reliance causes acute performance harm\n- [[disposition-vs-knowledge]] — the Dreyfus model and practice requirement for expertise\n- [[large-language-models]] — the technology whose capabilities set the boundary conditions\n"}, {"id": "adaptive-leadership", "title": "Adaptive Leadership", "date": "2026-05-19", "tags": ["leadership", "organizational-change", "heifetz", "adaptive-challenges"], "related": ["adaptive-vs-technical-challenges", "ronald-heifetz", "adaptive-leadership-and-psychological-safety", "experimental-mindset"], "category": "topics", "excerpt": "Adaptive Leadership\n\nOverview / Core Thesis\n\nRonald Heifetz, Alexander Grashow, and Marty Linsky argue that most leadership failures occur because people apply\ntechnical solutions to adaptive problems. The practice of leadership is not about having t", "content": "---\ntitle: \"Adaptive Leadership\"\ndate: 2026-05-19\ntags: [leadership, organizational-change, heifetz, adaptive-challenges]\nrelated: [[ronald-heifetz]], [[adaptive-vs-technical-challenges]], [[experimental-mindset]], [[adaptive-leadership-and-psychological-safety]]\n---\n\n# Adaptive Leadership\n\n## Overview / Core Thesis\n\nRonald Heifetz, Alexander Grashow, and Marty Linsky argue that most leadership failures occur because people apply\n*technical* solutions to *adaptive* problems. The practice of leadership is not about having the right answers — it\nis about mobilizing people to do the difficult, often threatening work of changing their own values, beliefs, and\nbehaviors.\n\nAdaptive leadership is rooted in evolutionary biology: species survive by preserving what is essential and discarding\nwhat is no longer adaptive. Organizations face the same challenge.\n\n## The Central Distinction\n\n| Technical Problems | Adaptive Challenges |\n|---|---|\n| Clear definition | Requires reframing the problem |\n| Known solution | Solution requires learning and discovery |\n| Authority can solve it | People themselves must do the work |\n| Example: fixing a machine | Example: changing organizational culture |\n\nMost hard organizational problems are adaptive. Treating them as technical (bringing in an expert, deploying a process)\nfails because the \"fix\" doesn't address the underlying human resistance to change.\n\n## Four Practices of Adaptive Leadership\n\n1. **Get on the Balcony** — Gain perspective by stepping back from the dance floor. Leadership requires simultaneously\n   acting in the present and observing the system from a distance.\n2. **Identify Adaptive Challenges** — Diagnose whether a problem is technical or adaptive before prescribing a\n   response.\n3. **Regulate Distress** — Change generates disequilibrium. Effective leaders maintain productive tension — enough\n   discomfort to motivate change, not so much that the system collapses into chaos.\n4. **Give Work Back to the People** — Don't rescue people from their adaptive work. The desire to solve problems for\n   others is often a way of avoiding the discomfort of watching them struggle.\n\n## The Danger of Going It Alone\n\nChapter 3 warns repeatedly: adaptive leadership is high-risk. Those who benefit from the status quo will marginalize,\nsilence, or attack leaders who challenge it. Allies often cheer from the shore while the leader inches across the ice\nalone. Counter: build coalitions, maintain confidants outside the system, and stay connected to your sense of purpose.\n\n## Key Concepts\n\n- **Holding environment**: A container strong enough to hold the heat of change without exploding.\n- **Work avoidance**: Groups deflect adaptive work through distractions, scapegoating, or externalizing the problem.\n- **Faction mapping**: Identify who gains and loses from proposed changes; the resistance often comes from those with\n  most to lose, not those who are simply wrong.\n\n## Related\n- [[adaptive-vs-technical-challenges]] — the core distinction in more depth\n- [[experimental-mindset]] — Le Cunff's \"tiny experiments\" share the adaptive framing: small probes that generate\n  learning rather than executing a fixed plan\n\n## Open Questions\n\n- How do you develop the diagnostic skill to reliably distinguish technical from adaptive challenges in real time?\n- **What's the relationship between adaptive leadership and psychological safety? Heifetz emphasizes productive disequilibrium; psychological safety literature emphasizes low fear. Are these in tension?**  \n  They are complementary at the system level but can appear opposed at the individual level — the reconciliation lies in distinguishing *interpersonal* threat from *adaptive* challenge. Amy Edmondson's psychological safety is about freedom from humiliation, punishment, and social exclusion (\"I won't be punished for speaking up\"). Heifetz's productive disequilibrium is about the discomfort of changing values, behaviors, and assumptions — a cognitive and moral challenge, not a social one. You can have both: high interpersonal safety + high adaptive challenge = the \"learning zone\" that Edmondson's high-performance teams (IDEO, hospital units) actually occupy. In fact, psychological safety may be *necessary* for productive disequilibrium to work: without it, people respond to adaptive pressure by hiding, deflecting, and performing rather than genuinely engaging. Heifetz's \"work avoidance\" behaviors — scapegoating, distraction, externalizing — are exactly what you'd expect when people feel threatened but lack interpersonal safety. The tension is real in *leadership style*: a Heifetz-influenced leader who holds the heat without providing safety will produce fight-or-flight, not adaptive work. The **holding environment** concept bridges this: it creates enough relational safety to contain the heat of adaptation without the system exploding.\n\n## Source\n`raw/books/Adaptive_Leadership.epub`\n"}, {"id": "the-one-thing", "title": "The ONE Thing", "date": "2026-05-19", "tags": ["productivity", "focus", "prioritization", "gary-keller"], "related": ["mental-models", "slow-productivity", "gary-keller", "focusing-question", "focus-vs-orientation"], "category": "topics", "excerpt": "The ONE Thing\n\nOverview / Core Thesis\n\nGary Keller and Jay Papasan argue that extraordinary results come from narrowing focus to a single most-important\naction — what they call \"going small.\" The central tool is the Focusing Question: \"What's the ONE", "content": "---\ntitle: \"The ONE Thing\"\ndate: 2026-05-19\ntags: [productivity, focus, prioritization, gary-keller]\nrelated: [[gary-keller]], [[focusing-question]], [[slow-productivity]], [[mental-models]], [[focus-vs-orientation]]\n---\n\n# The ONE Thing\n\n## Overview / Core Thesis\n\nGary Keller and Jay Papasan argue that extraordinary results come from narrowing focus to a single most-important\naction — what they call \"going small.\" The central tool is the **Focusing Question**: *\"What's the ONE thing I can do\nsuch that by doing it, everything else will be easier or unnecessary?\"*\n\nThe book's opening image comes from the film *City Slickers*: cowboy Curly holds up one finger and says \"One thing.\nJust one thing.\" Mitch asks what the one thing is. Curly: \"That's what you've got to figure out.\" That's the book.\n\n## Going Small\n\n\"Going small\" is counterintuitive. Most people think big success requires doing more. Keller argues the opposite:\nextraordinary results are directly determined by how narrow you can make your focus.\n\n- Spread across too many priorities → everything suffers\n- One clear priority → domino effect — each success topples the next\n- Success is *sequential*, not *simultaneous*\n\n## The Domino Effect\n\nA small domino can knock over a domino 50% larger. This geometric progression means that the right first action,\ndone well, enables progressively larger wins. Keller's metaphor for career and project planning: line up the dominoes\n(sequence your priorities correctly) and tip the first one.\n\n## Six Lies That Mislead\n\nThe book systematically dismantles common productivity myths:\n1. Everything matters equally (vs. prioritization by leverage)\n2. Multitasking is productive (vs. task-switching costs)\n3. A disciplined life is required (vs. selective discipline on the one thing)\n4. Willpower is on-call (vs. willpower as a depletable resource)\n5. Balance is achievable (vs. intentional counterbalancing over time)\n6. Big is bad (vs. thinking big as prerequisite for big outcomes)\n\n## The Focusing Question\n\nUsed at every scale:\n- **Life level**: What's the ONE thing I want my life to be about?\n- **Annual level**: What's the ONE thing I can do this year to make progress toward that goal?\n- **Weekly/daily**: What's the ONE thing I can do today such that by doing it, everything else becomes easier or unnecessary?\n\nThe question forces prioritization by elimination. Keller describes coaches shortening their recap lists from five\nitems to three to two — then finally to one — and watching results improve dramatically with each reduction.\n\n## Key People\n- [[gary-keller]] — real estate entrepreneur; founder of Keller Williams Realty\n\n## Related Concepts\n- [[focusing-question]] — the core tool\n- [[slow-productivity]] — Newport's \"do fewer things\" principle is a close cousin\n- [[mental-models]] — Munger similarly: know the big ideas, apply them sequentially\n\n## Open Questions\n\n- The ONE Thing model implicitly assumes autonomy over your schedule. How does it apply to reactive knowledge-worker\n  roles with constant interruptions?\n- **At what point does \"going small\" become tunnel vision that misses important signals outside your one thing?**  \n  The failure mode is predictable: the ONE Thing model is excellent for *execution phases* and poor for *orientation phases*. Keller's framework optimizes within a chosen domain — given you're building a real estate business, what's the one thing? — but does not help you notice when the domain itself is wrong. Tunnel risks include: (1) *Signal filtering* — once committed to a focus, our perceptual systems actively suppress competing signals (inattentional blindness, motivated cognition); important weak signals that don't fit the current \"one thing\" become invisible; (2) *Adjacent opportunity cost* — large value-creation events often come from peripheral awareness: a different business's solution that applies to your domain, a relationship that opens an unexpected door; deep focus makes these harder to catch; (3) *Failure to update on negative feedback* — sunk cost effects are more powerful in narrow-focus strategies; you've structured your life around this one thing, so incoming evidence it's not working is harder to process honestly; (4) *Neglect cascades* — Keller acknowledges counterbalancing but treats it as manageable; empirically, neglected areas (relationships, health, peripheral competencies) frequently reach crisis points that retroactively undermine the very \"one thing\" they were sacrificed for. The practical resolution is to separate *orientation* from *execution*: use broad peripheral scanning (reading widely, maintaining diverse weak ties, scheduled reflection on whether you're still climbing the right mountain) for quarterly/annual orientation, then apply the ONE Thing framework within execution sprints. This is compatible with Cal Newport's deep work — both work within a sprint but need a meta-strategy above them that asks whether the sprint itself is aimed correctly.\n\n## Source\n`raw/books/Gary Keller, Jay Papasan - The ONE Thing_ The Surprisingly Simple Truth Behind Extraordinary Results-Bard Press (2013).epub`\n"}, {"id": "ai-in-education", "title": "AI in Education", "date": "2026-05-19", "tags": ["education", "AI", "LLMs", "sal-khan", "khanmigo"], "related": ["cognitive-atrophy-and-ai", "ai-tutoring", "growth-mindset", "carol-dweck", "large-language-models", "jagged-frontier", "living-and-working-with-ai", "sal-khan"], "category": "topics", "excerpt": "AI in Education\n\nOverview / Core Thesis\n\nSalman Khan's Brave New Words argues that AI — specifically large language models like GPT-4 — is not a cheating\ntool to be banned but the first technology capable of fulfilling the long-held promise of person", "content": "---\ntitle: \"AI in Education\"\ndate: 2026-05-19\ntags: [education, AI, LLMs, sal-khan, khanmigo]\nrelated: [[sal-khan]], [[ai-tutoring]], [[large-language-models]], [[living-and-working-with-ai]], [[growth-mindset]]\n---\n\n# AI in Education\n\n## Overview / Core Thesis\n\nSalman Khan's *Brave New Words* argues that AI — specifically large language models like GPT-4 — is not a cheating\ntool to be banned but the first technology capable of fulfilling the long-held promise of personalized, one-on-one\ntutoring for every student on the planet. The title signals a call to rewrite education's operating assumptions rather\nthan protect them.\n\n## Khanmigo: The AI Tutor Model\n\nKhan Academy launched Khanmigo in March 2023 as one of the first educational deployments of GPT-4. Key design choices:\n\n- **Socratic, not answer-giving**: The system was explicitly prompted to ask leading questions rather than provide\n  answers. GPT-4's \"steerability\" (ability to maintain a role across a conversation) was essential — GPT-3.5 would\n  revert to giving answers despite instructions.\n- **Safe by design**: Extensive edge-case prompting before launch; distinct tone/voice for the platform; guardrails\n  against inappropriate conversations with minors.\n- **Beyond tutoring**: Khanmigo also role-plays historical and literary figures, acts as a debate partner, serves as\n  a guidance counselor and career coach, and supports teachers with lesson planning and student progress analysis.\n\n## The Bloomian Vision\n\nBenjamin Bloom's 1984 \"2 Sigma Problem\" showed that one-on-one tutored students performed 2 standard deviations above\nclassroom-taught students. The problem: human tutoring is too expensive to scale. AI tutoring is Khan's proposed\nsolution — not a replacement for teachers but a force multiplier that finally makes the 2-sigma outcome accessible.\n\n## Concerns and Tensions\n\n- **Writing and cognition**: AI that writes *for* students may atrophy the thinking that writing develops. Khan argues\n  that good AI writing tools can be used *alongside* students to develop their ideas rather than replace the process.\n  See [[cognitive-atrophy-and-ai]].\n- **Equity**: AI tutoring could widen gaps if high-income families use it to accelerate while lower-income students\n  fall behind, or it could close gaps if deployed intentionally to underserved schools.\n- **Assessment**: If AI can write essays, traditional essay assessments lose validity. Khan advocates for AI-proctored\n  oral exams and projects as replacements.\n\n## Employment and the Future of Work\n\nLater chapters address AI's impact on the labor market. Khan's stance: history shows that technology displaces tasks,\nnot workers — but transitions are painful and require active investment in education and retraining.\n\n## Key People\n- [[sal-khan]] — founder of Khan Academy; architect of Khanmigo\n- [[carol-dweck]] — growth mindset framework underlies Khan's pedagogy; AI tutoring works best when students have\n  a growth orientation\n\n## Open Questions\n\n- Can AI tutoring replicate the motivational and relational components of great human teaching?\n- How do we prevent AI tutoring from becoming another vector for [[jagged-frontier]] failures — excellent at some\n  tasks, dangerously wrong at others the student can't detect?\n\n## Source\n`raw/books/Brave New Words AI Revolution Education.epub`\n"}, {"id": "economic-literacy", "title": "Economic Literacy and the Vibes Economy", "date": "2026-05-19", "tags": ["economics", "finance", "behavioral-economics", "kyla-scanlon"], "related": ["vibecession", "crony-capitalism-and-monetary-deformation", "bubble-finance", "kyla-scanlon"], "category": "topics", "excerpt": "Economic Literacy and the Vibes Economy\n\nOverview / Core Thesis\n\nKyla Scanlon's In This Economy? argues that economic illiteracy persists not because economics is intrinsically\ncomplex, but because it is taught as pure math/logic while ignoring the f", "content": "---\ntitle: \"Economic Literacy and the Vibes Economy\"\ndate: 2026-05-19\ntags: [economics, finance, behavioral-economics, kyla-scanlon]\nrelated: [[kyla-scanlon]], [[vibecession]], [[bubble-finance]], [[crony-capitalism-and-monetary-deformation]]\n---\n\n# Economic Literacy and the Vibes Economy\n\n## Overview / Core Thesis\n\nKyla Scanlon's *In This Economy?* argues that economic illiteracy persists not because economics is intrinsically\ncomplex, but because it is taught as pure math/logic while ignoring the fact that economies are composed of emotional,\nirrational humans. The gap between economic theory and lived reality is the central problem — and storytelling,\nanalogy, and vibes-awareness are the tools to close it.\n\nThe foreword by Morgan Housel: despite massive gains in engineering and medicine over a century, we show no clear\nprogress in economics or personal finance. Why? Because economic outcomes depend on human behavior, which doesn't\nobey iron laws.\n\n## Core Framework: The Economy as People\n\nThe most fundamental reframe: *\"The economy is really a bunch of people peopling around.\"* GDP, monetary policy,\ninflation — these are not mechanical forces; they are aggregate expressions of billions of individual decisions shaped\nby fear, hope, information asymmetry, and social norms.\n\nThis means:\n- Economic events are partly self-fulfilling (expectations matter as much as fundamentals)\n- Fedspeak (deliberately vague central bank communication) is not incidental — it's a feature to prevent market\n  overreaction\n- Most economic coverage optimizes for engagement over understanding, producing alarmism\n\n## Vibecession\n\nScanlon coined the term **\"vibecession\"** in 2022 to describe a situation where economic indicators are technically\nhealthy but people *feel* like they're in a recession — and that feeling can itself become a self-fulfilling prophecy.\n\nIt captures the gap between:\n- **Hard data**: unemployment low, GDP growing\n- **Soft data / vibes**: consumer sentiment depressed, social media pessimism, persistent anxiety about cost of living\n\nThe vibecession concept illustrates that behavioral economics and psychology belong at the center of economic analysis,\nnot as footnotes.\n\n## Why Economics Education Fails\n\n- Taught as math with \"right answers\" — ignores the behavioral gap\n- Uses jargon to signal expertise rather than communicate (Fedspeak, yield curve, secular stagnation)\n- Expert forecasting record is poor: *The Economist*'s January previews for 2020, 2022, and 2023 missed COVID,\n  Ukraine, and Hamas attacks respectively — not as failures but as reminders of fundamental uncertainty\n\n## Key Structures Covered\n\n- **Business cycles**: economies trend upward toward growth but cycle through expansion/contraction\n- **Federal Reserve mechanics**: how interest rates, money supply, and inflation interact\n- **Behavioral pushes and pulls**: how anchoring, loss aversion, and social proof drive economic decisions\n- **Personal finance implications**: why knowing the macro matters for individual decisions\n\n## Related\n- [[vibecession]] — the concept in more depth\n- [[bubble-finance]] — Stockman's complementary diagnosis of Fed-driven distortion from a different political angle\n- [[crony-capitalism-and-monetary-deformation]] — the Stockman book provides a harder-edged structural critique\n\n## Open Questions\n\n- How do you build economic literacy at scale without the content being captured by political narratives?\n- Scanlon's framing is optimistic (economies trend toward okay-ness). How does that hold up against structural\n  inequality and climate risk?\n\n## Source\n`raw/books/In_This_Economy_Kyla_Scanlon.epub`\n"}, {"id": "glucose-revolution", "title": "Glucose Revolution", "date": "2026-05-19", "tags": ["health", "nutrition", "metabolic-health", "jessie-inchauspee"], "related": ["jessie-inchauspee", "glucose-curves", "health-equity"], "category": "topics", "excerpt": "Glucose Revolution\n\nOverview / Core Thesis\n\nJessie Inchauspé (Glucose Goddess) argues that glucose management is the highest-leverage single intervention for\nimproving metabolic health. Flattening glucose curves — reducing the amplitude of spikes aft", "content": "---\ntitle: \"Glucose Revolution\"\ndate: 2026-05-19\ntags: [health, nutrition, metabolic-health, jessie-inchauspee]\nrelated: [[jessie-inchauspee]], [[glucose-curves]], [[health-equity]]\n---\n\n# Glucose Revolution\n\n## Overview / Core Thesis\n\nJessie Inchauspé (*Glucose Goddess*) argues that glucose management is the highest-leverage single intervention for\nimproving metabolic health. Flattening glucose curves — reducing the amplitude of spikes after meals — improves\nenergy, mood, weight, hormonal health, and long-term disease risk without requiring extreme dietary restriction.\n\nThe cockpit metaphor: we are both passengers and pilots of our own bodies. Glucose is the lever with the biggest\nbang for its buck because it is the only metabolic metric most people can monitor continuously (via CGM), and\nbecause it is downstream of so much else — fructose and insulin curves follow glucose curves.\n\n## Why Glucose Matters\n\nOnly 12% of Americans are metabolically healthy (per 2019 research). Glucose dysregulation is implicated in:\n- Weight gain and difficulty losing weight\n- Energy crashes and chronic fatigue\n- Mood instability, anxiety, brain fog\n- Hormonal disruption (PCOS, missed periods)\n- Type 2 diabetes, insulin resistance\n- Cardiovascular disease\n- Skin conditions (acne, inflammation)\n\n## The Glucose Curve Framework\n\nInchauspé uses CGM data to visualize how different meals and behaviors affect blood glucose over time. The goal is not\nminimizing glucose — we need it — but flattening the curves to avoid large spikes and subsequent crashes.\n\n### The Biology (Simplified)\n- Plants make glucose via photosynthesis (the Calvin-Benson-Bassham cycle)\n- Animals store glucose as glycogen in liver/muscle; excess becomes fat\n- The pancreas releases insulin in response to glucose; chronic high insulin → insulin resistance → type 2 diabetes\n- Fructose travels a different metabolic pathway but is co-packaged with glucose in food; flattening glucose curves\n  also flattens fructose and insulin curves\n\n## The 10 Glucose Hacks\n\nInchauspé's key interventions (not a complete diet, but targeted tactics):\n1. **Eat foods in the right order**: fiber → protein/fat → starches/sugars\n2. **Add a veggie starter** to meals\n3. **Stop counting calories, start counting glucose impact**\n4. **Flatten your breakfast curve** (savory > sweet)\n5. **Have any sweet things as dessert**, not on an empty stomach\n6. **Vinegar before meals** (dampens glucose spike)\n7. **Movement after eating** (muscles absorb glucose without insulin)\n8. **If you snack, go savory**\n9. **Don't drink your glucose** (juice, soda, even \"healthy\" smoothies spike fast)\n10. **A spoonful of fat or protein before meals with high sugar**\n\n## Important Caveats\n\nInchauspé explicitly warns: glucose isn't everything. Industrial processed oils, alcohol, and other factors matter\nfor health but don't show up as glucose spikes. And context is everything — whether a food is \"good\" or \"bad\" depends\non what you would eat instead.\n\n## Related\n- [[glucose-curves]] — the key concept\n- [[health-equity]] — metabolic health disparities track socioeconomic lines; the \"hacks\" require access to\n  diverse, quality food\n\n## Open Questions\n\n- How does CGM access democratize or stratify glucose literacy? (Devices are expensive)\n- What's the evidence base for the specific ordering hacks vs. broader caloric/macronutrient patterns?\n\n## Source\n`raw/books/Glucose Revolution.epub`\n"}, {"id": "stoic-justice", "title": "Stoic Justice and Good Character", "date": "2026-05-19", "tags": ["stoicism", "ethics", "virtue", "ryan-holiday"], "related": ["mental-models", "mental-models-and-multidisciplinary-thinking", "ryan-holiday", "stoic-virtues", "stoic-truth-telling-and-tact", "stoicism-and-systemic-injustice"], "category": "topics", "excerpt": "Stoic Justice and Good Character\n\nOverview / Core Thesis\n\nRyan Holiday's Right Thing, Right Now is the third installment of his Stoic Virtues trilogy, focused on justice —\nthe most other-directed of the four cardinal virtues (alongside temperance, co", "content": "---\ntitle: \"Stoic Justice and Good Character\"\ndate: 2026-05-19\ntags: [stoicism, ethics, virtue, ryan-holiday]\nrelated: [[ryan-holiday]], [[stoic-virtues]], [[mental-models]], [[mental-models-and-multidisciplinary-thinking]], [[stoicism-and-systemic-injustice]], [[stoic-truth-telling-and-tact]]\n---\n\n# Stoic Justice and Good Character\n\n## Overview / Core Thesis\n\nRyan Holiday's *Right Thing, Right Now* is the third installment of his Stoic Virtues trilogy, focused on *justice* —\nthe most other-directed of the four cardinal virtues (alongside temperance, courage, and wisdom). While his earlier\nbooks examined discipline and courage as personal practices, justice is about how we treat others: telling the truth,\nkeeping commitments, holding ourselves to account even when no one is watching.\n\nThe central argument: modern culture has privatized virtue — reducing ethics to personal performance and productivity —\nwhile abandoning the Stoic insistence that character has a *social* end.\n\n## The Four Cardinal Stoic Virtues\n\n1. **Temperance** — self-regulation, moderation\n2. **Courage** — action in the face of fear\n3. **Wisdom**
