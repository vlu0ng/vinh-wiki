e": "Growth Mindset", "date": "2026-05-18", "tags": ["psychology", "learning", "mindset", "education"], "related": ["jo-boaler", "mathematics-education", "carol-dweck"], "category": "concepts", "excerpt": "Growth Mindset\n\nA psychological framework developed by Stanford psychologist Carol Dweck describing the belief that intelligence, talent, and ability are developable through effort, good strategies, and learning from mistakes — as opposed to being fi", "content": "---\ntitle: \"Growth Mindset\"\ndate: 2026-05-18\ntags: [psychology, learning, mindset, education]\nrelated: [[mathematics-education]], [[jo-boaler]], [[carol-dweck]]\n---\n\n# Growth Mindset\n\nA psychological framework developed by Stanford psychologist **[[carol-dweck|Carol Dweck]]** describing the belief that intelligence, talent, and ability are **developable** through effort, good strategies, and learning from mistakes — as opposed to being fixed traits you either have or don't.\n\n## Fixed vs. Growth Mindset\n\n| Fixed Mindset | Growth Mindset |\n|---|---|\n| \"I'm just not a math person.\" | \"I can't do this *yet*.\" |\n| Avoids challenges (might expose limits) | Embraces challenges (opportunity to grow) |\n| Sees effort as a sign of weakness | Sees effort as the path to mastery |\n| Ignores useful feedback | Learns from criticism |\n| Threatened by others' success | Inspired by others' success |\n\n## The Word \"Yet\"\n\nDweck's most famous classroom intervention: when a student says \"I can't do this,\" the teacher responds \"You can't do this *yet.*\" The word \"yet\" repositions failure as a stage in a process rather than a verdict on ability.\n\n## Neuroscience Foundation\n\n- Synaptic connections form and strengthen through use — this is neuroplasticity\n- Challenging tasks, especially those involving errors noticed and corrected, produce the most synaptic growth\n- Fixed mindset thinking is partly driven by cultural messages received in childhood\n\n## Application to Mathematics\n\n[[jo-boaler|Jo Boaler]] extended Dweck's framework specifically to mathematics, arguing that math is uniquely afflicted by fixed-mindset culture:\n- Speed equated with intelligence\n- Single right answers\n- Early ability tracking\n- Timed tests that activate threat responses\n\nFull synthesis: [[mathematics-education]]\n\n## Critiques and Nuance\n\n- Growth mindset interventions have had mixed results in large-scale replications\n- Critics argue it can be used to shift blame from systemic failures onto individual students (\"just try harder\")\n- Dweck herself emphasizes that mindset alone is insufficient without structural support (good teaching, adequate resources)\n\n## Related Topics\n\n- [[mathematics-education]] — primary application in this wiki\n- [[jo-boaler]] — key practitioner\n- [[carol-dweck]] — originator\n"}, {"id": "developmental-strands", "title": "Developmental Strands", "date": "2026-05-18", "tags": ["psychology", "development", "adolescence", "framework"], "related": ["lisa-damour", "teenage-girl-development"], "category": "concepts", "excerpt": "Developmental Strands\n\nA framework for understanding human development as progress along multiple simultaneous tracks, each representing a distinct domain of psychological growth. Originally proposed by Anna Freud (1965); adapted by Lisa Damour for t", "content": "---\ntitle: \"Developmental Strands\"\ndate: 2026-05-18\ntags: [psychology, development, adolescence, framework]\nrelated: [[teenage-girl-development]], [[lisa-damour]]\n---\n\n# Developmental Strands\n\nA framework for understanding human development as progress along multiple simultaneous tracks, each representing a distinct domain of psychological growth. Originally proposed by Anna Freud (1965); adapted by [[lisa-damour|Lisa Damour]] for [[teenage-girl-development|teenage girl development]].\n\n## Origin\n\nAnna Freud (daughter of Sigmund Freud, and a major psychoanalyst in her own right) proposed developmental strands in 1965 as a way to organize the normal turmoil of childhood development. She argued that children advance simultaneously on multiple fronts — from dependency to self-reliance, from play to work, from egocentricity to companionship — and that healthy development can be assessed by progress along these strands, not by any single metric.\n\n## Key Properties\n\n- **Simultaneous progression** — development happens on all strands at once; a child may be advanced on one and delayed on another without this being pathological\n- **Non-linear** — progress is uneven; temporary regressions on a strand are normal, especially under stress\n- **Domain-specific assessment** — to evaluate health, you ask \"how is this person progressing on each strand?\" not \"are they normal overall?\"\n- **Normal range** — each strand has a wide normal range; the framework helps distinguish expected variation from genuine disorder\n\n## Damour's Seven Strands for Teenage Girls\n\n1. Parting with childhood\n2. Joining a new tribe (peer groups)\n3. Harnessing emotions\n4. Contending with adult authority\n5. Planning for the future\n6. Entering the romantic world\n7. Caring for herself\n\nSee [[teenage-girl-development]] for detailed descriptions of each strand.\n\n## Clinical Application\n\nThe strands framework helps clinicians and parents:\n- Normalize confusing behavior by locating it within a developmental trajectory\n- Identify genuine stalls or regressions that warrant intervention\n- Avoid being misled by success in one domain into overlooking difficulty in another\n\n## Related Topics\n- [[teenage-girl-development]] — Damour's application of strands to adolescent girls\n- [[lisa-damour]] — the clinician who popularized this application\n"}, {"id": "mental-models", "title": "Mental Models", "date": "2026-05-18", "tags": ["thinking", "decision-making", "cognition", "investing"], "related": ["charlie-munger", "inversion", "mental-models-and-multidisciplinary-thinking"], "category": "concepts", "excerpt": "Mental Models\n\nSimplified representations of how the world works, drawn from different disciplines, used as cognitive tools for reasoning and decision-making. The concept is most associated with Charlie Munger, who built a lifelong \"latticework\" of m", "content": "---\ntitle: \"Mental Models\"\ndate: 2026-05-18\ntags: [thinking, decision-making, cognition, investing]\nrelated: [[mental-models-and-multidisciplinary-thinking]], [[charlie-munger]]\n---\n\n# Mental Models\n\nSimplified representations of how the world works, drawn from different disciplines, used as cognitive tools for reasoning and decision-making. The concept is most associated with [[charlie-munger|Charlie Munger]], who built a lifelong \"latticework\" of models from physics, biology, psychology, history, economics, and mathematics.\n\n## Key Properties\n\n- **Cross-disciplinary** — the most useful mental models generalize across domains; a model from thermodynamics (entropy) can illuminate organizational decay; a model from biology (ecological niches) can illuminate competitive strategy\n- **Complementary** — no single model is sufficient; holding multiple models reduces the distortion of viewing every problem through one lens\n- **Cognitive shortcuts** — models allow faster pattern recognition by encoding prior learning; the risk is applying the wrong model to a situation\n- **Improvable** — models should be tested against reality and updated when they fail; dogmatic attachment to a model is itself a cognitive error\n\n## Key Mental Models (Munger's Canon)\n\n| Model | Source | Application |\n|---|---|---|\n| [[inversion|Inversion]] | Mathematics (Jacobi) | Reason backward from failure to identify what to avoid |\n| Circle of Competence | Investing | Know your knowledge boundaries; stay within them |\n| Opportunity Cost | Economics | Every choice forecloses alternatives; price everything |\n| Incentive-Caused Bias | Psychology | Behavior reliably follows incentives; ask \"who benefits?\" |\n| Lollapalooza Effect | Psychology | Multiple aligned forces produce non-linear extremes |\n| Margin of Safety | Engineering/Investing | Build in buffers against your own errors and surprise |\n| Mean Reversion | Statistics | Extreme values tend to regress toward averages over time |\n\n## The Latticework Metaphor\n\nMunger describes well-functioning models as a \"latticework\" — a structure where models reinforce and cross-reference each other. Knowledge built into a latticework is available for recall when needed and resists forgetting because it is richly interconnected.\n\n## Relationship to Behavioral Economics\n\nMunger's \"Psychology of Human Misjudgment\" (cataloging 25+ cognitive biases) was developed largely independently of academic behavioral economics (Kahneman, Tversky). The two converge substantially, though Munger's approach is more eclectic and less statistically rigorous.\n\n## Related Topics\n- [[mental-models-and-multidisciplinary-thinking]] — the broader framework Munger built\n- [[charlie-munger]] — who popularized this approach\n"}, {"id": "tuberculosis-and-global-health", "title": "Tuberculosis and Global Health", "date": "2026-05-18", "tags": ["global-health", "infectious-disease", "health-equity", "tuberculosis"], "related": ["pandemic-lessons-from-tb", "health-equity", "romanticization-of-illness", "john-green", "tb-eradication-requirements", "partners-in-health"], "category": "topics", "excerpt": "Tuberculosis and Global Health\n\nA synthesis of John Green's Everything Is Tuberculosis (2025).\n\nWhat TB Is\n\nTuberculosis (TB) is an airborne bacterial infection caused by Mycobacterium tuberculosis. It spreads person-to-person through small particles", "content": "---\ntitle: \"Tuberculosis and Global Health\"\ndate: 2026-05-18\ntags: [global-health, infectious-disease, health-equity, tuberculosis]\nrelated: [[health-equity]], [[john-green]], [[partners-in-health]], [[romanticization-of-illness]], [[pandemic-lessons-from-tb]], [[tb-eradication-requirements]]\n---\n\n# Tuberculosis and Global Health\n\nA synthesis of John Green's *Everything Is Tuberculosis* (2025).\n\n## What TB Is\n\nTuberculosis (TB) is an airborne bacterial infection caused by *Mycobacterium tuberculosis*. It spreads person-to-person through small particles in coughs, sneezes, and exhalations. Between one-quarter and one-third of all living humans carry the infection; up to 10% will eventually develop active disease.\n\nClassic symptoms: persistent cough, night sweats, fever, and physical wasting — historically called \"consumption.\"\n\n## Scale of the Problem\n\n- Over **1 billion** people have died of TB in the last two centuries — estimated 1 in 7 of all humans who have ever lived\n- **1,250,000** people died of TB in 2023 — more than malaria, typhoid, and war combined\n- TB was the world's deadliest infectious disease for most of recorded history; COVID-19 displaced it 2020–2022, but TB reclaimed that title in 2023\n- TB has been **curable since the mid-1950s**\n\n## The Central Paradox: A Curable Disease That Kills Millions\n\nGreen's core argument: TB's persistence is a moral and political failure, not a scientific one. We have known how to cure TB for 70 years. The problem is distribution.\n\nUgandan physician Dr. Peter Mugyenyi, speaking about AIDS in 2000: *\"The drugs are where the disease is not. And the disease is where the drugs are not.\"*\n\nGreen argues the same is true of TB today.\n\n## How We Imagine Illness Shapes Who Lives and Dies\n\nHistorical framings of TB, each influencing who received care:\n- A mechanical failure of the lungs (James Watt's era)\n- An inherited disease affecting certain \"types\" of personalities\n- Caused by demon possession, poisoned air, God's judgment, or whiskey\n- A disease of the poor and the racially marginalized\n\nGreen's thesis: **how we understand illness is never neutral** — it determines social priorities, resource allocation, and ultimately, who dies.\n\n### The Romantic Disease Myth\n\nFor roughly two centuries (c. 1750–1950), TB was romanticized as the \"artist's disease\" — a mark of creative genius and spiritual refinement. The wasting, pallor, feverish intensity, and early death were aestheticized rather than medicalized. Keats, Chopin, Kafka, Modigliani, Chekhov, Orwell — so many prominent artists died of TB that the association became self-reinforcing.\n\nThis myth caused direct harm: it concentrated sympathy (and sanatorium care) on middle-class consumptives while the poor — who bore the highest disease burden — were instead blamed for moral failing. The romanticization of TB among artists helped justify neglect of TB among the masses.\n\nSee [[romanticization-of-illness]] for the full concept, including Susan Sontag's *Illness as Metaphor* analysis.\n\n## Key People and Organizations\n\n- **[[john-green|John Green]]** — author; personal connection through great-uncle Stokes Goodrich, who died of TB in 1930 in a Asheville sanatorium\n- **[[partners-in-health|Partners in Health]]** — nonprofit supporting TB treatment in Sierra Leone (Lakka Government Hospital)\n- **James Watt** — steam engine inventor who tried to cure consumption to save his son Gregory (d. 1804)\n- **Robert Koch** — identified the TB bacillus in 1882\n\n## Drug-Resistant TB\n\nThe book includes chapters on \"Superbug\" and \"Vicious Cycles,\" addressing drug-resistant TB strains that develop when treatment is incomplete or inconsistent — a direct consequence of inadequate access to full drug courses.\n\n## Key Themes\n\n- [[health-equity]] — TB as an expression of global inequality\n- The moral weight of curable diseases we allow to kill\n- How poverty structures exposure to infectious disease\n- The role of narrative and framing in public health\n\n## Open Questions\n\n- What would full TB eradication require politically and financially?\n- How does drug-resistant TB change the cure timeline?\n- **What can TB's history teach us about COVID-19, HIV, and future pandemics?**  \n  Several lessons emerge with enough specificity to be actionable: (1) *Cures don't cure inequality* — TB became curable in the 1950s; seventy years later it still kills 1.25 million per year. The pattern repeated exactly with HIV (effective ART available by 1996; millions died in Africa through the 2000s because drugs were where disease was not) and with COVID vaccines (mRNA vaccines developed in under a year; low-income countries reached coverage years later). The lesson is not that we need faster science but that distribution is the predictable crisis, and we consistently fail to plan for it in advance. (2) *Romanticization and stigma are both lethal, by the same mechanism* — TB was sentimentalized for the middle class and blamed on the poor. HIV was blamed on gay men and drug users, delaying funding and political will for years. COVID produced the same pattern (it only kills the old; it only kills the comorbid). When illness can be narrated as something that happens to *them*, political will for collective response collapses. (3) *Partial treatment breeds resistance* — incomplete TB courses created MDR-TB and XDR-TB, requiring 18–24 month regimens costing 100× as much as drug-susceptible TB. Incomplete HIV treatment creates resistant strains. Large unvaccinated COVID populations created variant emergence conditions. Cheap early intervention is always cheaper than expensive late intervention, but health systems consistently underfund the former. (4) *The political economy of neglect is stable* — TB spent decades as a \"solved problem\" in wealthy countries while killing millions annually in poor ones. Funding follows disease burden in rich countries, not global burden. This will be the pattern for the next pandemic unless governance (WHO funding, pandemic treaty) is deliberately redesigned. (5) *Community trust is the rate-limiting factor for all interventions* — germ theory required cultural adoption; directly observed TB therapy (DOT) succeeded where health worker relationships were strong and failed where they were absent; COVID vaccine rollout succeeded fastest where institutional trust was highest. Building trusted community health workers and functional primary care is a pandemic-preparedness investment, not just a development goal.\n\n## Source\n\n`raw/books/Everything Is Tuberculosis - John Green.epub`\n"}, {"id": "teenage-girl-development", "title": "Teenage Girl Development", "date": "2026-05-18", "tags": ["psychology", "adolescence", "development", "parenting", "education"], "related": ["lisa-damour", "developmental-strands"], "category": "topics", "excerpt": "Teenage Girl Development\n\nOverview / Core Thesis\n\nLisa Damour's Untangled: Guiding Teenage Girls Through the Seven Transitions into Adulthood (2016) reframes adolescence not as a chaotic ordeal to survive but as a structured developmental process wit", "content": "---\ntitle: \"Teenage Girl Development\"\ndate: 2026-05-18\ntags: [psychology, adolescence, development, parenting, education]\nrelated: [[lisa-damour]], [[developmental-strands]]\n---\n\n# Teenage Girl Development\n\n## Overview / Core Thesis\n\nLisa Damour's *Untangled: Guiding Teenage Girls Through the Seven Transitions into Adulthood* (2016) reframes adolescence not as a chaotic ordeal to survive but as a structured developmental process with a predictable blueprint. Drawing on Anna Freud's concept of developmental strands and decades of clinical practice, Damour identifies seven distinct transitions that girls must navigate to become healthy adults. Understanding these strands allows parents to distinguish normal (if alarming) development from genuinely concerning behavior.\n\n## The Seven Developmental Strands\n\n1. **Parting with childhood** — Girls begin separating from the comfort of childhood, sometimes abruptly rejecting activities and relationships they previously loved. This is healthy individuation, not rejection of parents.\n2. **Joining a new tribe** — Peer groups become paramount; girls shift allegiance from family to friends as the primary social unit. Cliques, social drama, and intense loyalty are features of this transition.\n3. **Harnessing emotions** — Adolescent girls experience emotions with unusual intensity. Learning to manage, express, and regulate strong feelings is essential developmental work; meltdowns are often normal, not alarming.\n4. **Contending with adult authority** — Girls push back against rules and authority figures as they develop their own values and judgment. Healthy defiance differs from pathological oppositional behavior.\n5. **Planning for the future** — Girls begin to think about identity, career, and purpose; this can manifest as intense ambition or anxious avoidance, depending on the individual.\n6. **Entering the romantic world** — Navigating attraction, relationships, and sexuality is a major developmental task; girls may simultaneously consume teen magazines and The Economist without contradiction.\n7. **Caring for herself** — Girls must learn to take responsibility for their physical and emotional well-being, including sleep, nutrition, mental health, and safety. Chronic self-neglect is a warning sign.\n\n## Key Principles\n\n### Progress Is Multi-Track\nGirls develop along all seven strands simultaneously, at different rates. A girl may be socially mature but emotionally volatile, or academically focused but struggling with self-care. Parents should attend to all domains rather than letting success in one area mask difficulty in another.\n\n### Normal vs. Concerning\nEach strand has a \"When to Worry\" threshold. The book consistently distinguishes developmentally appropriate behavior (even if disruptive) from patterns that warrant professional consultation. Most teenage drama falls in the normal range.\n\n### Cultural Context\nModern adolescence is shaped by intense competitive pressure and 24/7 digital connection. These factors amplify normal developmental stressors and introduce new risks (social media, cyberbullying, comparison culture). The fundamental strands are timeless; the cultural overlay changes how they manifest.\n\n### Boys vs. Girls\nWhile the strands apply broadly to adolescents of all genders, girls face unique challenges — social aggression, body image, gender-based expectations, and sexualization — that warrant specific attention.\n\n## Key People\n- [[lisa-damour]] — clinical psychologist, Case Western Reserve professor, consulting psychologist at Laurel School; author of *Untangled* and *Under Pressure*\n\n## Key Concepts\n- [[developmental-strands]] — Anna Freud's framework for tracking multi-domain progress through adolescence\n\n## Open Questions\n- How do these strands manifest differently across racial, cultural, and economic contexts?\n- What does healthy navigation of these strands look like in the age of social media and smartphones?\n- How do the strands apply to transgender and non-binary teens?\n\n## Source\n`raw/books/Lisa Damour - Untangled_ Guiding Teenage Girls Through the Seven Transitions into Adulthood (2016, Ballantine Books) - libgen.li.epub`\n"}, {"id": "crony-capitalism-and-monetary-deformation", "title": "Crony Capitalism and Monetary Deformation", "date": "2026-05-18", "tags": ["economics", "monetary-policy", "politics", "finance", "history"], "related": ["sound-money", "david-stockman", "stockman-2008-critique", "crony-capitalism", "bubble-finance"], "category": "topics", "excerpt": "Crony Capitalism and Monetary Deformation\n\nOverview / Core Thesis\n\nDavid Stockman's The Great Deformation (2013) argues that American capitalism has been systematically corrupted by a crony capitalist alliance between Wall Street and Washington. The", "content": "---\ntitle: \"Crony Capitalism and Monetary Deformation\"\ndate: 2026-05-18\ntags: [economics, monetary-policy, politics, finance, history]\nrelated: [[david-stockman]], [[crony-capitalism]], [[sound-money]], [[stockman-2008-critique]]\n---\n\n# Crony Capitalism and Monetary Deformation\n\n## Overview / Core Thesis\n\n[[david-stockman|David Stockman]]'s *The Great Deformation* (2013) argues that American capitalism has been systematically corrupted by a [[crony-capitalism|crony capitalist]] alliance between Wall Street and Washington. The Federal Reserve's abandonment of [[sound-money|sound money]] in favor of [[bubble-finance|bubble finance]], combined with bipartisan bailout culture, has created a permanent fiscal cliff that neither party has the will or ability to address. The deformation is not a partisan failure but a structural one rooted in decades of monetary and fiscal decisions going back to Nixon's 1971 closing of the gold window.\n\n## Key Ideas\n\n### The 2008 Blackberry Panic\nStockman contends the TARP bailout was unnecessary and driven by panic rather than systemic necessity. His claim: no \"dark ATMs\" or imminent banking collapse — just a hissy fit on Wall Street that Hank Paulson (a Goldman Sachs transplant) used to extract massive public subsidies for Wall Street firms, AIG, and eventually automakers. The \"contagion\" narrative was a cover story.\n\n### The Reagan Legacy Reexamined\nStockman served as Reagan's budget director and argues the \"Reagan Revolution\" was largely mythologized. Reagan's welfare state was barely 0.5% of GDP smaller than Carter's; defense spending ballooned; structural deficits became permanent. The supply-side revolution gave way to crony tax-cutting for K Street lobbies, not principled fiscal conservatism.\n\n### Nixon's Abomination — August 1971\nThe closure of the gold window and the shift to floating fiat currencies is Stockman's original sin. It untethered monetary policy from discipline and enabled the Federal Reserve to become an engine of inflation, bubble finance, and political interference in markets.\n\n### The Age of Bubble Finance\nFrom Greenspan through Bernanke, the Fed's response to every downturn was to reflate asset prices rather than allow market clearing. This created serial bubbles (tech, housing, LBOs) and rewarded financial engineering over productive investment. Wall Street became enormous relative to the real economy.\n\n### Sundown in America\nStockman's prognosis is dark: with deficits as far as the eye can see, a captured central bank, entrenched lobbies, and a political system unable to make hard choices, free markets and representative democracy are in long-term decline.\n\n## Key People\n- [[david-stockman]] — Reagan budget director turned critic; author of *The Great Deformation*\n\n## Key Concepts\n- [[crony-capitalism]] — state capture by private financial interests, especially Wall Street\n- [[sound-money]] — gold-backed or discipline-constrained monetary systems vs. fiat bubble finance\n- [[bubble-finance]] — serial Fed-enabled asset bubbles masking underlying economic stagnation\n\n## Open Questions\n- Is Stockman's prescription (sound money, no bailouts, fiscal austerity) politically achievable or merely principled?\n- **Does his libertarian lens cause him to underweight the systemic risks he dismisses (e.g., was 2008 actually catastrophic without intervention)?**  \n  Yes, substantially. Stockman's \"Blackberry Panic\" framing — that TARP was unnecessary theater by Goldman alumni — does not hold up against the empirical record. In September 2008, commercial paper markets froze, money market funds \"broke the buck\" after Lehman (triggering a run that nearly destroyed the $3.5T money-market industry), and interbank lending essentially stopped. These are measurable seizures in the core plumbing of the financial system, not just Wall Street melodrama. Bernanke, a serious scholar of the Great Depression, was specifically responding to the mechanism by which 1929 became the 1930s: bank-run contagion propagating through the real economy via credit contraction. Counterfactual analysis (Gorton, Acemoglu and others) suggests that without intervention, cascading failures could have pushed unemployment well above the ~10% actual peak — potentially toward 1930s levels. Stockman's libertarian priors lead him to read moral hazard (which is real) as proof that the underlying risk was manufactured, when in fact both can be true simultaneously. Where Stockman is *correct*: the bailout terms were too favorable to shareholders and executives (Goldman received 100 cents on the dollar on AIG contracts); the moral hazard created by \"too big to fail\" was severe and left unaddressed; subsequent QE programs went beyond crisis-fighting into asset-price management that concentrated gains to capital. The correct synthesis is that intervention of *some kind* was probably necessary to prevent a depression, while the specific intervention that occurred was poorly structured and captured by the interests it was meant to discipline.\n- How has the post-2013 decade of QE, COVID stimulus, and crypto validated or invalidated his thesis?\n\n## Source\n`raw/books/David Stockman - The Great Deformation (2013, PublicAffairs).epub`\n"}, {"id": "art-theft-and-obsession", "title": "Art Theft and Obsession", "date": "2026-05-18", "tags": ["art", "crime", "obsession", "psychology", "collecting"], "related": ["compulsive-collecting", "stephane-breitwieser", "michael-finkel"], "category": "topics", "excerpt": "Art Theft and Obsession\n\nA synthesis of Michael Finkel's The Art Thief (2023).\n\nThe Subject\n\nStéphane Breitwieser (b. 1971, Mulhouse, France) is considered the most prolific art thief in history. Over roughly a decade in the 1990s and early 2000s, he", "content": "---\ntitle: \"Art Theft and Obsession\"\ndate: 2026-05-18\ntags: [art, crime, obsession, psychology, collecting]\nrelated: [[stephane-breitwieser]], [[compulsive-collecting]], [[michael-finkel]]\n---\n\n# Art Theft and Obsession\n\nA synthesis of Michael Finkel's *The Art Thief* (2023).\n\n## The Subject\n\n**[[stephane-breitwieser|Stéphane Breitwieser]]** (b. 1971, Mulhouse, France) is considered the most prolific art thief in history. Over roughly a decade in the 1990s and early 2000s, he stole approximately **239 works** from museums across Europe, with an estimated combined value in the hundreds of millions of dollars. He was never caught in the act during his thieving career.\n\nHis accomplice and girlfriend: **Anne-Catherine Kleinklaus**.\n\n## The Method\n\nBreitwieser and Kleinklaus operated as a couple — unremarkable museum tourists. Their typical approach:\n- Purchase tickets with cash; arrive at busy public hours (often lunchtime Sunday)\n- Anne-Catherine carried a large Yves Saint Laurent bag; Breitwieser wore an oversized coat\n- He memorized guard rotations and escape routes on solo scouting visits before each theft\n- Key insight: **all security has a flaw** — guards are human, get hungry, and rotate predictably\n- He exploited the lunchtime gap when guards went to eat and coverage became thin\n\nFirst documented theft: February 1997, **Rubens House, Antwerp** — an ivory sculpture of Adam and Eve by Georg Petel (1627).\n\n## The Motive: Not Money\n\nThe extraordinary detail of Breitwieser's case is that he **never sold a single stolen work**. He kept everything in a secret attic bedroom in his mother's house in Mulhouse — every surface covered with silver platters, ivory carvings, Napoleon's personal tobacco box, gilded tea sets, Émile Gallé glasswork, medieval weapons, and hundreds of other pieces.\n\nHe stole purely for **aesthetic possession** — to wake up surrounded by beauty, to touch what master craftsmen had made centuries before.\n\nThe book's epigraph: *\"Aesthetics are higher than ethics.\" — Oscar Wilde*\n\n## The Attic\n\nThe secret upstairs rooms in his mother's house contained what amounted to a private museum. Items from his bedside table alone:\n- Ivory Adam and Eve (from Rubens House)\n- Ivory Diana figurine\n- Ivory Catherine of Alexandria\n- Cupid resting on a skull\n- Napoleon's personal golden tobacco box in blue enamel\n- Émile Gallé flower vase\n- A great silver goblet\n- Sections of bronze pieces, porcelain, nautilus-shell chalice\n\nEvery flat surface — armoire, desk, dresser — filled.\n\n## Key Concepts\n\n- [[compulsive-collecting]] — the psychology of obsessive acquisition divorced from monetary value\n- The aesthetics/ethics tension: Is a deep emotional response to beauty a moral defense?\n- Security theater: museum security often relies on routine and assumption rather than genuine deterrence\n\n## Key People\n\n- **[[stephane-breitwieser|Stéphane Breitwieser]]** — the thief; subject of the book\n- **Anne-Catherine Kleinklaus** — his girlfriend and accomplice\n- **[[michael-finkel|Michael Finkel]]** — journalist/author; also wrote *The Stranger in the Woods*\n- **Peter Paul Rubens** — painter whose former home museum was the site of the first major theft\n\n## Open Questions\n\n- What is the ethics of possessing beauty you cannot share?\n- Do Breitwieser's crimes constitute preservation or theft — he kept works safe while many museums had poor security?\n- What does the case reveal about how we value art institutionally vs. personally?\n\n## Source\n\n`raw/books/Michael Finkel - The Art Thief (2023, Knopf Doubleday Publishing Group) - libgen.li.epub`\n"}, {"id": "experimental-mindset", "title": "Experimental Mindset", "date": "2026-05-18", "tags": ["productivity", "learning", "neuroscience", "career", "creativity"], "related": ["growth-mindset", "experiment-theater", "tiny-experiments", "anne-laure-le-cunff"], "category": "topics", "excerpt": "Experimental Mindset\n\nOverview / Core Thesis\n\nAnne-Laure Le Cunff's Tiny Experiments argues that the traditional goal-setting framework — linear, outcome-focused, SMART goals — is fundamentally broken for the unpredictable, complex lives most people", "content": "---\ntitle: \"Experimental Mindset\"\ndate: 2026-05-18\ntags: [productivity, learning, neuroscience, career, creativity]\nrelated: [[anne-laure-le-cunff]], [[tiny-experiments]], [[experiment-theater]]\n---\n\n# Experimental Mindset\n\n## Overview / Core Thesis\n\nAnne-Laure Le Cunff's *Tiny Experiments* argues that the traditional goal-setting framework — linear, outcome-focused, SMART goals — is fundamentally broken for the unpredictable, complex lives most people live today. The alternative is an experimental mindset: treating your life and career as a laboratory, running small structured experiments driven by curiosity rather than pursuing fixed destinations. This approach, grounded in neuroscience, reclaims the exploratory spirit children have naturally but adults are trained to suppress.\n\n## Key Ideas\n\n### Why Linear Goals Fail\nLinear goals were designed for controlled environments with predictable timelines. They create a constant sense of failure (you are always \"far from success\") and paralyze people in uncertain situations where the target itself is unclear. The orientational metaphors embedded in goal language (\"drive toward,\" \"achieve,\" \"arrive at\") presuppose a knowable destination — a poor fit for creative, personal, or career questions.\n\n### The Experimental Alternative\nInstead of \"What is my goal?\" ask \"What experiment can I run?\" Experiments have:\n- A clear hypothesis (what I want to learn or try)\n- A bounded time horizon (small commitment, fast feedback)\n- A success criterion defined by learning, not outcome\n- Built-in permission to fail and iterate\n\n### Curiosity as the Engine\nLe Cunff's personal story — leaving Google, founding a startup that failed, returning to school to study neuroscience, growing Ness Labs newsletter to 100,000 readers — is a sequence of experiments driven by curiosity rather than a master plan. Each experiment created the platform for the next.\n\n### The Pact Structure\nThe book is organized around three phases:\n1. **Pact** — Commit to curiosity; define your experiment\n2. **Act** — Practice mindful action; show up without attachment to outcomes\n3. **React** — Collaborate with the unexpected; integrate what you learn\n\n### Neuroscience Foundation\nLe Cunff, as a neuroscientist, grounds the framework in how different brains learn differently. The brain's reward system responds to novelty and exploration (curiosity-driven behavior) differently than to threat-avoidance (outcome-driven behavior). An experimental mindset activates intrinsic motivation, which is more durable than extrinsic goal pressure.\n\n### The Linear Life Trap\nModern society scripts a \"linear life\" — school → credential → career ladder → retirement. This script creates coherent narratives and social approval but suppresses the exploratory, branching behavior that actually generates discovery and satisfaction. Amelia Earhart is the book's exemplar: her famous transatlantic solo flight was only possible because of many earlier experiments, failed ventures (trucking, photography), and willingness to take an active role even when she couldn't be the pilot.\n\n## Key People\n- [[anne-laure-le-cunff]] — French-Algerian neuroscientist, founder of Ness Labs, former Google employee; author of *Tiny Experiments*\n\n## Key Concepts\n- [[tiny-experiments]] — small, curiosity-driven trials that prioritize learning over predetermined outcomes\n- [[growth-mindset]] — related framework (Dweck): ability as developable through effort; shares experimental orientation\n\n## Open Questions\n- How do you maintain financial stability while running experiments that may not pay off?\n- Is the experimental mindset a luxury of the educated, mobile professional class, or can it apply across economic circumstances?\n- **How does one avoid \"experiment theater\" — endless exploration that avoids real commitment?**  \n  Experiment theater thrives on ambiguity and serves a hidden emotional function: if you never fully commit, you never fully fail. Several structural antidotes: (1) *Pre-commit to a stopping condition before starting* — define what would count as \"enough learning to decide\" before launching the experiment. The failure mode is open-ended criteria (\"I need more data\") that can always be extended. (2) *Distinguish low-cost probes from high-cost ones* — not all experiments are equivalent. A three-month newsletter trial is cheap; a sabbatical to \"explore\" is expensive. Escalation to costlier experiments should require evidence from cheaper ones, not just curiosity. (3) *Build escalation gates* — after each experiment, ask not \"should I keep exploring?\" but \"what would need to be true for me to commit?\" This reframes the question as accumulating evidence toward a decision rather than indefinitely deferring one. (4) *Notice the avoidance function* — if your experiments have been circling the same domain for years without escalation, the obstacle is probably emotional rather than epistemic. Le Cunff's PACT framework (Pact → Act → React) is designed to force integration of what you learn, not just accumulation. (5) *Time-box and force the question* — give each experiment a fixed window, after which you must either commit meaningfully or formally close it. The deadline makes the avoidance visible. The experimental mindset is compatible with deep commitment; it simply insists that commitment follow evidence rather than precede it.\n\n## Source\n`raw/books/Tiny_Experiments.epub`\n"}, {"id": "living-and-working-with-ai", "title": "Living and Working with AI", "date": "2026-05-18", "tags": ["ai", "technology", "work", "education", "future"], "related": ["cognitive-atrophy-and-ai", "general-purpose-technology", "ethan-mollick", "large-language-models", "jagged-frontier", "mapping-the-jagged-frontier"], "category": "topics", "excerpt": "Living and Working with AI\n\nOverview / Core Thesis\n\nEthan Mollick's Co-Intelligence: Living and Working With AI (2024) argues that large language models represent a once-in-a-generation General Purpose Technology (GPT) — comparable to steam power or", "content": "---\ntitle: \"Living and Working with AI\"\ndate: 2026-05-18\ntags: [ai, technology, work, education, future]\nrelated: [[ethan-mollick]], [[large-language-models]], [[jagged-frontier]], [[cognitive-atrophy-and-ai]], [[mapping-the-jagged-frontier]]\n---\n\n# Living and Working with AI\n\n## Overview / Core Thesis\n\nEthan Mollick's *Co-Intelligence: Living and Working With AI* (2024) argues that large language models represent a once-in-a-generation [[general-purpose-technology|General Purpose Technology]] (GPT) — comparable to steam power or the internet — but with a crucial difference: AI augments *cognitive* work, not just physical or mechanical labor. The appropriate response is not avoidance or uncritical adoption, but thoughtful co-intelligence: learning to work *with* AI as a collaborator while maintaining human judgment and oversight.\n\n## Key Ideas\n\n### AI as General Purpose Technology\nLLMs are a GPT — a technology that touches every industry and every aspect of life. Unlike past GPTs, which took decades to achieve broad adoption, LLMs (driven by ChatGPT) reached 100 million users faster than any prior product in history. The speed of capability growth (model size increasing ~10x/year) compounds this urgency.\n\n### The Jagged Frontier\nAI capability is not a smooth gradient but an irregular \"jagged frontier.\" Some tasks that seem hard for AI are easy (writing sonnets, generating ideas), while tasks that seem easy are hard (counting words exactly, basic arithmetic). The frontier is invisible — the only way to map it is to experiment. Workers who invest in mapping the frontier for their specific domain gain outsized advantage.\n\n### Four Rules for Co-Intelligence\n1. **Always invite AI to the table** — experiment with it across all tasks to understand capabilities and limits.\n2. **Be the human in the loop** — AI is a tool for augmentation, not replacement; human judgment and ethics remain essential.\n3. **Treat AI like a brilliant friend** — frank, knowledgeable, always available, but not infallible.\n4. **Assume this is the worst AI you'll ever use** — capabilities are improving rapidly; what's hard today may not be tomorrow.\n\n### Productivity and Work Transformation\nEarly studies show AI can improve productivity 20–80% across a wide range of knowledge work (coding, marketing, writing). For comparison, the Industrial Revolution's steam power improved factory productivity by only 18–22%. AI's asymmetric impact on cognitive vs. manual work means white-collar professions face disruption at unusual speed.\n\n### The Alien Nature of LLMs\nMollick emphasizes that LLMs are genuinely alien — they process language in ways that mimic human output without being human or sentient. They have passed the Turing Test and Lovelace Test, ace professional exams, and score highly on creativity assessments. This alienness is precisely why they can serve as a useful thinking partner: their biases and blind spots differ from ours.\n\n### Education Disruption\nLLMs are already disrupting writing assessment, cheating, and the teacher-student dynamic. AI tutors may radically democratize personalized education. Mollick sees AI as a potential \"brilliant tutor\" available to anyone, leveling access to expertise previously reserved for the privileged.\n\n## Key People\n- [[ethan-mollick]] — Wharton professor of innovation, one of the earliest academic researchers on practical LLM applications\n\n## Key Concepts\n- [[large-language-models]] — the underlying technology: transformer-based neural networks trained on vast text data\n- [[jagged-frontier]] — the irregular, invisible boundary of AI capability across different task types\n- [[general-purpose-technology]] — why LLMs matter beyond a single tool category\n\n## Open Questions\n- Where is the jagged frontier for any given profession, and how should workers invest their mapping efforts?\n- **At what point does AI augmentation shade into cognitive atrophy — do we lose skills by outsourcing them?**  \n  The risk is real but skill-specific and non-linear. The critical distinction is whether AI acts as a *prosthetic* (replaces a function entirely) or a *scaffold* (supports a function while the underlying capability is still exercised). GPS use correlates with reduced hippocampal spatial memory (Maguire et al.); autocomplete affects manual spelling ability. For AI, atrophy risk is highest in skills where (1) AI performance exceeds the user's own baseline, so the user rarely needs to exercise the skill independently; (2) feedback loops are long, so errors are invisible; and (3) the skill requires tacit knowledge built through trial and error (clinical judgment, legal reasoning). The risk is lower when humans remain the editor and evaluator — keeping diagnostic skill active — or when the domain is novel enough that AI routinely fails and the user must fill in. The practical prescription is to periodically work *without* AI in core domains, the way surgeons maintain manual skills even when automation is available. Mollick's own fourth rule (\"assume this is the worst AI you'll ever use\") cuts both ways: the underlying skill built now, while AI is still limited at the jagged frontier, is the insurance policy for the moments AI fails.\n- How will the political economy of AI-driven productivity gains distribute — to workers or to capital?\n\n## Source\n`raw/books/Ethan Mollick - Co-Intelligence_ Living and Working With AI (2024, Penguin Publishing Group).epub`\n"}, {"id": "mathematics-education", "title": "Mathematics Education", "date": "2026-05-18", "tags": ["education", "mathematics", "growth-mindset", "learning", "pedagogy"], "related": ["health-equity", "procedural-fluency-vs-open-tasks", "jo-boaler", "growth-mindset", "carol-dweck"], "category": "topics", "excerpt": "Mathematics Education\n\nA synthesis of Jo Boaler's Mathematical Mindsets: Unleashing Students' Potential through Creative Mathematics (2022, 2nd ed.).\n\nCore Thesis\n\nMost students experience mathematics as a fixed, performance-based subject: you either", "content": "---\ntitle: \"Mathematics Education\"\ndate: 2026-05-18\ntags: [education, mathematics, growth-mindset, learning, pedagogy]\nrelated: [[growth-mindset]], [[jo-boaler]], [[carol-dweck]], [[procedural-fluency-vs-open-tasks]]\n---\n\n# Mathematics Education\n\nA synthesis of Jo Boaler's *Mathematical Mindsets: Unleashing Students' Potential through Creative Mathematics* (2022, 2nd ed.).\n\n## Core Thesis\n\nMost students experience mathematics as a fixed, performance-based subject: you either \"get it\" or you don't. Boaler argues this is both empirically wrong and educationally destructive. Mathematical ability is **not innate** — it grows through challenge, productive struggle, and the right kind of feedback.\n\nThe book applies [[carol-dweck|Carol Dweck]]'s **[[growth-mindset]]** research specifically to mathematics learning.\n\n## The Fixed Mindset Trap in Math\n\nCulturally, mathematics uniquely suffers from fixed-mindset framing:\n- Speed is equated with ability (\"fast finishers are the smart ones\")\n- Single right answers reinforce the idea that you either know or you don't\n- Early \"tracking\" (ability grouping) solidifies student identity as \"a math person\" or not\n- Mistakes are treated as failures rather than learning events\n\nThe consequence: students who struggle disengage, develop math anxiety, and opt out of STEM pathways — disproportionately girls and students of color.\n\n## What Mathematical Mindsets Looks Like in Practice\n\nBoaler draws on her Stanford research and work at YouCubed to describe concrete classroom interventions:\n\n- **Open tasks** — problems with multiple valid approaches and solutions, not one right answer\n- **Visual mathematics** — using diagrams, patterns, and spatial reasoning alongside symbolic algebra\n- **Valuing mistakes** — neuroscience shows that synaptic activity increases when we make and notice errors\n- **Depth over speed** — eliminating timed tests; rewarding conceptual understanding over speed\n- **Mixed-ability grouping** — heterogeneous classrooms with roles that distribute mathematical status\n- **Number talks** — structured discussions about different ways to compute the same result\n\n## The Neuroscience of Learning Math\n\nKey findings Boaler cites:\n- The brain physically grows new pathways when struggling with hard problems\n- Timed tests activate the amygdala (fear response) and suppress the prefrontal cortex needed for mathematical reasoning\n- Girls are especially sensitive to the stereotype threat activated by timed conditions\n- Mistakes that are noticed (but not dwelled on) produce more synaptic growth than correct answers\n\n## Key Concepts\n\n- **[[growth-mindset|Growth Mindset]]** ([[carol-dweck|Carol Dweck]]) — the belief that intelligence and ability are developable, not fixed\n- **Productive struggle** — the state of being appropriately challenged; the optimal zone for learning\n- **Mathematical creativity** — treating math as an exploratory, creative discipline, not a procedural one\n- **Status** in classrooms — how perceived mathematical ability distributes participation and silences students\n\n## Key People\n\n- **[[jo-boaler|Jo Boaler]]** — Stanford professor, founder of YouCubed, author; central voice in reform mathematics education\n- **[[carol-dweck|Carol Dweck]]** — Stanford psychologist; developer of growth mindset theory that underlies Boaler's framework\n\n## Connections to Other Topics\n\n- Links to [[growth-mindset]] as a general psychological concept applicable beyond mathematics\n- Relates to questions of [[health-equity]] — who gets tracked into or out of rigorous mathematics shapes lifetime opportunity\n\n## Open Questions\n\n- How do standardized tests (SAT, ACT) create structural incentives that undermine growth-mindset pedagogy?\n- What does teacher training need to look like for mathematical mindset approaches to scale?\n- Is there tension between \"open tasks\" and the need to develop procedural fluency?\n\n## Source\n\n`raw/books/Jo Boaler - Mathematical Mindsets_ Unleashing Students' Potential through Creative Mathematics, Inspiring Messages and Innovative Teaching (2022, Jossey-Bass).pdf`\n"}, {"id": "mental-models-and-multidisciplinary-thinking", "title": "Mental Models and Multidisciplinary Thinking", "date": "2026-05-18", "tags": ["thinking", "investing", "decision-making", "wisdom", "philosophy"], "related": ["mental-models", "warren-buffett", "inversion", "latticework-failure-modes", "charlie-munger"], "category": "topics", "excerpt": "Mental Models and Multidisciplinary Thinking\n\nOverview / Core Thesis\n\nPoor Charlie's Almanack (2023 expanded edition, edited by Peter Kaufman) collects the speeches, talks, and wisdom of Charles T. Munger — Warren Buffett's longtime partner at Berksh", "content": "---\ntitle: \"Mental Models and Multidisciplinary Thinking\"\ndate: 2026-05-18\ntags: [thinking, investing, decision-making, wisdom, philosophy]\nrelated: [[charlie-munger]], [[mental-models]], [[latticework-failure-modes]]\n---\n\n# Mental Models and Multidisciplinary Thinking\n\n## Overview / Core Thesis\n\n*Poor Charlie's Almanack* (2023 expanded edition, edited by Peter Kaufman) collects the speeches, talks, and wisdom of Charles T. Munger — Warren Buffett's longtime partner at Berkshire Hathaway and one of the most distinctive thinkers in American business. Munger's central contribution is a multi-disciplinary approach to thinking: rather than becoming an expert in one domain, build a \"latticework of mental models\" drawn from physics, biology, psychology, history, economics, and mathematics. These models interact and reinforce each other, enabling clearer, more accurate judgment in any domain.\n\n## Key Ideas\n\n### The Latticework of Mental Models\nMunger argues that genuine wisdom comes from assembling [[mental-models|mental models]] from many disciplines, not just deepening expertise in one. Each model is a tool for understanding a class of problems. Holding many models reduces the cognitive distortion that comes from seeing every problem through a single lens (\"to a man with a hammer, everything looks like a nail\").\n\n### Key Mental Models Munger Returns To\n- **Inversion** — following Jacobi's maxim \"invert, always invert\": think about what you want to avoid, not just what you want to achieve. Ask \"what would guarantee failure?\" then avoid it.\n- **Circle of Competence** — know what you know and what you don't. Stay within your competence and expand it deliberately.\n- **Opportunity Cost** — every choice forecloses alternatives; always ask what else could be done with the same resources.\n- **Lollapalooza Effect** — multiple biases or forces aligned in the same direction produce extreme, non-linear outcomes (positive or negative).\n- **Availability Bias** — we overweight vivid, recent, or emotionally salient information. Good thinkers actively counter this.\n- **Incentive-Caused Bias** — people reliably behave in ways that serve their incentives; always ask \"who benefits?\"\n\n### The Psychology of Human Misjudgment\nOne of Munger's most celebrated talks catalogs 25+ cognitive biases and psychological tendencies that cause intelligent people to make terrible decisions: social proof, commitment and consistency bias, envy and jealousy, deprival super-reaction syndrome, and more. Awareness of these tendencies is the first step toward countering them.\n\n### Lifelong Learning as Core Discipline\nMunger attributes much of his success to voracious reading and continuous learning across domains. He reads biographies, scientific papers, business histories, and philosophy — not to collect information but to build and refine models. He and Buffett famously spend most of their time reading rather than managing.\n\n### The Connection to Value Investing\nMunger's multidisciplinary thinking shapes his investment approach: look for businesses with durable competitive advantages (\"moats\"), run by honest and capable managers, available at reasonable prices. Avoid the \"institutional imperative\" (doing what peers do) and the temptation to overcomplicate. Wait for the fat pitch.\n\n### Independence and Wealth\n\"I wanted to get rich so I could be independent, like Lord John Maynard Keynes.\" Wealth is instrumental for Munger — a means to intellectual freedom and genuine autonomy, not an end in itself.\n\n## Key People\n- [[charlie-munger]] — vice chairman of Berkshire Hathaway, polymath investor, partner of [[warren-buffett|Warren Buffett]]\n\n## Key Concepts\n- [[mental-models]] — cognitive tools drawn from multiple disciplines for clearer reasoning\n- [[inversion]] — solving problems by reasoning backward from failure\n\n## Open Questions\n- Can the latticework approach be systematically taught, or does it require Munger's unusual combination of traits?\n- How do Munger's mental models hold up against behavioral economics research that emerged after he developed them?\n- **Where does the latticework approach fail — what kinds of problems resist multi-model synthesis?**  \n  Several categories of problems resist the approach: (1) *Deep procedural expertise* — the latticework is a tool for judgment under uncertainty, not for technical execution. Differential equations, surgical technique, bench biology, and similar skills require deliberate practice and domain-specific feedback that mental models cannot replace. Munger is clear he operates through others who have that expertise. (2) *Model conflict without resolution* — when multiple models point in different directions, the framework doesn't specify how to weight them. Munger's answer (\"wait for the lollapalooza, when everything aligns\") isn't always available; sometimes you must decide under genuine model uncertainty. (3) *Truly novel domains* — in domains where no settled models yet exist (LLMs in 2020, mRNA vaccines pre-COVID), applying familiar frameworks from adjacent fields can be actively misleading. Overconfident polymaths are a real phenomenon: the same breadth that enables insight can generate spurious analogies. (4) *Fast-iteration, high-pressure environments* — the latticework is a deliberate, reflective process. In emergency medicine, competitive athletics, or active trading, tacit expertise built through high-volume practice (Kahneman's System 1) often outperforms conscious model consultation. (5) *Irreducibly political problems* — knowing *why* institutions resist change doesn't determine *whether* they will. The best mental models can diagnose but not solve problems rooted in power dynamics and entrenched interest.\n\n## Source\n`raw/books/Poor Charlie's Almanack 2023.epub`\n"}];
const pageMap = {};
PAGES.forEach(p => pageMap[p.id] = p);

function resolveId(raw) {
  const s = raw.trim();
  if (pageMap[s]) return s;
  const slug = s.toLowerCase().replace(/\s+/g,'-');
  if (pageMap[slug]) return slug;
  return null;
}

/* ── State ── */
let currentView = 'home';
let currentFilter = 'all';
let currentTag = null;
let searchQuery = '';
let graphSvg, zoomBeh, graphSim;

/* ── Navigate ── */
function navigate(view) {
  currentView = view;
  document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
  document.getElementById('nav-' + view)?.classList.add('active');
  searchQuery = '';
  document.getElementById('search-input').value = '';
  currentFilter = 'all';
  currentTag = null;
  render();
}

/* ── Main render ── */
function render() {
  const titles = { home:'Home', graph:'Graph', index:'Index', authors:'Authors', upload:'Upload Material' };
  document.getElementById('topbar-title').textContent = titles[currentView] || '';

  const searchBox = document.getElementById('search-input');
  const cats = document.getElementById('topbar-cats');
  searchBox.style.display = (currentView === 'graph' || currentView === 'upload') ? 'none' : '';

  if (currentView === 'index') {
    cats.innerHTML = ['all','concepts','topics','people'].map(c =>
      `<span class="cat-chip ${c} ${currentFilter===c?'active':''}" onclick="setFilter('${c}')">${c==='all'?'All':c[0].toUpperCase()+c.slice(1)}</span>`
    ).join('');
  } else {
    cats.innerHTML = '';
  }

  const el = document.getElementById('content');
  // Reset any inline styles set by the graph view so other views scroll normally
  el.style.overflow = '';
  el.style.height = '';
  if (currentView === 'home')    renderHome(el);
  else if (currentView === 'graph')   renderGraph(el);
  else if (currentView === 'index')   renderIndex(el);
  else if (currentView === 'authors') renderAuthors(el);
  else if (currentView === 'upload')  renderUpload(el);

  renderFooter();
}

/* ── Footer stats ── */
function renderFooter() {
  const c = PAGES.filter(p=>p.category==='concepts').length;
  const t = PAGES.filter(p=>p.category==='topics').length;
  const ppl = PAGES.filter(p=>p.category==='people').length;
  document.getElementById('sidebar-footer').innerHTML = `
    <div class="stat-row"><span class="stat-label">Concepts</span><span class="stat-val c">${c}</span></div>
    <div class="stat-row"><span class="stat-label">Topics</span><span class="stat-val t">${t}</span></div>

    <div class="stat-row" style="margin-top:6px;border-top:1px solid var(--border);padding-top:6px">
      <span class="stat-label">Total</span><span class="stat-val">${PAGES.length}</span>
    </div>`;
}

/* ── Home ── */
function cardHTML(p, badge) {
  const tags = p.tags.slice(0,2).map(t=>`<span class="card-tag">${t}</span>`).join('');
  return `<div class="card" onclick="openReader('${p.id}')">
    ${badge ? '<span class="new-badge">New</span>' : ''}
    <span class="cat-badge ${p.category}">${p.category}</span>
    <div class="card-title">${p.title}</div>
    <div class="card-excerpt">${p.excerpt}</div>
    <div class="card-footer">
      <span class="card-date">${p.date}</span>
      <div class="card-tags">${tags}</div>
    </div>
  </div>`;
}

function renderHome(el) {
  const sorted = [...PAGES].sort((a,b) => b.date.localeCompare(a.date));
  const top3 = sorted.slice(0,3);
  const next6 = sorted.slice(3,9);
  const c = PAGES.filter(p=>p.category==='concepts').length;
  const t = PAGES.filter(p=>p.category==='topics').length;
  const ppl = PAGES.filter(p=>p.category==='people').length;
  const today = new Date().toISOString().slice(0,7);
  const mo = PAGES.filter(p=>p.date.startsWith(today)).length;

  el.innerHTML = `
    <div class="home-hero">
      <h2>Vinh's Wiki</h2>
      <p>${PAGES.length} pages — concepts, topics, and people</p>

      <div class="stat-box c"><div class="num">${c}</div><div class="lbl">Concepts</div></div>
      <div class="stat-box t"><div class="num">${t}</div><div class="lbl">Topics</div></div>
      <div class="stat-box p"><div class="num">${ppl}</div><div class="lbl">People</div></div>
      <div class="stat-box">   <div class="num">${mo || sorted.filter(p=>p.date>='2026-05').length}</div><div class="lbl">This month</div></div>
    </div>
    <div class="section-hd"><h3>✨ Recently Added</h3><a onclick="navigate('index')">View all →</a></div>
    <div class="cards-grid" style="padding-top:0">${top3.map(p=>cardHTML(p,true)).join('')}</div>
    <div class="section-hd"><h3>📚 More Pages</h3></div>
    <div class="cards-grid" style="padding-top:0">${next6.map(p=>cardHTML(p,false)).join('')}</div>
  `;
}

/* ── Index ── */
function renderIndex(el) {
  const allTags = [...new Set(
    PAGES.filter(p=>currentFilter==='all'||p.category===currentFilter).flatMap(p=>p.tags)
  )].sort();

  let pages = PAGES.filter(p => {
    if (currentFilter !== 'all' && p.category !== currentFilter) return false;
    if (currentTag && !p.tags.includes(currentTag)) return false;
    if (searchQuery) {
      const q = searchQuery.toLowerCase();
      return p.title.toLowerCase().includes(q) || p.excerpt.toLowerCase().includes(q) || p.tags.some(t=>t.includes(q));
    }
    return true;
  }).sort((a,b) => b.date.localeCompare(a.date));

  const tagPills = allTags.map(t =>
    `<span class="tag-pill ${currentTag===t?'active':''}" onclick="setTag('${t}')">${t}</span>`
  ).join('');

  el.innerHTML = `
    <div class="tag-filter-bar">${tagPills}</div>
    <div class="results-count">${pages.length} page${pages.length!==1?'s':''}${currentTag?` · "${currentTag}"`:''}</div>
    <div class="cards-grid">${pages.map(p=>cardHTML(p,false)).join('') || '<p style="padding:20px;color:var(--text3)">No results.</p>'}</div>
  `;

  // update cat chips active state
  document.querySelectorAll('.cat-chip').forEach(el => {
    const c = [...el.classList].find(c=>['all','concepts','topics','people'].includes(c));
    el.classList.toggle('active', c === currentFilter);
  });
}

function setFilter(f) { currentFilter = f; currentTag = null; render(); }
function setTag(t)    { currentTag = currentTag===t ? null : t; render(); }
function handleSearch(q) {
  searchQuery = q;
  if (currentView !== 'index' && currentView !== 'authors') navigate('index');
  else render();
}

/* ── Authors ── */
function renderAuthors(el) {
  let people = PAGES.filter(p=>p.category==='people');
  if (searchQuery) {
    const q = searchQuery.toLowerCase();
    people = people.filter(p=>p.title.toLowerCase().includes(q)||p.tags.some(t=>t.includes(q)));
  }
  people = people.sort((a,b)=>a.title.localeCompare(b.title));

  el.innerHTML = `
    <div class="results-count" style="padding:14px 18px 4px">${people.length} authors</div>
    <div class="authors-grid">
      ${people.map(p => {
        const ini = p.title.split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase();
        const conn = PAGES.filter(op=>op.related.includes(p.id)).length;
        const tags = p.tags.slice(0,3).map(t=>`<span class="card-tag">${t}</span>`).join('');
        return `<div class="author-card" onclick="openReader('${p.id}')">
          <div class="author-avatar">${ini}</div>
          <div class="author-name">${p.title}</div>
          <div class="author-excerpt">${p.excerpt.slice(0,110)}</div>
          <div class="author-meta">${conn} connected page${conn!==1?'s':''} · ${p.related.length} references</div>
          <div class="author-tags">${tags}</div>
        </div>`;
      }).join('')}
    </div>
  `;
}

/* ── Graph ── */
function renderGraph(el) {
  el.style.overflow = 'hidden';
  el.style.height = '100%';
  el.innerHTML = `
    <div id="graph-wrap">
      <input class="graph-search" type="text" placeholder="Highlight a page…" oninput="highlightNodes(this.value)">
      <svg id="graph-svg"></svg>
      <div class="graph-controls">
        <button class="graph-btn" onclick="gZoomIn()" title="Zoom in">+</button>
        <button class="graph-btn" onclick="gZoomOut()" title="Zoom out">−</button>
        <button class="graph-btn" onclick="gReset()" title="Reset" style="font-size:11px">↺</button>
      </div>
      <div class="graph-legend">
        <div class="legend-row"><div class="legend-dot" style="background:var(--c-concept)"></div>Concept</div>
        <div class="legend-row"><div class="legend-dot" style="background:var(--c-topic)"></div>Topic</div>
        <div class="legend-row"><div class="legend-dot" style="background:var(--c-people)"></div>Person</div>
      </div>
      <div class="graph-tooltip" id="graph-tooltip"></div>
    </div>`;
  setTimeout(initGraph, 50);
}

let _gNode, _gLink, _gLinks;

function initGraph() {
  const wrap = document.getElementById('graph-wrap');
  const W = wrap.clientWidth, H = wrap.clientHeight;
  const col = { concepts:'#2383E2', topics:'#0F7B6C', people:'#9065B0' };

  const nodes = PAGES.map(p => ({ id:p.id, title:p.title, category:p.category }));
  const nodeIds = new Set(nodes.map(n=>n.id));
  const seen = new Set(); const links = [];
  PAGES.forEach(p => p.related.forEach(r => {
    const res = resolveId(r);
    if (res && res!==p.id && nodeIds.has(res)) {
      const k = [p.id,res].sort().join('|');
      if (!seen.has(k)) { seen.add(k); links.push({source:p.id,target:res}); }
    }
  }));

  graphSvg = d3.select('#graph-svg').attr('width',W).attr('height',H);
  zoomBeh  = d3.zoom().scaleExtent([0.1,4]).on('zoom', e => g.attr('transform', e.transform));
  graphSvg.call(zoomBeh);
  const g = graphSvg.append('g');

  graphSim = d3.forceSimulation(nodes)
    .force('link',  d3.forceLink(links).id(d=>d.id).distance(90).strength(0.4))
    .force('charge',d3.forceManyBody().strength(-250))
    .force('center',d3.forceCenter(W/2, H/2))
    .force('coll',  d3.forceCollide(20));

  const link = g.append('g').attr('stroke','#D3D3CF').attr('stroke-width',1)
    .selectAll('line').data(links).join('line').attr('opacity',0.6);

  const node = g.append('g').selectAll('circle').data(nodes).join('circle')
    .attr('r', d=>d.category==='topics'?9:d.category==='people'?8:6)
    .attr('fill', d=>col[d.category]||'#888')
    .attr('stroke','#fff').attr('stroke-width',2).attr('cursor','pointer')
    .call(d3.drag()
      .on('start',(e,d)=>{ if(!e.active) graphSim.alphaTarget(0.3).restart(); d.fx=d.x; d.fy=d.y; })
      .on('drag', (e,d)=>{ d.fx=e.x; d.fy=e.y; })
      .on('end',  (e,d)=>{ if(!e.active) graphSim.alphaTarget(0); d.fx=null; d.fy=null; }))
    .on('click', (e,d)=>{ openReader(d.id); e.stopPropagation(); })
    .on('mouseover', (e,d)=>{
      const tt = document.getElementById('graph-tooltip');
      const cn = links.filter(l=>(l.source.id||l.source)===d.id||(l.target.id||l.target)===d.id).length;
      tt.innerHTML = `<strong>${d.title}</strong><br><span style="color:var(--text3)">${d.category} · ${cn} link${cn!==1?'s':''}</span>`;
      tt.style.opacity='1';
      tt.style.left=(e.offsetX+12)+'px'; tt.style.top=(e.offsetY-8)+'px';
      node.attr('opacity',n=>{
        if(n.id===d.id) return 1;
        return links.some(l=>(l.source.id||l.source)===d.id&&(l.target.id||l.target)===n.id||(l.target.id||l.target)===d.id&&(l.source.id||l.source)===n.id)?1:0.15;
      });
      link.attr('opacity',l=>((l.source.id||l.source)===d.id||(l.target.id||l.target)===d.id)?1:0.05);
    })
    .on('mouseout',()=>{
      document.getElementById('graph-tooltip').style.opacity='0';
      node.attr('opacity',1); link.attr('opacity',0.6);
    });

  const lbl = g.append('g').selectAll('text').data(nodes).join('text')
    .text(d=>d.title.split(' ').slice(0,3).join(' '))
    .attr('font-size',9).attr('fill','#787774').attr('text-anchor','middle')
    .attr('pointer-events','none').attr('dy',18);

  graphSim.on('tick',()=>{
    link.attr('x1',d=>d.source.x).attr('y1',d=>d.source.y).attr('x2',d=>d.target.x).attr('y2',d=>d.target.y);
    node.attr('cx',d=>d.x).attr('cy',d=>d.y);
    lbl.attr('x',d=>d.x).attr('y',d=>d.y);
  });
  _gNode=node; _gLink=link; _gLinks=links;
}

function highlightNodes(q) {
  if (!_gNode) return;
  if (!q) { _gNode.attr('opacity',1).attr('r',d=>d.category==='topics'?9:d.category==='people'?8:6); return; }
  const ql=q.toLowerCase();
  _gNode.attr('opacity',d=>d.title.toLowerCase().includes(ql)?1:0.12)
        .attr('r',d=>d.title.toLowerCase().includes(ql)?(d.category==='topics'?12:d.category==='people'?11:9):(d.category==='topics'?9:d.category==='people'?8:6));
}
function gZoomIn()  { graphSvg.transition().duration(280).call(zoomBeh.scaleBy,1.4); }
function gZoomOut() { graphSvg.transition().duration(280).call(zoomBeh.scaleBy,0.7); }
function gReset()   { graphSvg.transition().duration(380).call(zoomBeh.transform, d3.zoomIdentity); }

function handleDragOver(e){ e.preventDefault(); document.getElementById('upload-zone').classList.add('drag-over'); }
function handleDragLeave(){ document.getElementById('upload-zone').classList.remove('drag-over'); }
function handleDrop(e){ e.preventDefault(); document.getElementById('upload-zone').classList.remove('drag-over'); handleFileSelect(e.dataTransfer.files); }
function handleFileSelect(files) {
  if (!files?.length) return;
  const file = files[0];
  const ext = file.name.split('.').pop().toLowerCase();
  const sz = file.size>1024*1024?`${(file.size/1024/1024).toFixed(1)} MB`:`${Math.round(file.size/1024)} KB`;
  const folder = ['epub','pdf'].includes(ext)?'raw/books/': ext==='md'?'raw/articles/':'raw/notes/';
  const reader = new FileReader();
  reader.onload = e => {
    const pre = (ext==='md'||ext==='txt') ? `<div class="upload-content-pre">${e.target.result.slice(0,600)}${e.target.result.length>600?'\n…':''}</div>` : '';
    document.getElementById('upload-preview-area').innerHTML = `
      <div class="upload-preview">
        <h4>Preview</h4>
        <div><span class="upload-fname">${file.name}</span><span class="upload-sz">${sz}</span></div>
        <div class="upload-dest" style="margin-top:6px">Place in: <code>${folder}</code></div>
        ${pre}
        <div style="margin-top:12px;display:flex;gap:8px">
          <button class="btn btn-primary" onclick="copyPath('${folder}${file.name}')">Copy target path</button>
          <button class="btn btn-ghost" onclick="document.getElementById('upload-preview-area').innerHTML=''">Dismiss</button>
        </div>
      </div>`;
  };
  if (ext==='md'||ext==='txt') reader.readAsText(file); else reader.readAsArrayBuffer(file);
}
function copyPath(p) {
  navigator.clipboard.writeText(p).then(()=>{
    const b=document.querySelector('.btn-primary'); b.textContent='Copied!';
    setTimeout(()=>b.textContent='Copy target path',1500);
  });
}

/* ── Reader ── */
function openReader(id) {
  const page = pageMap[id];
  if (!page) return;

  const catEl = document.getElementById('reader-cat');
  catEl.textContent = page.category;
  catEl.className = 'reader-cat ' + page.category;
  document.getElementById('reader-title').textContent = page.title;
  document.getElementById('reader-meta').innerHTML =
    `<span class="reader-date">${page.date}</span>` +
    page.tags.slice(0,4).map(t=>`<span class="card-tag">${t}</span>`).join('');

  // Strip frontmatter, convert wikilinks, render markdown
  const body = page.content.replace(/^---[\s\S]*?---\n/, '').trim();
  const linked = body.replace(/\[\[([^\]|]+)(?:\|([^\]]+))?\]\]/g, (_,rid,display)=>{
    const label = display || rid;
    const res = resolveId(rid);
    return res ? `<a class="wiki-link" onclick="openReader('${res}')">${label}</a>` : `<span style="color:var(--text3)">${label}</span>`;
  });
  document.getElementById('reader-content').innerHTML = marked.parse(linked);

  // Scroll reader-body to top
  document.getElementById('reader-body').scrollTop = 0;

  // Related
  const related = [...new Set(
    page.related.map(r=>resolveId(r)).filter(Boolean).filter(rid=>rid!==id)
  )].slice(0,14);
  const dotCol = { concepts:'var(--c-concept)', topics:'var(--c-topic)', people:'var(--c-people)' };
  document.getElementById('related-list').innerHTML = related.map(rid => {
    const rp = pageMap[rid]; if(!rp) return '';
    return `<div class="related-item" onclick="openReader('${rid}')">
      <div class="related-dot" style="background:${dotCol[rp.category]||'#ccc'}"></div>
      <span class="related-text">${rp.title}</span>
      <span class="related-cat">${rp.category}</span>
    </div>`;
  }).join('');

  document.getElementById('reader-panel').classList.add('open');
}

function closeReader() {
  document.getElementById('reader-panel').classList.remove('open');
}

/* ── Reader resize ── */
(function () {
  const MIN_W = 300, MAX_W = 780;
  const panel  = document.getElementById('reader-panel');
  const handle = document.getElementById('reader-resize');
  const badge  = document.getElementById('reader-size-badge');
  let dragging = false, startX = 0, startW = 0;

  handle.addEventListener('mousedown', e => {
    e.preventDefault();
    dragging = true;
    startX = e.clientX;
    startW = panel.offsetWidth;
    panel.classList.add('resizing');
    handle.classList.add('active');
    badge.style.opacity = '1';
    document.body.style.cursor = 'col-resize';
    document.body.style.userSelect = 'none';
  });

  document.addEventListener('mousemove', e => {
    if (!dragging) return;
    // dragging left widens the panel (panel grows to the left)
    const delta = startX - e.clientX;
    const newW  = Math.min(MAX_W, Math.max(MIN_W, startW + delta));
    panel.style.width = newW + 'px';
    badge.textContent = newW + 'px';
  });

  document.addEventListener('mouseup', () => {
    if (!dragging) return;
    dragging = false;
    panel.classList.remove('resizing');
    handle.classList.remove('active');
    badge.style.opacity = '0';
    document.body.style.cursor = '';
    document.body.style.userSelect = '';
  });
})();

/* ── Boot ── */
render();
</script>
