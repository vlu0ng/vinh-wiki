or endurance without bitterness\n2. Use Stoic ethics for personal conduct — be the person who doesn't participate in the small lies that aggregate into structural injustice\n3. Use political philosophy for structural analysis — don't confuse personal virtue with structural remedy\n4. Maintain the distinction between what is in your sphere of control (how you act) and what requires collective action (structural change)\n\n## Related Concepts\n- [[stoic-justice]] — the source text (Holiday's *Right Thing, Right Now*)\n- [[stoic-virtues]] — the broader Stoic framework\n- [[disposition-vs-knowledge]] — Stoic ethics as a practice-based tradition\n"}, {"id": "cal-newport", "title": "Cal Newport", "date": "2026-05-19", "tags": ["author", "computer-scientist", "productivity", "deep-work"], "related": ["cognitive-atrophy-and-ai", "pseudo-productivity", "slow-productivity"], "category": "people", "excerpt": "Cal Newport\n\nComputer science professor at Georgetown University and author known for challenging conventional productivity\nadvice. His recurring thesis: the way knowledge workers are taught to work — always-on, multitasking, inbox-obsessed\n— is not", "content": "---\ntitle: \"Cal Newport\"\ndate: 2026-05-19\ntags: [author, computer-scientist, productivity, deep-work]\nrelated: [[slow-productivity]], [[pseudo-productivity]]\n---\n\n# Cal Newport\n\nComputer science professor at Georgetown University and author known for challenging conventional productivity\nadvice. His recurring thesis: the way knowledge workers are taught to work — always-on, multitasking, inbox-obsessed\n— is not just unpleasant but counterproductive.\n\n## Key Works\n\n- *Deep Work* (2016) — argues that the ability to focus without distraction on cognitively demanding tasks is\n  increasingly rare and increasingly valuable\n- *Digital Minimalism* (2019) — applies similar logic to social media and technology consumption\n- *A World Without Email* (2021) — critiques the hyperactive hive mind as an organizational dysfunction\n- *Slow Productivity* (2024) — historical argument that great creators worked less frantically than we imagine;\n  three-principle framework for a saner approach\n\n## Key Contributions\n\n- Coined \"deep work\" as a technical term for focused, distraction-free cognitive effort\n- Documented the \"pseudo-productivity\" trap: visible busyness mistaken for valuable output\n- Used historical case studies (Jane Austen, Copernicus, Marie Curie, Jewel) to argue that the slow, variable\n  pace of master-level work is a feature, not a flaw\n- Developed the three principles of [[slow-productivity]]: do fewer things, work at a natural pace, obsess over quality\n\n## Related Topics\n- [[slow-productivity]] — his most synthetic book\n- [[pseudo-productivity]] — the central concept he critiques\n- [[cognitive-atrophy-and-ai]] — a question his work raises: does AI assistance erode the craft-building\n  that deep work develops?\n"}, {"id": "jessie-inchauspee", "title": "Jessie Inchauspée", "date": "2026-05-19", "tags": ["nutrition", "health", "glucose", "metabolic-health"], "related": ["glucose-curves", "glucose-revolution", "health-equity"], "category": "people", "excerpt": "Jessie Inchauspée\n\nBiochemist and science communicator known online as the \"Glucose Goddess.\" Author of Glucose Revolution (2022) and\nThe Glucose Goddess Method (2023). Her work translates continuous glucose monitor (CGM) data and metabolic research", "content": "---\ntitle: \"Jessie Inchauspée\"\ndate: 2026-05-19\ntags: [nutrition, health, glucose, metabolic-health]\nrelated: [[glucose-revolution]], [[glucose-curves]]\n---\n\n# Jessie Inchauspée\n\nBiochemist and science communicator known online as the \"Glucose Goddess.\" Author of *Glucose Revolution* (2022) and\n*The Glucose Goddess Method* (2023). Her work translates continuous glucose monitor (CGM) data and metabolic research\ninto practical, accessible dietary interventions.\n\n## Background\n\nHolds a degree in mathematics from Sciences Po Paris and a degree in genetics from King's College London. Her personal\ninterest in glucose monitoring began after a health scare; she began sharing CGM data and experiments on Instagram,\nbuilding a following before writing her books.\n\n## Key Contributions\n\n- *Glucose Revolution* (2022) — translated glucose curve science into 10 practical \"hacks\" for flattening spikes\n  without extreme dietary restriction\n- Introduced the \"glucose curve\" as an intuitive visual metaphor for metabolic health — spikes and crashes vs.\n  steady cruising altitude\n- Emphasized: *flatten your glucose curves → automatically flatten fructose and insulin curves*\n- Core message: you don't need to eliminate foods; you need to manage the *sequence*, *timing*, and *pairing* of foods\n  to control glucose impact\n\n## Caveats in Her Own Work\n\nInchauspée explicitly acknowledges: glucose isn't everything. Industrial processed oils, alcohol, and other factors\nmatter for health but don't register as glucose spikes. She resists prescribing a \"diet\" and instead offers tactics\nthat work within any dietary framework.\n\n## Related Topics\n- [[glucose-revolution]] — full synthesis of her framework\n- [[glucose-curves]] — the core concept\n- [[health-equity]] — metabolic health interventions require food access and economic stability;\n  CGM devices remain expensive\n"}, {"id": "ronald-heifetz", "title": "Ronald Heifetz", "date": "2026-05-19", "tags": ["leadership", "organizational-change", "harvard", "adaptive-leadership"], "related": ["adaptive-vs-technical-challenges", "adaptive-leadership"], "category": "people", "excerpt": "Ronald Heifetz\n\nProfessor at Harvard Kennedy School and co-founder of the Center for Public Leadership. Developer of the Adaptive\nLeadership framework, one of the most influential theories of leadership in organizational settings.\n\nCore Framework\n\nHe", "content": "---\ntitle: \"Ronald Heifetz\"\ndate: 2026-05-19\ntags: [leadership, organizational-change, harvard, adaptive-leadership]\nrelated: [[adaptive-leadership]], [[adaptive-vs-technical-challenges]]\n---\n\n# Ronald Heifetz\n\nProfessor at Harvard Kennedy School and co-founder of the Center for Public Leadership. Developer of the Adaptive\nLeadership framework, one of the most influential theories of leadership in organizational settings.\n\n## Core Framework\n\nHeifetz's foundational insight: most leadership failures occur because people apply *technical* solutions to\n*adaptive* problems. Technical problems have known solutions and can be solved by authorities/experts. Adaptive\nchallenges require people to change their own values, beliefs, and behaviors — and no authority can do that for them.\n\nThis distinction — developed in *Leadership Without Easy Answers* (1994) and refined in *Leadership on the Line*\n(2002, with Linsky) — reframes leadership as primarily about *mobilizing people to face hard work*, not about having\nthe right answers.\n\n## Key Books\n\n- *Leadership Without Easy Answers* (1994) — founding statement of the adaptive leadership framework\n- *Leadership on the Line* (2002, with Marty Linsky) — the personal risks of leadership; how to stay alive\n  politically while doing adaptive work\n- *The Practice of Adaptive Leadership* (2009, with Linsky and Grashow) — a field manual with exercises and tools\n\n## Key Contributions\n\n- The technical/adaptive distinction — the most practically useful diagnostic tool in leadership development\n- The balcony/dance floor metaphor — leaders must alternate between immersion in the action and observing the system\n- Productive disequilibrium — the idea that change requires some heat; the leader's job is to regulate the\n  temperature, not eliminate it\n- Faction mapping — understanding who gains and who loses from change proposals\n\n## Related Topics\n- [[adaptive-leadership]] — the full framework\n- [[adaptive-vs-technical-challenges]] — the central concept\n"}, {"id": "gary-keller", "title": "Gary Keller", "date": "2026-05-19", "tags": ["entrepreneurship", "productivity", "real-estate", "focus"], "related": ["focusing-question", "the-one-thing", "slow-productivity"], "category": "people", "excerpt": "Gary Keller\n\nCo-founder and chairman of Keller Williams Realty, one of the largest real estate franchise companies in the world.\nCo-author of The ONE Thing (2013) with Jay Papasan.\n\nBackground\n\nKeller's central insight came from a crisis: after rapid", "content": "---\ntitle: \"Gary Keller\"\ndate: 2026-05-19\ntags: [entrepreneurship, productivity, real-estate, focus]\nrelated: [[the-one-thing]], [[focusing-question]]\n---\n\n# Gary Keller\n\nCo-founder and chairman of Keller Williams Realty, one of the largest real estate franchise companies in the world.\nCo-author of *The ONE Thing* (2013) with Jay Papasan.\n\n## Background\n\nKeller's central insight came from a crisis: after rapid growth, his company stalled and his personal life was in\nturmoil. A coach helped him identify that there were 14 key positions that needed the right people — and that filling\nthose 14 roles was *the one thing* that would change everything else. He stepped down as CEO, made that his singular\nfocus, and the company entered a decade of 40% year-over-year growth.\n\n## Key Contributions\n\n- *The ONE Thing* (2013) — articulated the Focusing Question as a daily/strategic tool; built a framework for\n  prioritization by elimination rather than addition\n- Practical demonstration that \"going small\" — ruthlessly narrowing focus — produces bigger results than juggling\n  many priorities\n- The domino effect model of success: sequential, geometric progress beats simultaneous effort across many fronts\n\n## Related Topics\n- [[the-one-thing]] — the book's full framework\n- [[focusing-question]] — the core tool\n- [[slow-productivity]] — Newport's \"do fewer things\" principle arrived independently at a similar place\n"}, {"id": "ryan-holiday", "title": "Ryan Holiday", "date": "2026-05-19", "tags": ["author", "stoicism", "philosophy", "ethics"], "related": ["stoic-justice", "stoic-virtues", "mental-models-and-multidisciplinary-thinking"], "category": "people", "excerpt": "Ryan Holiday\n\nAuthor and media strategist who became one of the most prominent popularizers of Stoic philosophy. Former director\nof marketing at American Apparel; left to focus on writing after Stoicism reshaped his understanding of what a good\nlife", "content": "---\ntitle: \"Ryan Holiday\"\ndate: 2026-05-19\ntags: [author, stoicism, philosophy, ethics]\nrelated: [[stoic-justice]], [[stoic-virtues]], [[mental-models-and-multidisciplinary-thinking]]\n---\n\n# Ryan Holiday\n\nAuthor and media strategist who became one of the most prominent popularizers of Stoic philosophy. Former director\nof marketing at American Apparel; left to focus on writing after Stoicism reshaped his understanding of what a good\nlife looks like.\n\n## Intellectual Evolution\n\nHoliday's early engagement with Stoicism was self-serving — discipline, resilience, emotional control as\ncompetitive tools. His writing has evolved toward a more other-directed, socially conscious reading. He describes this\nas a natural arc: the Stoics who endured history did so through service, not self-mastery alone.\n\n## Stoic Virtues Trilogy\n\n1. *The Obstacle Is the Way* (2014) — courage and resilience; turning adversity into advantage\n2. *Ego Is the Enemy* (2016) — temperance; the dangers of arrogance and self-absorption\n3. *Right Thing, Right Now* (2023) — *justice*; the social dimension of character\n\n## Key Contributions\n\n- Brought Marcus Aurelius, Seneca, and Epictetus to a modern popular audience\n- Framed Stoicism not as passive resignation but as an action-orienting philosophy for leaders\n- *Right Thing, Right Now* recenters ethics on other-directedness: truth-telling, self-accountability, fairness,\n  and service to the common good\n- The Truman case study: showed how a seemingly ordinary person (failed businessman, modest credentials) built\n  extraordinary leadership capacity through consistent virtue practice over decades\n\n## Key Works\n- The Daily Stoic series; *Stillness Is the Key*; *Lives of the Stoics*; *Discipline Is Destiny*\n\n## Related Topics\n- [[stoic-justice]] — the book this page is anchored to\n- [[stoic-virtues]] — the four cardinal virtues framework\n- [[mental-models-and-multidisciplinary-thinking]] — Munger and Holiday share a conviction that ancient wisdom\n  belongs in practical decision-making\n"}, {"id": "sal-khan", "title": "Sal Khan", "date": "2026-05-19", "tags": ["education", "AI", "ed-tech", "khan-academy"], "related": ["ai-in-education", "large-language-models", "ai-tutoring", "living-and-working-with-ai"], "category": "people", "excerpt": "Sal Khan\n\nFounder and CEO of Khan Academy, the nonprofit that provides free, world-class education to anyone anywhere. Former\nhedge fund analyst who began tutoring his cousins remotely via Yahoo Doodle; the sessions became YouTube videos;\nthe videos", "content": "---\ntitle: \"Sal Khan\"\ndate: 2026-05-19\ntags: [education, AI, ed-tech, khan-academy]\nrelated: [[ai-in-education]], [[ai-tutoring]], [[living-and-working-with-ai]]\n---\n\n# Sal Khan\n\nFounder and CEO of Khan Academy, the nonprofit that provides free, world-class education to anyone anywhere. Former\nhedge fund analyst who began tutoring his cousins remotely via Yahoo Doodle; the sessions became YouTube videos;\nthe videos became Khan Academy.\n\n## Background\n\nHolds degrees from MIT (mathematics, computer science) and Harvard Business School. His educational philosophy\nis grounded in **mastery learning**: students should demonstrate mastery of a concept before moving on, rather\nthan being advanced with their cohort on a time-based schedule. This is the opposite of how most schools work.\n\n## Key Contributions\n\n- Built Khan Academy into the world's largest free educational platform (~150M registered users)\n- Identified and documented Benjamin Bloom's \"2 Sigma Problem\" as the mission framing for AI tutoring: human\n  one-on-one tutoring produces 2-standard-deviation gains, but human tutoring doesn't scale; AI might close that gap\n- Launched Khanmigo (March 2023) — one of the first large-scale GPT-4 educational deployments, designed as a\n  Socratic tutor rather than an answer machine\n- Authored *Brave New Words* (2024) as a manifesto for embracing rather than banning AI in education\n\n## Design Philosophy for AI in Education\n\n- AI should *ask* questions, not *give* answers (Socratic method)\n- Safety and pedagogical soundness must be designed in before launch, not retrofitted\n- The goal is not automation of teaching but *augmentation* — freeing teachers from administrative burden while\n  deepening student engagement\n\n## Related Topics\n- [[ai-in-education]] — the full synthesis of his book's argument\n- [[ai-tutoring]] — the technical concept of AI-as-tutor\n- [[large-language-models]] — the underlying technology\n"}, {"id": "warren-buffett", "title": "Warren Buffett", "date": "2026-05-19", "tags": ["investing", "berkshire-hathaway", "value-investing"], "related": ["charlie-munger", "mental-models", "mental-models-and-multidisciplinary-thinking"], "category": "people", "excerpt": "Warren Buffett\n\nWarren Buffett is the longtime chairman and CEO of Berkshire Hathaway and Charlie Munger's investing partner. In this wiki, Buffett mainly appears as the institutional and intellectual counterpart to Munger: Buffett supplied the value", "content": "---\ntitle: \"Warren Buffett\"\ndate: 2026-05-19\ntags: [investing, berkshire-hathaway, value-investing]\nrelated: [[charlie-munger]], [[mental-models-and-multidisciplinary-thinking]], [[mental-models]]\n---\n\n# Warren Buffett\n\nWarren Buffett is the longtime chairman and CEO of Berkshire Hathaway and [[charlie-munger|Charlie Munger]]'s investing partner. In this wiki, Buffett mainly appears as the institutional and intellectual counterpart to Munger: Buffett supplied the value-investing base, while Munger helped push Berkshire toward buying excellent businesses at fair prices rather than merely cheap assets.\n\n## Relevance to This Wiki\n\n- Buffett anchors the Berkshire Hathaway context for [[mental-models-and-multidisciplinary-thinking]].\n- His partnership with [[charlie-munger]] illustrates how durable decision-making cultures can be shaped by shared [[mental-models]].\n- The Buffett-Munger pairing is a practical case of long-horizon judgment, patience, incentives, and circle-of-competence reasoning.\n\n## Open Questions\n\n- Which Buffett writings or shareholder letters should be ingested to deepen the investing side of this wiki?\n- How much of Berkshire's philosophy is Buffett's original Graham-style value investing versus Munger's quality-business influence?\n"}, {"id": "kyla-scanlon", "title": "Kyla Scanlon", "date": "2026-05-19", "tags": ["economics", "finance", "media", "behavioral-economics"], "related": ["vibecession", "bubble-finance", "economic-literacy"], "category": "people", "excerpt": "Kyla Scanlon\n\nEconomic commentator, content creator, and author known for making macroeconomics accessible and human. Former asset\nmanagement analyst at Capital Group; pivoted to full-time content creation and writing after her short-form economic\nvi", "content": "---\ntitle: \"Kyla Scanlon\"\ndate: 2026-05-19\ntags: [economics, finance, media, behavioral-economics]\nrelated: [[economic-literacy]], [[vibecession]]\n---\n\n# Kyla Scanlon\n\nEconomic commentator, content creator, and author known for making macroeconomics accessible and human. Former asset\nmanagement analyst at Capital Group; pivoted to full-time content creation and writing after her short-form economic\nvideos gained a large following.\n\n## Background\n\nMajored in finance, economics, and data analytics in college. Began writing about markets as a teenager (blog:\n*Scanlon on Stocks*). Her gift is translating technical economic concepts into relatable language while taking the\nhuman/behavioral dimension seriously — a combination that most economics education and commentary lacks.\n\n## Key Contributions\n\n- Coined **\"vibecession\"** (2022) — the phenomenon where economic indicators are technically healthy but consumer\n  sentiment is depressed; feelings can become self-fulfilling. The term captured a genuine gap in economic vocabulary\n  and spread widely.\n- *In This Economy?* (2024) — a first-principles guide to economic literacy; argues that the economy is fundamentally\n  \"people peopling around\" and must be understood through both mechanics and behavioral psychology\n- Pioneered accessible economic education on short-form video, demonstrating that economic literacy is a media/\n  communication problem as much as a pedagogical one\n\n## Related Topics\n- [[economic-literacy]] — the full framework of her book\n- [[vibecession]] — her most influential concept\n- [[bubble-finance]] — a complementary (more structural) diagnosis of how vibes and fundamentals diverge\n"}, {"id": "stoic-virtues", "title": "Stoic Virtues", "date": "2026-05-19", "tags": ["stoicism", "ethics", "virtue", "philosophy"], "related": ["stoic-justice", "disposition-vs-knowledge", "mental-models", "ryan-holiday"], "category": "concepts", "excerpt": "Stoic Virtues\n\nThe Stoics identified four cardinal virtues as the complete framework for living well. Virtue, in the Stoic sense,\nis not a feeling or disposition but a practice — something you do, not something you have.\n\nThe Four Cardinals\n\n1. Tempe", "content": "---\ntitle: \"Stoic Virtues\"\ndate: 2026-05-19\ntags: [stoicism, ethics, virtue, philosophy]\nrelated: [[stoic-justice]], [[ryan-holiday]], [[mental-models]]\n---\n\n# Stoic Virtues\n\nThe Stoics identified four *cardinal virtues* as the complete framework for living well. Virtue, in the Stoic sense,\nis not a feeling or disposition but a *practice* — something you do, not something you have.\n\n## The Four Cardinals\n\n1. **Temperance** (*sophrosyne*) — self-regulation, moderation, the ability to control appetites and impulses\n2. **Courage** (*andreia*) — action despite fear; moral as well as physical courage\n3. **Wisdom** (*phronesis*) — practical judgment; seeing situations clearly; knowing what to do\n4. **Justice** (*dikaiosyne*) — right action toward others; fairness; honesty; the social expression of virtue\n\nMarcus Aurelius's formulation (underlined by Harry Truman): *\"The four greatest virtues are moderation, wisdom,\njustice, and fortitude, and if a man is able to cultivate those, that's all he needs to live a happy and successful\nlife.\"*\n\n## The Social Turn\n\nEarly Stoicism emphasized individual self-sufficiency. As the philosophy moved from Greek philosophy schools to Roman\ncivic life (Cicero, Seneca, Marcus Aurelius), it became increasingly other-directed. Justice, the most social of the\nvirtues, was central to this evolution.\n\nHistorian's note: the Stoics who are remembered — Cato, Marcus, Seneca (despite his contradictions) — were defined\nby their public service, not just private equanimity.\n\n## Virtue as Its Own Reward\n\nThe Stoic claim: virtue is the *only* good; everything else (wealth, health, reputation) is a \"preferred\nindifferent\" — valuable, but not required for the good life. Truman: *\"I have believed in honor, ethics, and right\nliving as its own reward.\"*\n\n## Examples / Case Studies\n\n- **Truman**: decades of virtue practice before power; character as the infrastructure of leadership\n- **Frank Robinson** ([[stoic-justice]]): fined himself after a lapse, unprompted\n- **Whistleblowers**: truth-telling as justice in action, even at personal cost\n\n## Related Topics\n- [[stoic-justice]] — Ryan Holiday's treatment of justice specifically\n- [[mental-models]] — Munger drew on Stoic ideas within his broader latticework\n- [[disposition-vs-knowledge]] — the Stoic virtue framework is precisely about disposition, not just knowing\n  what virtue is\n"}, {"id": "disposition-building-practices", "title": "Disposition-Building Practices", "date": "2026-05-19", "tags": ["thinking", "education", "wisdom", "character", "practice", "feedback"], "related": ["latticework-pedagogy", "mental-models", "mental-models-and-multidisciplinary-thinking", "inversion", "disposition-vs-knowledge", "superforecasting"], "category": "concepts", "excerpt": "Disposition-Building Practices\n\nA set of practices — primarily journaling, forecasting, and decision review — that empirical and philosophical evidence suggests can narrow the disposition/knowledge gap by installing feedback loops that knowledge tran", "content": "---\ntitle: \"Disposition-Building Practices\"\ndate: 2026-05-19\ntags: [thinking, education, wisdom, character, practice, feedback]\nrelated: [[disposition-vs-knowledge]], [[latticework-pedagogy]], [[mental-models]], [[superforecasting]]\n---\n\n# Disposition-Building Practices\n\nA set of practices — primarily journaling, forecasting, and decision review — that empirical and philosophical evidence suggests can narrow the [[disposition-vs-knowledge|disposition/knowledge gap]] by installing feedback loops that knowledge transmission alone cannot provide.\n\n## Why Practices Matter More Than Content\n\nThe core problem from [[disposition-vs-knowledge]]: knowledge can be stated, tested, and transmitted through text, but disposition is a stable behavioral orientation formed through *habituation under conditions of feedback*. The four mechanisms that prevent knowledge from becoming disposition all have one feature in common: **absent or delayed feedback**.\n\nPractices that reliably build disposition share a structural property: they force real predictions into confrontation with real outcomes, creating the feedback signal that changes behavior.\n\n## The Three Core Practices\n\n### 1. Forecasting\n\nForecasting — assigning explicit probabilities to specific, time-bound predictions and then reviewing outcomes — is the most rigorously studied of the three practices.\n\n**Why it works structurally:**\n- Forces the practitioner to *commit* to a belief with enough precision that it can be falsified\n- Creates a record that makes later rationalization harder\n- Provides clear, low-latency feedback (the event either happened or it didn't)\n- Rewards calibration (accurate uncertainty) rather than mere accuracy, reducing overconfidence\n\nPhilip Tetlock's superforecaster research (referenced in [[latticework-pedagogy]]) found that people who engage in structured forecasting develop habits of active open-mindedness, model comparison, and evidence-based updating — habits that closely overlap with the dispositional requirements of the latticework approach. See [[superforecasting]] for the concept in detail.\n\n**The key: feedback with accountability.** Forecasting without review is not forecasting — it is opining. The dispositional benefit comes from the *moment of reckoning*, when you must explain why you were wrong.\n\n### 2. Decision Journaling\n\nDecision journaling — recording the reasoning, evidence, and expected outcomes at the moment of a decision, before the outcome is known — addresses a structural weakness in ordinary experience: **hindsight bias**. Without a contemporaneous record, memory rewrites past reasoning to match outcomes, eliminating the feedback signal.\n\n**What to capture:**\n- The decision context (what was at stake, what information was available)\n- The reasoning process (which models or frameworks were applied, which were considered and rejected)\n- The explicit prediction (what outcome is expected and why)\n- The emotional state (to detect when intuition was noise vs. signal)\n\n**Why it builds disposition:**\n- Makes the reasoning visible and reviewable, not just the outcome\n- Creates a longitudinal record that reveals personal cognitive patterns (repeated overconfidence in domain X, consistent availability bias in Y)\n- The awareness of being recorded creates a mild accountability effect that slightly improves decision-making in real time\n\nFrom [[latticework-pedagogy]]: \"The models that stick in Munger's usage are the ones he has seen both succeed and fail in real situations.\" Decision journaling is how you see both.\n\n### 3. Decision Review\n\nDecision review — revisiting past decisions after outcomes are known, with the journal record as a check against hindsight revision — closes the feedback loop that journaling opens.\n\n**Effective review asks:**\n- Was the reasoning sound given what was knowable at the time? (Process, not just outcome)\n- Which mental models proved most useful? Which were misapplied?\n- What would have changed the decision? ([[inversion|Inversion]])\n\nThe [[mental-models-and-multidisciplinary-thinking|Munger]] emphasis on thinking about *failure* is natural here: reviewing decisions where models failed is more instructive than reviewing successes, because success is more easily attributed to luck.\n\n## The Minimal Viable Set\n\nBased on the evidence in [[latticework-pedagogy]], a minimal viable practice set needs to satisfy three conditions:\n\n| Condition | Why | Practice that provides it |\n|---|---|---|\n| Pre-commitment | Prevents hindsight revision | Decision journal + forecasting |\n| Clear feedback signal | Required for habit formation | Forecasting review; decision review |\n| Cross-domain application | Required for latticework, not just calibration | Apply all three across domains, not just one |\n\nThe minimum viable set is therefore: **a decision journal with explicit probability estimates for key predictions, reviewed quarterly**. The quarterly review is the essential step most people skip.\n\n## What These Practices Cannot Do\n\nThe practices work within the limits defined by [[disposition-vs-knowledge]]:\n\n- They do **not** replace the long time horizons and high stakes that Munger's actual investing experience provided\n- They cannot install cross-disciplinary curiosity if that trait is absent — they can only develop the *expression* of curiosity that already exists\n- They are significantly more effective for people already motivated by accuracy than for people motivated by social validation\n\nThe evidence from character education research: **modeling by exemplars and institutional culture** remain stronger predictors of dispositional change than any structured practice alone. Practices supplement but do not replace environment.\n\n## Related Topics\n- [[disposition-vs-knowledge]] — the core problem these practices address\n- [[latticework-pedagogy]] — evidence on what builds the latticework\n- [[superforecasting]] — Tetlock's research on forecasting as a discipline\n- [[mental-models]] — the frameworks that practices help install as disposition\n"}, {"id": "glucose-curves", "title": "Glucose Curves", "date": "2026-05-19", "tags": ["health", "nutrition", "metabolic-health", "glucose"], "related": ["jessie-inchauspee", "glucose-revolution", "health-equity"], "category": "concepts", "excerpt": "Glucose Curves\n\nThe visual/conceptual model introduced by Jessie Inchauspée to describe how blood glucose levels change over time in\nresponse to food, activity, and other inputs. The goal is not to minimize glucose but to flatten the curves —\nreduce", "content": "---\ntitle: \"Glucose Curves\"\ndate: 2026-05-19\ntags: [health, nutrition, metabolic-health, glucose]\nrelated: [[glucose-revolution]], [[jessie-inchauspee]], [[health-equity]]\n---\n\n# Glucose Curves\n\nThe visual/conceptual model introduced by Jessie Inchauspée to describe how blood glucose levels change over time in\nresponse to food, activity, and other inputs. The goal is not to minimize glucose but to **flatten the curves** —\nreduce the amplitude of spikes and crashes.\n\n## The Basic Pattern\n\n- **Spike**: Rapid rise in blood glucose after eating (especially refined carbohydrates and sugars)\n- **Crash**: Subsequent rapid decline, often below baseline, triggering hunger, fatigue, and cravings\n- **Flat curve**: Gradual, modest rise and return to baseline — associated with sustained energy and stable mood\n\n## Why Flattening Matters\n\nRepeated large spikes:\n- Cause repeated large insulin releases → insulin resistance over time\n- Drive fat storage (especially visceral fat)\n- Disrupt hormonal signaling (including reproductive hormones — PCOS, missed periods)\n- Cause oxidative stress and inflammation\n- Are implicated in type 2 diabetes, cardiovascular disease, fatty liver disease\n\n## The Downstream Cascade\n\nA critical insight: because fructose is co-packaged with glucose in almost all foods, and because insulin is released\nin response to glucose, **flattening the glucose curve automatically flattens fructose and insulin curves**. This\nmakes glucose the highest-leverage single metabolic metric to monitor and manage.\n\n## How to Flatten\n\nKey interventions (from [[glucose-revolution]]):\n- **Food order**: fiber → protein/fat → starches/sugars (slows gastric emptying, blunts spike)\n- **Vinegar before meals**: acetic acid slows glucose absorption\n- **Movement after eating**: muscle contractions absorb glucose without insulin\n- **Savory breakfast**: avoids a morning spike that cascades throughout the day\n- **Dessert timing**: sweets after a meal cause smaller spikes than sweets on an empty stomach\n- **Avoid liquid glucose**: juices and sweet drinks spike faster than solid food\n\n## Monitoring Tool: CGM\n\nContinuous Glucose Monitors (CGMs) — wearable sensors that track blood glucose every few minutes — democratized the\nability to see one's own glucose curves. Inchauspée's work is partly built on CGM self-experimentation.\n\n## Caveats\n\nGlucose curves are one important metabolic signal but not the only one. Ultra-processed oils, alcohol, sleep\ndeprivation, and chronic stress all affect health through glucose-independent pathways.\n\n## Related Topics\n- [[glucose-revolution]] — Inchauspée's full framework and 10 hacks\n- [[health-equity]] — CGM access is expensive; metabolic health interventions assume food security\n"}, {"id": "latticework-feedback-loops-outside-investing", "title": "Latticework Feedback Loops Outside Investing", "date": "2026-05-19", "tags": ["thinking", "feedback", "mental-models", "practice", "calibration", "wisdom"], "related": ["disposition-building-practices", "munger-disposition-formation", "latticework-pedagogy", "mental-models", "charlie-munger", "disposition-vs-knowledge", "superforecasting"], "category": "concepts", "excerpt": "Latticework Feedback Loops Outside Investing\n\nWhat the minimum viable feedback loop looks like for building latticework reasoning in domains other than investing — where there is no equivalent of a market price to score your judgment cheaply, daily,", "content": "---\ntitle: \"Latticework Feedback Loops Outside Investing\"\ndate: 2026-05-19\ntags: [thinking, feedback, mental-models, practice, calibration, wisdom]\nrelated: [[latticework-pedagogy]], [[disposition-building-practices]], [[superforecasting]], [[disposition-vs-knowledge]], [[mental-models]]\n---\n\n# Latticework Feedback Loops Outside Investing\n\nWhat the minimum viable feedback loop looks like for building [[latticework-pedagogy|latticework]] reasoning in domains other than investing — where there is no equivalent of a market price to score your judgment cheaply, daily, and unambiguously.\n\n## Why This Is the Hard Problem\n\n[[latticework-pedagogy]] argues that the latticework is built less by reading and more by *deliberate application with feedback*. [[charlie-munger|Munger's]] feedback substrate was unusual: market prices, marked to market daily, accumulated over 60+ years, with money on the line. The market is a near-ideal feedback signal — objective, fast (intraday and quarterly), unforgiving, and impossible to rationalize away.\n\nMost other domains lack any single signal with all four properties. A doctor sees outcomes weeks or years later, often after the patient has changed clinicians. A teacher rarely knows whether a student's later success traced to their class. A policy analyst can wait decades for a clear verdict. A software engineer gets fast feedback on whether code runs but slow, noisy feedback on whether the design was wise. Parenting feedback arrives in 20-year increments.\n\nThe question is not whether feedback exists in these domains — it does — but **what is the minimum structure that makes the feedback usable for latticework formation, given that no single signal is sufficient.**\n\n## The Minimum Structure\n\nFrom the conditions identified in [[disposition-building-practices]], a viable non-investing feedback loop needs four properties; in the absence of a market, they must be assembled deliberately rather than inherited from the domain:\n\n1. **Pre-commitment.** A written prediction or written reasoning before the outcome is known. Without this, hindsight bias erases the feedback signal.\n2. **A resolvable proxy.** Some outcome that *will* be observable on a useful timescale, even if it is only a partial measure of the underlying question.\n3. **A scheduled reckoning.** A calendar appointment with your own prior reasoning. The dispositional benefit is in the moment of being wrong on the record.\n4. **Cross-domain variation.** Predictions or decisions spanning more than one model area, so that calibration in one domain doesn't masquerade as general wisdom.\n\nThe minimal viable loop is therefore: **a written decision (or forecast) with the explicit reasoning, a chosen resolution date on a proxy you have committed to in advance, and a scheduled review on that date.** This is the [[disposition-building-practices]] minimum applied to non-market contexts.\n\n## Domain-Specific Resolvable Proxies\n\nThe single hardest design problem in non-investing domains is choosing the proxy. The proxy must be *resolvable* (you can observe whether you were right) and *non-trivial* (being right about the proxy actually pressures the underlying model). Some workable examples:\n\n| Domain | Long-horizon question | Resolvable proxy (months, not years) |\n|---|---|---|\n| Medicine (clinical) | Did my diagnosis hold up? | Test result, response to treatment within 4–12 weeks |\n| Software architecture | Was this design right? | Specific predicted failure modes (latency, on-call pages, refactor difficulty) at 90 days |\n| Teaching | Did this student learn? | Quiz / project performance at end of unit; one-year retention check via a single recall question |\n| Writing | Will this argument hold up? | Reactions of three pre-selected smart readers at fixed dates |\n| Policy / management | Will this initiative work? | Stated leading indicators with explicit thresholds at 30/90/180 days |\n| Forecasting (general) | Is my world model calibrated? | Public forecasting platforms (Good Judgment Open, Metaculus) — see [[superforecasting]] |\n| Hiring | Was this hire correct? | Written prediction of 12-month performance review rating, sealed at offer time |\n| Parenting | Is this approach working? | Narrow behavioral predictions on month-scale (e.g., \"screen time rule will produce X within 6 weeks\"); 20-year questions cannot be resolved |\n\nEach proxy is partial. None is the market. But each makes the underlying mental model testable on a timescale short enough for habit formation.\n\n## Why Forecasting Tournaments Are the Closest Analog\n\n[[superforecasting|Forecasting tournaments]] (Good Judgment Open, Metaculus, internal corporate forecasting) come closest to replicating the market's feedback properties in non-financial domains:\n\n- Pre-commitment is enforced (timestamped probability)\n- The resolution criterion is fixed in advance\n- Scoring is mechanical (Brier score), removing rationalization\n- Questions span domains, forcing cross-disciplinary model use\n- Cost of participation is low\n\n[[superforecasting]] notes the limit: tournament practice builds calibration and aggregation, not full far-transfer. But for the *feedback-loop* property specifically — the thing missing in most non-investing domains — forecasting tournaments are the most accessible substitute available.\n\n## The Substitute When No Proxy Is Available\n\nFor genuinely long-horizon questions (parenting outcomes, policy impacts, life choices), no monthly proxy exists. The substitute is **process review without outcome resolution**:\n\n- Record the reasoning, the considered alternatives, the expected outcome.\n- Schedule a review not at \"outcome\" but at *update points* — when new information arrives that should have changed the prediction.\n- Score yourself on whether you actually updated, not on whether you were right.\n\nThis is weaker than a market signal because it cannot test the model against reality. It can, however, test the model against *new evidence*, which is the second-best feedback structure and the one Tetlock identifies as a distinguishing superforecaster habit.\n\n## The Munger-Outside-Investing Cases\n\nMunger himself ran several non-investing latticework experiments. They illuminate the substitute structures:\n\n- **Munger, Tolles & Olson** — feedback from case outcomes and client retention; slower and noisier than markets but still real.\n- **Harvard-Westlake School and Good Samaritan Hospital boards** — institutional decisions whose consequences play out over years; here Munger relied heavily on the partnership/peer-review structure (Buffett conversations, board discussions) as a feedback proxy for outcomes too slow to score directly.\n- **Architecture and real estate** — physical buildings either work or do not on a 1–5 year horizon; concrete and slower than equities but still resolvable.\n\nAcross all three, Munger compensated for the absence of a market by *creating institutions of peer challenge* — board structures, partnership conversations, public talks that exposed his reasoning to critique. Peer-challenge structures are the cheapest substitute for market signals and are available in any domain.\n\n## The Minimum Viable Set (Recommendation)\n\nFor someone building latticework reasoning outside investing, the minimum viable feedback structure is:\n\n1. **A decision journal** with written reasoning and an explicit, pre-committed proxy outcome on a 30 / 90 / 180-day horizon. (From [[disposition-building-practices]].)\n2. **A scheduled monthly review** of journal entries whose horizons have elapsed, with a written entry on which mental model failed or held.\n3. **A forecasting tournament account** (Good Judgment Open, Metaculus, or an internal team forecast) for cross-domain calibration on questions that don't intersect your day job — this provides the cross-domain variation the journal alone may not.\n4. **A peer-challenge structure** — one to three readers / partners who see the reasoning before the outcome and are licensed to push back. This is the cheapest substitute for the Buffett-Munger conversational discipline.\n\nThe first three are individual. The fourth is institutional and is the most often skipped, but the [[charlie-munger|Munger]] case suggests it carries disproportionate weight.\n\n## What This Does Not Replace\n\nThe substitute structures cannot replicate:\n\n- **The amount of skin in the game** that investing provides. Money concentrates attention in a way that journal entries do not.\n- **The long horizon and compounding** that produced Munger's specific judgment. The minimum viable loop builds calibration; it does not, in a single decade, build the cross-disciplinary intuition that 60 years of partner conversation produced.\n- **Selection effects.** As [[disposition-vs-knowledge]] notes, practices supplement environment but do not replace the dispositional substrate Munger brought to age 30 (see [[munger-disposition-formation]]).\n\nWhat the minimum viable loop *does* deliver is the feedback signal — the part of latticework formation that is most often missing in non-investing domains and that no amount of reading replaces.\n\n## Related Topics\n- [[latticework-pedagogy]] — the broader question of teachability\n- [[disposition-building-practices]] — journaling, forecasting, review as the practice trio\n- [[superforecasting]] — the most rigorous non-investing feedback structure\n- [[disposition-vs-knowledge]] — why feedback matters more than content\n- [[munger-disposition-formation]] — the specific case study this page generalizes from\n"}, {"id": "pandemic-lessons-from-tb", "title": "Pandemic Lessons from TB", "date": "2026-05-19", "tags": ["global-health", "infectious-disease", "tuberculosis", "covid-19", "hiv", "public-health", "health-equity"], "related": ["romanticization-of-illness", "tuberculosis-and-global-health", "health-equity", "partners-in-health"], "category": "concepts", "excerpt": "Pandemic Lessons from TB\n\nWhat TB's 200-year history as a curable-but-killing disease reveals about the structural, political, and narrative dynamics that determine who survives pandemics — with direct application to COVID-19, HIV, and diseases yet t", "content": "---\ntitle: \"Pandemic Lessons from TB\"\ndate: 2026-05-19\ntags: [global-health, infectious-disease, tuberculosis, covid-19, hiv, public-health, health-equity]\nrelated: [[tuberculosis-and-global-health]], [[health-equity]], [[romanticization-of-illness]], [[partners-in-health]]\n---\n\n# Pandemic Lessons from TB\n\nWhat TB's 200-year history as a curable-but-killing disease reveals about the structural, political, and narrative dynamics that determine who survives pandemics — with direct application to COVID-19, HIV, and diseases yet to come.\n\n## The Central Lesson: Technology Is Not the Bottleneck\n\nTB has been curable since 1952. More than a million people died of it in 2023. COVID vaccines were developed within a year of the pandemic's onset; global vaccine distribution was radically unequal for two years. HIV antiretrovirals existed in the mid-1990s; millions in sub-Saharan Africa died unnecessarily through the early 2000s because drugs were unaffordable.\n\nThe pattern that [[tuberculosis-and-global-health]] establishes as TB's defining feature applies to all three diseases:\n\n> *\"The drugs are where the disease is not. And the disease is where the drugs are not.\"* — Dr. Peter Mugyenyi (on AIDS in 2000, quoted in *Everything Is Tuberculosis*)\n\nThis is not coincidence or bad luck. It is a structural feature of global health under conditions of radical wealth inequality. See [[health-equity]] for the framework.\n\n## Lesson 1: Narrative Framing Determines Political Will\n\n[[romanticization-of-illness]] documents how TB's romantic framing — the \"artist's disease,\" a mark of sensitive genius — concentrated sympathy on middle-class consumptives while the urban poor (who bore the actual disease burden) were blamed for moral failing.\n\nThe same dynamic appears in COVID-19 and HIV:\n\n- **HIV in the 1980s**: initial framings as a \"gay plague\" or disease of IV drug users redirected blame toward stigmatized communities, delaying research funding by years. The Reagan administration's refusal to publicly address AIDS is the most documented case of narrative framing causing mass death in modern American history.\n- **COVID-19**: the framing of COVID deaths as concentrated among people with \"underlying conditions\" — a phrase that subtly locates cause in the individual rather than in systems of exposure, housing density, and healthcare access — reduced political urgency for protective measures among those who didn't identify with the \"vulnerable.\"\n\nThe lesson: *how we frame illness determines who we fight for.* Sontag's prescription — strip moral meaning from disease, treat it as only biological — has direct political consequences. A disease that \"happens to\" people demands systemic response; a disease people \"bring on themselves\" does not.\n\n## Lesson 2: Drug Resistance Follows Incomplete Treatment\n\nTB's most dangerous current form — multi-drug-resistant TB (MDR-TB) — developed because of incomplete treatment: patients who could not access or afford full drug courses took partial courses, which selected for resistant strains.\n\nThis exact mechanism appears in COVID and HIV:\n\n- **HIV**: antiretroviral resistance emerges when patients take inconsistent courses, typically because of access barriers, not patient failure. [[partners-in-health]]'s community health worker model was developed specifically to address this: accompany patients through full treatment rather than distributing drugs and hoping for adherence.\n- **COVID variants**: while COVID's rapid mutation is partly intrinsic to RNA viruses, sustained transmission in unvaccinated populations (primarily in low-income countries with poor vaccine access during 2021) provided the replication opportunities that produced the most vaccine-evading variants. Global vaccination is an individual-country interest, not just a global charity.\n\nThe structural lesson: **access failures don't just harm the people denied treatment — they generate threats that rebound on the well-resourced.**\n\n## Lesson 3: Cures Without Distribution Systems Are Not Cures\n\nOne TB-specific lesson that generalizes: the bottleneck is rarely the drug. It is the infrastructure to deliver it — trained health workers, cold chains, diagnostic capacity, community trust.\n\n[[partners-in-health]] pioneered in Haiti and Sierra Leone the insight that vertical disease-specific programs (TB-only clinics, HIV-only programs) were less effective than building underlying health system capacity. COVID revealed the same gap globally: countries without strong primary care infrastructure struggled to run vaccination programs even when doses were available.\n\nThe lesson for future pandemics: **health system investment is pandemic preparedness.** Treating infrastructure investment as ordinary development aid rather than security spending is a strategic error that TB's history repeats, disease by disease.\n\n## Lesson 4: The Moral Weight of Preventable Death Is Cumulative\n\nJohn Green's argument in *Everything Is Tuberculosis* is moral as well as epidemiological: allowing a curable disease to kill 1.25 million people a year, for 70 years after a cure existed, is not a natural tragedy. It is a sustained political choice.\n\nEach pandemic tests whether we've internalized this lesson. COVID's global distribution failures suggest we haven't. The WHO's \"End TB\" target of 2030 was set in 2015 and is currently off-track.\n\nThe structural question [[health-equity]] poses: can global health equity be achieved without wealth redistribution? TB's history suggests no — access to drugs is downstream of access to resources. Incremental technical solutions (cheaper generic drugs, faster diagnostics) help but don't resolve the underlying inequality that makes *\"the drugs are where the disease is not\"* a stable equilibrium.\n\n## Summary: The Four Transferable Lessons\n\n| Lesson | TB evidence | COVID parallel | HIV parallel |\n|---|---|---|---|\n| Technology ≠ access | Curable 1952, still kills millions | Vaccines developed fast; distributed unequally | ARVs existed; unaffordable in Africa for a decade |\n| Narrative framing is political | Romantic myth → neglect of the poor | \"Underlying conditions\" → deprioritization of vulnerable | \"Gay plague\" → delayed federal response |\n| Incomplete treatment creates resistance | MDR-TB from partial drug courses | COVID variants from unvaccinated populations | ARV resistance from inconsistent access |\n| Systems, not just drugs, are needed | Community health workers essential | Vaccination required health infrastructure | Adherence required accompaniment, not just prescriptions |\n\n## Related Topics\n- [[tuberculosis-and-global-health]] — the primary source and case study\n- [[health-equity]] — the structural framework\n- [[romanticization-of-illness]] — how narrative shapes political will\n- [[partners-in-health]] — the organizational model that operationalizes these lessons\n"}, {"id": "adaptive-vs-technical-challenges", "title": "Adaptive vs. Technical Challenges", "date": "2026-05-19", "tags": ["leadership", "organizational-change", "problem-solving"], "related": ["adaptive-leadership", "ronald-heifetz", "mental-models", "experimental-mindset"], "category": "concepts", "excerpt": "Adaptive vs. Technical Challenges\n\nThe core diagnostic distinction in Ronald Heifetz's Adaptive Leadership framework. Most hard organizational problems\nfail not because of incompetence but because people apply technical solutions to adaptive challeng", "content": "---\ntitle: \"Adaptive vs. Technical Challenges\"\ndate: 2026-05-19\ntags: [leadership, organizational-change, problem-solving]\nrelated: [[adaptive-leadership]], [[ronald-heifetz]], [[mental-models]]\n---\n\n# Adaptive vs. Technical Challenges\n\nThe core diagnostic distinction in Ronald Heifetz's Adaptive Leadership framework. Most hard organizational problems\nfail not because of incompetence but because people apply *technical* solutions to *adaptive* challenges.\n\n## Definitions\n\n**Technical problem**: A problem where the solution is known, or knowable by an expert. The problem can be defined\nclearly; the authority (manager, doctor, engineer) can solve it without requiring those affected to fundamentally\nchange.\n\n**Adaptive challenge**: A problem that requires people to *change their values, beliefs, attitudes, or behaviors*\nto solve. No authority can do this work for them. The \"solution\" is not a policy or a process — it is learning and\nchange in the people who face the challenge.\n\n## Examples\n\n| Technical | Adaptive |\n|---|---|\n| Fix a software bug | Change engineering team culture to prevent recurring bugs |\n| Treat a heart attack | Get a patient to change diet/exercise habits permanently |\n| Increase employee benefits | Address disengagement caused by meaningless work |\n| Install new ERP software | Shift organization from siloed to collaborative processes |\n\nMost real-world challenges are *mixed*: they have technical components that experts can solve and adaptive components\nthat require human change.\n\n## Why the Distinction Matters\n\nLeaders repeatedly fail by:\n1. Treating adaptive challenges as technical (hiring consultants, deploying processes) → the \"fix\" doesn't stick\n   because the underlying human resistance is untouched\n2. Solving technical problems for people who need to develop the capability themselves → creates dependency, not capacity\n\n## Application: Diagnosis First\n\nHeifetz's recommended sequence: *diagnose before prescribing*. Ask:\n- Is there a known solution? → Technical\n- Does solving this require people to change? → Adaptive\n- Does it require people to give up something they value? → Definitely adaptive\n\n## Related Topics\n- [[adaptive-leadership]] — the full framework\n- [[mental-models]] — the technical/adaptive distinction is itself a mental model for diagnosing problems\n- [[experimental-mindset]] — adaptive challenges often require small experiments (probes) rather than\n  comprehensive solutions\n"}, {"id": "pseudo-productivity", "title": "Pseudo-Productivity", "date": "2026-05-19", "tags": ["productivity", "knowledge-work", "deep-work"], "related": ["cal-newport", "cognitive-atrophy-and-ai", "slow-productivity", "tiny-experiments"], "category": "concepts", "excerpt": "Pseudo-Productivity\n\nThe use of visible busyness as a proxy for genuine output in knowledge work. Cal Newport's term for the trap that\nemerged when industrial-era productivity metrics (output per hour) were applied to cognitive and creative labor, wh", "content": "---\ntitle: \"Pseudo-Productivity\"\ndate: 2026-05-19\ntags: [productivity, knowledge-work, deep-work]\nrelated: [[slow-productivity]], [[cal-newport]], [[cognitive-atrophy-and-ai]]\n---\n\n# Pseudo-Productivity\n\nThe use of *visible busyness* as a proxy for genuine output in knowledge work. Cal Newport's term for the trap that\nemerged when industrial-era productivity metrics (output per hour) were applied to cognitive and creative labor, which\nhas no equivalent of widgets-per-hour.\n\n## Key Properties\n\n- **Visibility bias**: Activity that can be seen by managers (email responses, meeting attendance, long hours) is\n  rewarded even if it produces little value\n- **Industrial inheritance**: Factory floor management assumed that workers not visibly busy weren't producing; this\n  assumption transferred, unsuitably, to knowledge work\n- **Remote amplification**: Digital communication made pseudo-productivity worse — the expectation of constant\n  responsiveness became the measure of engagement\n- **Self-reinforcing**: Pseudo-productivity crowds out deep work; shallow work expands to fill available time\n\n## Why It Persists\n\nGenuine knowledge work output is hard to measure. A researcher who spent two weeks lying on a picnic table (John McPhee)\nand then produced a 30,000-word masterpiece looks unproductive during the lying-down phase. There's no visible\nintermediate output to point to, so managers and workers themselves reach for busyness as a reassuring signal.\n\n## Costs\n\n- Deep work capacity atrophies\n- Creative problems remain unsolved because they require uninterrupted focus\n- Burnout from effort without meaningful output\n- See also: [[cognitive-atrophy-and-ai]] for the parallel concern about AI-assisted shallow work\n\n## Antidote\n[[slow-productivity]] — fewer things, natural pace, obsession with quality\n\n## Related Topics\n- [[slow-productivity]] — Newport's proposed alternative\n- [[tiny-experiments]] — Le Cunff's small, curiosity-driven trials also implicitly reject the\n  pseudo-productivity model\n"}, {"id": "vibecession", "title": "Vibecession", "date": "2026-05-19", "tags": ["economics", "behavioral-economics", "sentiment", "kyla-scanlon"], "related": ["bubble-finance", "economic-literacy", "kyla-scanlon", "superforecasting"], "category": "concepts", "excerpt": "Vibecession\n\nA term coined by Kyla Scanlon in 2022 to describe an economic situation where:\n- Hard indicators (GDP, unemployment, corporate earnings) are technically healthy, or at least not recessionary\n- Soft indicators (consumer sentiment, public", "content": "---\ntitle: \"Vibecession\"\ndate: 2026-05-19\ntags: [economics, behavioral-economics, sentiment, kyla-scanlon]\nrelated: [[economic-literacy]], [[kyla-scanlon]], [[bubble-finance]], [[superforecasting]]\n---\n\n# Vibecession\n\nA term coined by Kyla Scanlon in 2022 to describe an economic situation where:\n- **Hard indicators** (GDP, unemployment, corporate earnings) are technically healthy, or at least not recessionary\n- **Soft indicators** (consumer sentiment, public mood, social media tone) suggest people feel like they're in a\n  recession\n\nThe \"vibe\" is the gap between what the economy looks like on a spreadsheet and what it feels like to live in it.\n\n## Why It Matters\n\nThe vibecession concept reveals several important truths about how economies actually work:\n\n1. **Expectations are economic forces**: Depressed consumer sentiment can reduce spending, which *causes* the\n   slowdown people feared. Vibes can become self-fulfilling.\n\n2. **Official metrics are lagging and partial**: CPI, unemployment rate, and GDP don't capture housing affordability,\n   debt burden, income inequality, or the psychological toll of economic instability.\n\n3. **Media amplification**: Engagement-optimized economic coverage rewards alarmism, inflating vibes in the negative\n   direction.\n\n## The 2022 Context\n\nScanlon coined the term in 2022 when: inflation was high but employment was strong; real wages for many workers had\nrecovered; yet consumer sentiment was near historic lows. Conventional economics couldn't fully explain the gap.\nBehavioral economics and media analysis could.\n\n## Broader Implication\n\nThe vibecession is a case study in why economic literacy requires both technical knowledge (what does the CPI measure?)\nand human insight (how do people actually experience and respond to economic conditions?). Pure data without behavioral\ncontext is incomplete.\n\n## Related Topics\n- [[economic-literacy]] — Scanlon's full framework\n- [[bubble-finance]] — Stockman's thesis: the Fed's communication and policy itself creates distortions between\n  nominal indicators and underlying economic health\n- [[superforecasting]] — both Tetlock and Scanlon emphasize the gap between models and reality; calibration\n  requires tracking where models break down\n"}, {"id": "tb-eradication-requirements", "title": "TB Eradication — Political and Financial Requirements", "date": "2026-05-19", "tags": ["global-health", "infectious-disease", "tuberculosis", "health-equity", "policy", "patents"], "related": ["pandemic-lessons-from-tb", "health-equity", "john-green", "tuberculosis-and-global-health", "partners-in-health"], "category": "concepts", "excerpt": "TB Eradication — Political and Financial Requirements\n\nWhat it would actually take, politically and financially, to drive global TB deaths to near-zero — synthesized from John Green's Everything Is Tuberculosis and the Partners In Health case record.", "content": "---\ntitle: \"TB Eradication — Political and Financial Requirements\"\ndate: 2026-05-19\ntags: [global-health, infectious-disease, tuberculosis, health-equity, policy, patents]\nrelated: [[tuberculosis-and-global-health]], [[health-equity]], [[pandemic-lessons-from-tb]], [[partners-in-health]], [[john-green]]\n---\n\n# TB Eradication — Political and Financial Requirements\n\nWhat it would actually take, politically and financially, to drive global TB deaths to near-zero — synthesized from John Green's *Everything Is Tuberculosis* and the [[partners-in-health|Partners In Health]] case record.\n\n## Why TB Is Politically Tractable\n\nTB is the rare global-health problem where the technical question is essentially settled:\n\n- TB has been **curable since 1952**.\n- The first-line drug course (RIPE — rifampin, isoniazid, pyrazinamide, ethambutol) was cheap by the 1990s.\n- The 2023 endTB trial showed that even **multi-drug-resistant TB (MDR-TB)** is now ~90% curable at **about $300 per course** — a 98% reduction from the $15,000–$20,000 cost in the late 1990s.\n- The Partners In Health Peru program in the late 1990s achieved >85% MDR-TB cure rates in low-resource settings, demonstrating that the bottleneck is delivery, not pharmacology.\n\nThe remaining barriers are political and financial. They fall into four categories.\n\n## 1. Health-System Infrastructure (Largest Cost)\n\nDrugs without a delivery system don't cure people. The chronic constraint is human infrastructure:\n\n- **Trained health workers** — diagnosticians, clinicians, and especially **community health workers (CHWs)** who live in affected communities and accompany patients through 6-month (drug-sensitive) to 2-year+ (drug-resistant) treatment courses. The PIH \"accompaniment\" model is the operational template: case detection, adherence support, nutrition support, and side-effect management all delivered at the household level.\n- **Diagnostic capacity** — sputum microscopy misses ~50% of cases (Phumeza Tisile's case is the canonical example: she was told she was negative twice before an X-ray showed both lungs choked with TB). Replacing microscopy with molecular diagnostics (GeneXpert) is feasible but requires equipment, supply chains, and trained operators in every district hospital and many primary-care clinics.\n- **Cold chains, sample transport, and labs** for drug-susceptibility testing.\n\nThe WHO Stop TB Partnership Global Plan to End TB (2023–2030) estimates the financing gap at roughly **$22 billion per year** globally, with **$5 billion per year for TB R&D** as a separate line. Current global spending is roughly half the operational figure. The implication: full eradication needs roughly a **doubling of present TB-specific spending sustained for at least a decade**, with most new dollars going to delivery infrastructure rather than drug procurement.\n\nThis figure is small relative to global defense spending (~$2.4 trillion annually) and modest even relative to global health aid as a whole. It is large relative to the historical willingness of donor governments to fund TB specifically.\n\n## 2. Drug Pricing and Patent Regimes\n\nEven after the price collapse, drug pricing remains a structural lever:\n\n- **Bedaquiline** (Johnson & Johnson, first released 2013) cost $900 per course in low-income countries and $3,000 in middle-income countries. J&J's primary patent was set to expire in 2023; the company attempted **patent evergreening** — filing secondary patents on an adjuvant compound — to extend protection. TB survivors Phumeza Tisile and Nandita Venkatesan filed a patent challenge in Indian courts and won; J&J subsequently backed down on enforcing secondary patents in most low- and middle-income countries, and the price dropped over 60% almost overnight.\n- **Pretomanid** (TB Alliance, 2019) is the other newer MDR-TB drug; its pricing has been more accessible because it was developed by a non-profit but is still subject to country-by-country negotiation.\n- **Generic manufacturing** is the most reliable price-reduction mechanism. Indian and South African generic manufacturers were essential to the 1990s–2000s price collapse on first-line drugs and on antiretrovirals; the same model works for newer TB drugs only if patents do not block them.\n\nThe political requirement: **TRIPS flexibilities (compulsory licensing) consistently exercised by middle-income countries**, sustained pressure on pharmaceutical firms to license to generics in low-income markets, and the political insulation to do this in the face of US Trade Representative pushback. Carole Mitnick's framing — *\"cost-effectiveness is a moving target\"* — captures the dynamic: prices that were \"impossible\" in 1998 became routine by 2023 specifically because PIH and others refused the cost-effectiveness frame and treated it instead as a pricing problem.\n\n## 3. The \"Cost-Effectiveness\" Narrative\n\nThe single most stubborn political obstacle Green identifies is the **cost-effectiveness logic** that historically deprioritized TB in low-income settings:\n\n- WHO's 1990s guidance that **\"MDR-TB is too expensive to treat in poor countries.\"**\n- The standard of care for MDR-TB was \"supportive therapy\" — Dr. Carole Mitnick's gloss: *\"Put sick people in a hut on the side of the road and wait for them to die.\"*\n- Paul Farmer's counter-argument: *\"failure to diagnose and treat MDR-TB is what is really costly\"* — because untreated MDR-TB spreads and mutates further.\n\nThe narrative requirement for eradication is the displacement of static cost-effectiveness with **dynamic, system-level accounting**: the cost of treating today vs. the cost of resistance, ongoing transmission, lost productivity, and orphaned children tomorrow. The COVID parallel — global vaccine access as self-interest, not charity (see [[pandemic-lessons-from-tb]]) — is the same argument applied to a different disease.\n\nPolitical eradication requires shifting decision-makers from \"cost per QALY in country X\" to \"cost of letting a curable pathogen circulate globally.\" This is more a framing problem than an arithmetic problem.\n\n## 4. Sustained Funding Across Political Cycles\n\nTB programs are not one-shot interventions; the disease is durable. The political requirement most often missed:\n\n- **Multi-decade funding commitments** through institutions insulated from single-administration policy reversals. The Global Fund, USAID PEPFAR-style mechanisms, and the WHO are the existing scaffolding; none currently has guaranteed TB funding at the scale required.\n- **Country co-financing trajectories** so that high-burden middle-income countries (India, South Africa, the Philippines, Brazil, Indonesia) take over progressively larger shares as their economies grow. India accounts for ~28% of global TB burden; its domestic TB budget has grown but remains below need.\n- **Resilience to political shocks** — funding pauses (e.g., from US foreign-aid reviews) directly translate into interrupted treatment, which is the exact mechanism that produces drug resistance.\n\nThe historical pattern Green emphasizes: TB has been the world's deadliest infectious disease through most of recorded history; **the political will required is not new spending so much as new continuity of spending.**\n\n## What \"Eradication\" Means Here\n\nTrue biological eradication of TB — like smallpox — is currently not on the table. *M. tuberculosis* has no animal reservoir but ~25% of the world's population carries latent infection, of whom ~10% develop active disease over a lifetime. Without an effective vaccine (BCG is partial and primarily protects against childhood TB meningitis), eliminating the latent reservoir is multi-generational.\n\nWhat is achievable on a 10–25 year horizon, given the political and financial inputs above:\n\n- **Elimination as a public-health problem** (WHO definition: <10 cases per million population) in most countries\n- **Reduction of global deaths from ~1.25 million per year to <100,000**\n- **Containment of MDR-TB transmission** through universal access to drug-susceptibility testing and full second-line treatment\n\nThe WHO \"End TB\" 2030 targets (90% reduction in deaths and 80% reduction in incidence vs. 2015) are this kind of \"eradication-as-elimination\" goal. They are off-track as of the mid-2020s, but the shortfall is funding and political continuity, not technology.\n\n## The Summary Equation\n\nFull elimination of TB as a public-health problem requires, in rough terms:\n\n- **~$22B/year** in delivery and treatment funding, sustained for ~15 years\n- **~$5B/year** in R&D for shorter-course drugs and an effective adult vaccine\n- **Patent regime that does not block generic production** of new TB drugs in high-burden countries\n- **Health-system infrastructure** (CHWs, diagnostics, labs) built primarily in low- and middle-income countries\n- **Narrative shift** away from static cost-effectiveness toward dynamic transmission accounting\n- **Multi-decade political continuity** across donor and recipient governments\n\nThe remarkable feature of TB is that none of these requirements is unknown or technically novel. As John Green's central argument has it: *the problem is moral and political, not scientific.* That diagnosis also points at the cure.\n\n## Source\n- `raw/books/Everything Is Tuberculosis - John Green.epub` — especially Ch. 22 (\"Virtuous Cycles\") and Ch. 23 (\"The Cause and the Cure\")\n\n## Related Topics\n- [[tuberculosis-and-global-health]] — the source synthesis\n- [[health-equity]] — the structural frame this page applies\n- [[pandemic-lessons-from-tb]] — parallels with COVID and HIV\n- [[partners-in-health]] — the organizational model that proved low-resource treatment is possible\n- [[john-green]] — the author\n"}, {"id": "illness-narrative-and-coping", "title": "Illness Narrative and Coping", "date": "2026-05-19", "tags": ["illness", "narrative", "coping", "psychology", "health", "philosophy"], "related": ["romanticization-of-illness", "tuberculosis-and-global-health", "health-equity"], "category": "concepts", "excerpt": "Illness Narrative and Coping\n\nThe question of whether Susan Sontag's prescription — strip all metaphor from illness — conflicts with patients' genuine need for narrative frameworks to cope with, integrate, and give meaning to serious illness.\n\nSontag", "content": "---\ntitle: \"Illness Narrative and Coping\"\ndate: 2026-05-19\ntags: [illness, narrative, coping, psychology, health, philosophy]\nrelated: [[romanticization-of-illness]], [[tuberculosis-and-global-health]], [[health-equity]]\n---\n\n# Illness Narrative and Coping\n\nThe question of whether Susan Sontag's prescription — strip all metaphor from illness — conflicts with patients' genuine need for narrative frameworks to cope with, integrate, and give meaning to serious illness.\n\n## Sontag's Argument\n\nSontag's *Illness as Metaphor* (1978) argues that the metaphorization of illness — tuberculosis as passion, cancer as repression, AIDS as punishment — is *always punitive*. It implies the patient's character caused the disease, and that a better character could cure it. The corrective is to treat illness as purely biological: a pathogen acting on a body, with no moral meaning.\n\nSontag was writing from her own experience with cancer, and her argument is primarily *political*: illness metaphors are not innocent cultural constructions but are load-bearing structures in the edifice of stigma and neglect. As [[romanticization-of-illness]] documents, the romantic framing of TB caused measurable harm by concentrating sympathy on the \"artistically sensitive\" while blaming the poor for their disease.\n\n## The Tension: Political Corrective vs. Psychological Need\n\nSontag's prescription is compelling as public health policy. But patients navigating serious illness confront a different problem: how to integrate an experience that disrupts identity, autonomy, and future plans into a coherent self.\n\nNarrative is the primary cognitive tool humans use for integration. Illness that cannot be narrated — that is simply a mechanical failure with no thread to the rest of one's life — may be harder to bear, not easier.\n\nThe question is whether Sontag's argument, correct at the level of public discourse, leaves patients without the coping tools they actually need at the individual level.\n\n## Types of Illness Narrative — Not All Punitive\n\nSontag focuses on metaphors that *assign cause*: your repressive personality caused your cancer; your promiscuity caused your AIDS. These metaphors are punitive because they locate blame in the patient.\n\nBut illness narrative serves at least three other functions beyond causal assignment:\n\n| Narrative function | Example | Punitive? |\n|---|---|---|\n| Causal assignment | \"Cancer is caused by repressed anger\" | Yes — this is what Sontag attacks |\n| Identity integration | \"This illness is a chapter in my story, not my identity\" | No — does not blame the patient |\n| Agency restoration | \"I can't control the disease, but I can control how I respond\" | No — enlarges patient agency |\n| Community formation | \"Sharing this experience connects me to others who understand\" | No — builds solidarity |\n\nThe last three functions can be served by narrative without the moral meaning Sontag objects to. A patient who says \"my cancer taught me to stop deferring the things that matter\" is using illness-as-story without saying their character caused the cancer.\n\n## The Empirical Picture\n\nResearch in health psychology (referenced indirectly through the [[tuberculosis-and-global-health]] and [[health-equity]] context) suggests:\n\n- **Meaning-making** — finding some personal significance in illness — correlates with better psychological outcomes for patients with serious or chronic illness, independent of disease progression\n- **Narrative coherence** — the ability to integrate illness into a life story — predicts post-traumatic growth more reliably than the absence of distress\n- **Illness identity** (over-identifying with the sick role) is associated with poorer outcomes; but *complete narrative rejection* of the illness experience is also associated with poor integration\n\nThe practical implication: the healthiest position is not \"illness is only a pathogen with no meaning\" but \"illness is not a punishment — and I will decide what, if anything, it means for my life.\"\n\n## The Resolution: Distinguish Public and Personal Narrative\n\nThe most defensible reading of Sontag is that her prescription is primarily *political*:\n- **In public health discourse**: illness metaphors should be stripped of moral weight because they are used to redistribute sympathy, justify neglect, and blame the victims of structural inequality\n- **In personal coping**: patients may use narrative frameworks freely — so long as those frameworks do not assign causal blame (which would internalize the very stigma Sontag is fighting)\n\nSontag herself never claimed to fully succeed in practicing the anti-metaphorical stance she advocated — her later essay *Regarding the Pain of Others* (2003) acknowledges the limits of purely clinical thinking about human suffering.\n\n## Implications for Contemporary Disease\n\nThis distinction applies directly to the questions raised in [[romanticization-of-illness]] about contemporary romanticized framings:\n\n- **Depression as \"creative sensitivity\"**: Sontag would object to the romanticization (it concentrates sympathy on the artistically productive and stigmatizes the clinically severe). But patients who find community and reduced shame by connecting their depression to creative struggle are not necessarily doing something harmful — provided they are also accessing treatment.\n- **Autoimmune disease as \"body attacking itself\"**: A metaphor that implies internal conflict. This may be psychologically useful (the patient is not to blame; the disease is the enemy) or harmful (the body is at war with itself, an unstable self). The test is whether the metaphor assigns moral cause vs. provides narrative structure.\n\n## Related Topics\n- [[romanticization-of-illness]] — the primary source; Sontag's analysis and its political implications\n- [[tuberculosis-and-global-health]] — the historical case where narrative determined who lived\n- [[health-equity]] — why illness narrative has structural consequences\n"}, {"id": "general-purpose-technology", "title": "General Purpose Technology", "date": "2026-05-19", "tags": ["technology", "economics", "ai", "innovation"], "related": ["large-language-models", "jagged-frontier", "living-and-working-with-ai"], "category": "concepts", "excerpt": "General Purpose Technology\n\nA general purpose technology is a technology that spreads across many sectors, enables complementary innovations, and reshapes how work is organized. Ethan Mollick frames large-language-models as a general purpose technolo", "content": "---\ntitle: \"General Purpose Technology\"\ndate: 2026-05-19\ntags: [technology, economics, ai, innovation]\nrelated: [[large-language-models]], [[living-and-working-with-ai]], [[jagged-frontier]]\n---\n\n# General Purpose Technology\n\nA general purpose technology is a technology that spreads across many sectors, enables complementary innovations, and reshapes how work is organized. Ethan Mollick frames [[large-language-models]] as a general purpose technology because they can affect nearly every form of cognitive work rather than a single narrow industry.\n\n## Key Properties\n\n- **Broad applicability** — useful across many domains rather than one specialized workflow.\n- **Complementary innovation** — value grows as people redesign processes, institutions, and habits around it.\n- **Productivity effects** — the technology changes the cost, speed, or quality of many tasks.\n- **Uneven diffusion** — gains depend on experimentation, adoption, and the ability to identify where the technology works.\n\n## AI Context\n\nIn [[living-and-working-with-ai]], the general-purpose character of LLMs explains why their impact is hard to forecast from a list of features. Their value depends on how people map the [[jagged-frontier]] of capability in their own work.\n\n## Related Topics\n\n- [[large-language-models]] — the technology being classified\n- [[jagged-frontier]] — why GPT impact is uneven across tasks\n"}, {"id": "inversion", "title": "Inversion", "date": "2026-05-19", "tags": ["thinking", "decision-making", "mental-models", "problem-solving"], "related": ["charlie-munger", "mental-models", "mental-models-and-multidisciplinary-thinking"], "category": "concepts", "excerpt": "Inversion\n\nInversion is a problem-solving mental model: instead of asking only how to succeed, ask what would guarantee failure, then avoid or remove those causes. Charlie Munger popularized the method through the maxim \"invert, always invert,\" attri", "content": "---\ntitle: \"Inversion\"\ndate: 2026-05-19\ntags: [thinking, decision-making, mental-models, problem-solving]\nrelated: [[mental-models]], [[charlie-munger]], [[mental-models-and-multidisciplinary-thinking]]\n---\n\n# Inversion\n\nInversion is a problem-solving mental model: instead of asking only how to succeed, ask what would guarantee failure, then avoid or remove those causes. [[charlie-munger|Charlie Munger]] popularized the method through the maxim \"invert, always invert,\" attributed to mathematician Carl Jacobi.\n\n## Key Properties\n\n- **Failure-first reasoning** — identify the obvious ways a system, decision, or plan could break.\n- **Avoidance as strategy** — many problems are easier to prevent than to solve after the fact.\n- **Bias reduction** — inversion counters wishful thinking by forcing attention onto risks, constraints, and incentives.\n\n## Examples\n\n- To improve learning, ask: \"What would make me stop practicing?\" then design against friction, boredom, and unclear feedback.\n- To build a good organization, ask: \"What incentives would create politics, blame, or short-termism?\" then remove them.\n- To make better investments, ask: \"What could permanently impair this business?\" before asking how high the upside might be.\n\n## Related Topics\n\n- [[mental-models]] — the broader toolkit inversion belongs to\n- [[mental-models-and-multidisciplinary-thinking]] — Munger's source context\n"}, {"id": "ai-tutoring", "title": "AI Tutoring", "date": "2026-05-19", "tags": ["education", "AI", "LLMs", "personalized-learning"], "related": ["cognitive-atrophy-and-ai", "growth-mindset", "large-language-models", "jagged-frontier", "ai-in-education", "sal-khan"],
